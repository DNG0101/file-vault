<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Vault</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📁 File Vault</h1>
      <div class="header-right">
        <span class="stats" id="storageStats"></span>
        <button class="btn-icon" id="btnDarkMode" title="Dark mode">🌓</button>
        <span id="adminUI"></span>
      </div>
    </div>

    <!-- Admin bar with All Users button -->
    <div class="admin-bar hidden" id="adminBar">
      <strong>🛡️ Admin</strong>
      <button class="btn btn-outline btn-sm" id="btnSync">🔄 Sync</button>
      <button class="btn btn-outline btn-sm" id="btnApprovals">👥 Pending</button>
      <button class="btn btn-outline btn-sm" id="btnAllUsers">👤 All Users</button>
      <button class="btn btn-danger btn-sm" id="btnUnauthorize">🔒 Logout</button>
    </div>

    <div class="panel hidden" id="approvalPanel">
      <h3>Pending Approvals</h3>
      <div id="approvalList"></div>
    </div>

    <div class="panel hidden" id="usersPanel">
      <h3>All Users</h3>
      <div id="usersList"></div>
    </div>

    <!-- Rest of the HTML (toolbar, dropzone, progress, file grid, preview overlay) identical to previous -->
    ...
  </div>

  <div class="preview-overlay hidden" id="previewOverlay">
    <div class="preview-container" id="previewContainer"></div>
    <div class="preview-toolbar">
      <button id="btnFullscreen">⛶ Fullscreen</button>
      <button id="btnClosePreview">✕ Close</button>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="script.js"></script>
</body>
</html>
