<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Public File Vault</title>
<style>
    :root {
        --bg: #f5f7fa;
        --card-bg: #fff;
        --text: #1a1a1a;
        --accent: #1a73e8;
        --success: #0f9d58;
        --danger: #ea4335;
        --warn: #f9ab00;
        --radius: 12px;
        --shadow: 0 4px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        padding: 20px;
    }
    .container { max-width: 900px; margin: 0 auto; }
    .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 24px;
    }
    h1 { font-size: clamp(1.5rem, 6vw, 2rem); font-weight: 700; }
    .status-badge {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.85rem;
        font-weight: 600;
        padding: 6px 12px;
        border-radius: 20px;
        background: #eee;
    }
    .status-badge.online { background: #e6f4ea; color: #1e8e3e; }
    .status-badge.offline { background: #fce8e6; color: #c5221f; }
    .status-dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: currentColor;
    }

    .dropzone {
        border: 3px dashed #ccc;
        border-radius: 16px;
        padding: 40px 20px;
        text-align: center;
        background: var(--card-bg);
        cursor: pointer;
        transition: all 0.2s;
        margin-bottom: 20px;
        user-select: none;
    }
    .dropzone:hover, .dropzone.dragover {
        border-color: var(--accent);
        background: #e8f0fe;
    }
    .dropzone input { display: none; }

    .progress-container { margin-bottom: 20px; display: none; }
    .progress-bar {
        height: 8px;
        background: #e0e0e0;
        border-radius: 4px;
        overflow: hidden;
    }
    .progress-fill {
        height: 100%;
        width: 0%;
        background: var(--accent);
        border-radius: 4px;
        transition: width 0.3s ease;
    }
    .progress-info {
        display: flex;
        justify-content: space-between;
        font-size: 0.85rem;
        margin-top: 6px;
    }
    .cancel-upload {
        background: var(--danger);
        color: white;
        border: none;
        padding: 4px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.8rem;
    }

    .file-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 16px;
    }
    .card {
        background: var(--card-bg);
        border-radius: var(--radius);
        padding: 16px;
        box-shadow: var(--shadow);
        display: flex;
        flex-direction: column;
        transition: transform 0.1s;
    }
    .card:hover { transform: translateY(-2px); }
    .file-name {
        font-weight: 600;
        word-break: break-all;
        margin-bottom: 8px;
        line-height: 1.3;
    }
    .file-meta {
        font-size: 0.8rem;
        color: #666;
        margin-bottom: 12px;
    }
    .action-buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: auto;
    }
    .btn {
        padding: 8px 14px;
        border: none;
        border-radius: 8px;
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        background: #eee;
        transition: opacity 0.2s, transform 0.1s;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
        touch-action: manipulation;
        min-height: 40px;
        min-width: 44px;
        -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.96); }
    .btn:disabled { opacity: 0.5; pointer-events: none; }
    .btn-play { background: var(--accent); color: white; }
    .btn-download { background: var(--success); color: white; }
    .btn-delete { background: var(--danger); color: white; }
    .btn-replace { background: var(--warn); color: #222; }

    /* Video overlay (modal with fullscreen) */
    .video-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: #000;
        z-index: 1000;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }
    .video-overlay.active { display: flex; }
    .video-container {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .video-container video {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
        background: black;
    }
    .video-toolbar {
        position: absolute;
        top: 16px;
        right: 16px;
        display: flex;
        gap: 10px;
        z-index: 1001;
    }
    .video-toolbar button {
        background: rgba(255,255,255,0.15);
        border: none;
        color: white;
        padding: 10px 16px;
        border-radius: 8px;
        font-size: 0.9rem;
        cursor: pointer;
        backdrop-filter: blur(10px);
        transition: background 0.2s;
    }
    .video-toolbar button:hover { background: rgba(255,255,255,0.3); }
    .fullscreen-active .video-toolbar { display: none; }

    @media (max-width: 500px) {
        body { padding: 12px; }
        .dropzone { padding: 30px 15px; font-size: 0.95rem; }
    }
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📁 File Vault</h1>
        <div class="status-badge offline" id="statusBadge">
            <span class="status-dot"></span>
            <span id="statusText">Checking connection...</span>
        </div>
    </div>

    <!-- Dropzone -->
    <div class="dropzone" id="dropzone">
        <p><strong>📂 Drop files here</strong> or click to browse</p>
        <input type="file" id="fileInput" multiple>
    </div>

    <!-- Progress -->
    <div class="progress-container" id="progressContainer">
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-info">
            <span id="progressPercent">0%</span>
            <span id="progressSize">0 / 0 MB</span>
            <button class="cancel-upload" id="cancelUploadBtn">Cancel</button>
        </div>
    </div>

    <!-- File list -->
    <div class="file-grid" id="fileGrid"></div>
</div>

<!-- Video overlay -->
<div class="video-overlay" id="videoOverlay">
    <div class="video-container">
        <video id="videoPlayer" controls playsinline></video>
    </div>
    <div class="video-toolbar">
        <button id="btnFullscreen" title="Fullscreen">⛶ Fullscreen</button>
        <button id="btnCloseVideo">✕ Close</button>
    </div>
</div>

<script>
// ==================== CONFIGURATION ====================
const WORKER_BASE = 'https://gdrive-files-api.donthulanthish53.workers.dev';
let uploadAbortController = null;

// ==================== DOM ELEMENTS ====================
const statusBadge = document.getElementById('statusBadge');
const statusText = document.getElementById('statusText');
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const progressContainer = document.getElementById('progressContainer');
const progressFill = document.getElementById('progressFill');
const progressPercent = document.getElementById('progressPercent');
const progressSize = document.getElementById('progressSize');
const cancelUploadBtn = document.getElementById('cancelUploadBtn');
const fileGrid = document.getElementById('fileGrid');
const videoOverlay = document.getElementById('videoOverlay');
const videoPlayer = document.getElementById('videoPlayer');
const btnFullscreen = document.getElementById('btnFullscreen');
const btnCloseVideo = document.getElementById('btnCloseVideo');

let fileListCache = [];

// ==================== CONNECTION CHECK ====================
async function checkConnection() {
    try {
        const res = await fetch(`${WORKER_BASE}/list`);
        if (res.ok) {
            setStatus(true, 'Connected');
        } else {
            setStatus(false, 'Worker error ' + res.status);
        }
    } catch (e) {
        setStatus(false, 'Offline');
        console.warn('Worker unreachable:', e);
    }
}
function setStatus(online, message) {
    statusBadge.className = 'status-badge ' + (online ? 'online' : 'offline');
    statusText.textContent = message;
}
checkConnection();

// ==================== DRAG & DROP ====================
dropzone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => {
    if (e.target.files.length) processFiles(e.target.files);
    fileInput.value = '';
});

dropzone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropzone.classList.add('dragover');
});
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
dropzone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropzone.classList.remove('dragover');
    if (e.dataTransfer.files.length) processFiles(e.dataTransfer.files);
});

// ==================== UPLOAD LOGIC ====================
async function processFiles(files) {
    for (const file of files) {
        try {
            await uploadFile(file);
        } catch (err) {
            alert(`Upload failed: ${err.message}`);
            console.error(err);
        }
    }
    await refreshFileList();
}

async function uploadFile(file) {
    if (uploadAbortController) uploadAbortController.abort();
    uploadAbortController = new AbortController();
    const signal = uploadAbortController.signal;

    showProgress(true);
    let fileId = null;
    let publicId = null;
    try {
        // Init resumable upload
        const initRes = await fetch(`${WORKER_BASE}/upload-init`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                fileName: file.name,
                fileType: file.type || 'application/octet-stream'
            }),
            signal
        });
        if (!initRes.ok) throw new Error(`Init failed: ${initRes.status}`);
        const initData = await initRes.json();
        const uploadUrl = initData.uploadUrl;
        publicId = initData.publicId;

        // Check existing progress
        let uploaded = 0;
        try {
            const statusRes = await fetch(uploadUrl, {
                method: 'PUT',
                headers: {'Content-Range': `bytes */${file.size}`},
                signal
            });
            if (statusRes.status === 200 || statusRes.status === 201) {
                const fileData = await statusRes.json();
                fileId = fileData.id;
                await completeUpload(publicId, fileId, file.name, file.type || 'application/octet-stream', file.size);
                showProgress(false);
                return;
            }
            const range = statusRes.headers.get('Range');
            if (range) {
                const match = range.match(/bytes=0-(\d+)/);
                if (match) uploaded = parseInt(match[1]) + 1;
            }
        } catch (e) { /* start from 0 */ }

        // Chunked upload
        const CHUNK_SIZE = 10 * 1024 * 1024; // 10 MB
        while (uploaded < file.size) {
            if (signal.aborted) throw new Error('Upload cancelled');
            const end = Math.min(uploaded + CHUNK_SIZE - 1, file.size - 1);
            const chunk = file.slice(uploaded, end + 1);
            const headers = {'Content-Range': `bytes ${uploaded}-${end}/${file.size}`};

            let retries = 0;
            let done = false;
            while (retries < 3 && !done) {
                try {
                    const res = await fetch(uploadUrl, {
                        method: 'PUT',
                        headers,
                        body: chunk,
                        signal
                    });
                    if (res.ok) {
                        if (res.status === 200 || res.status === 201) {
                            const fileData = await res.json();
                            fileId = fileData.id;
                            done = true;
                            break;
                        }
                        // 308 – chunk accepted
                        done = true;
                    } else if (res.status >= 500) {
                        retries++;
                        await sleep(1000 * retries);
                    } else {
                        throw new Error(`Chunk error ${res.status}`);
                    }
                } catch (err) {
                    if (retries >= 2) throw err;
                    retries++;
                    await sleep(1000 * retries);
                }
            }
            if (done && (res.status === 200 || res.status === 201 || uploaded === file.size - 1)) break;
            if (done) {
                uploaded = end + 1;
                updateProgress(uploaded, file.size);
            } else {
                // Fallback
                const statusRes = await fetch(uploadUrl, {
                    method: 'PUT',
                    headers: {'Content-Range': `bytes */${file.size}`},
                    signal
                });
                if (statusRes.status === 200 || statusRes.status === 201) {
                    const fileData = await statusRes.json();
                    fileId = fileData.id;
                    break;
                }
                const range = statusRes.headers.get('Range');
                if (range) {
                    const m = range.match(/bytes=0-(\d+)/);
                    if (m) uploaded = parseInt(m[1]) + 1;
                }
            }
        }
        if (fileId) {
            await completeUpload(publicId, fileId, file.name, file.type || 'application/octet-stream', file.size);
        }
    } finally {
        showProgress(false);
        uploadAbortController = null;
    }
}

async function completeUpload(publicId, fileId, fileName, fileType, size) {
    await fetch(`${WORKER_BASE}/upload-complete`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ publicId, fileId, fileName, fileType, size })
    });
}

function showProgress(show) {
    progressContainer.style.display = show ? 'block' : 'none';
    if (!show) {
        updateProgress(0, 1);
    }
}
function updateProgress(uploaded, total) {
    const pct = total ? Math.round((uploaded / total) * 100) : 0;
    progressFill.style.width = pct + '%';
    progressPercent.textContent = pct + '%';
    progressSize.textContent = `${formatBytes(uploaded)} / ${formatBytes(total)}`;
}
function formatBytes(bytes) {
    if (!bytes) return '0 B';
    const units = ['B','KB','MB','GB','TB'];
    let i = 0;
    let size = bytes;
    while (size >= 1024 && i < units.length - 1) { size /= 1024; i++; }
    return size.toFixed(1) + ' ' + units[i];
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

cancelUploadBtn.addEventListener('click', () => {
    if (uploadAbortController) {
        uploadAbortController.abort();
        alert('Upload cancelled');
    }
});

// ==================== FILE LIST & ACTIONS ====================
async function refreshFileList() {
    try {
        const res = await fetch(`${WORKER_BASE}/list`);
        if (res.ok) {
            fileListCache = await res.json();
            renderFileList();
        }
    } catch (e) {
        console.error('Failed to fetch file list:', e);
    }
}

function renderFileList() {
    fileGrid.innerHTML = '';
    if (!fileListCache.length) {
        fileGrid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:#888;">No files yet. Upload something!</p>';
        return;
    }
    fileListCache.forEach(file => {
        const card = document.createElement('div');
        card.className = 'card';
        const isMedia = file.fileType && (file.fileType.startsWith('video/') || file.fileType.startsWith('audio/'));
        card.innerHTML = `
            <div class="file-name">${escapeHtml(file.fileName)}</div>
            <div class="file-meta">
                ${formatBytes(file.size)} · ${new Date(file.uploadedAt).toLocaleString()}
            </div>
            <div class="action-buttons">
                ${isMedia ? `<button class="btn btn-play" onclick="playFile('${file.publicId}')">▶ Play</button>` : ''}
                <button class="btn btn-download" onclick="downloadFile('${file.publicId}', '${escapeHtml(file.fileName)}')">⬇ Download</button>
                <button class="btn btn-delete" onclick="deleteFile('${file.publicId}')">🗑 Delete</button>
                <button class="btn btn-replace" onclick="replaceFile('${file.publicId}')">🔄 Replace</button>
            </div>
        `;
        fileGrid.appendChild(card);
    });
}

function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

// ==================== PLAY VIDEO ====================
function playFile(publicId) {
    videoPlayer.src = `${WORKER_BASE}/video/${publicId}`;
    videoOverlay.classList.add('active');
    videoPlayer.load();
    videoPlayer.play().catch(() => {});
}

function closeVideo() {
    videoPlayer.pause();
    videoPlayer.removeAttribute('src');
    videoPlayer.load();
    videoOverlay.classList.remove('active');
    if (document.fullscreenElement) {
        document.exitFullscreen();
    }
}
btnCloseVideo.addEventListener('click', closeVideo);
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && videoOverlay.classList.contains('active')) {
        closeVideo();
    }
});

// Fullscreen
btnFullscreen.addEventListener('click', toggleFullscreen);
videoPlayer.addEventListener('dblclick', toggleFullscreen);

function toggleFullscreen() {
    if (document.fullscreenElement) {
        document.exitFullscreen();
    } else {
        videoOverlay.requestFullscreen();
    }
}
document.addEventListener('fullscreenchange', () => {
    if (document.fullscreenElement) {
        videoOverlay.classList.add('fullscreen-active');
    } else {
        videoOverlay.classList.remove('fullscreen-active');
    }
});

// ==================== DOWNLOAD ====================
function downloadFile(publicId, fileName) {
    const a = document.createElement('a');
    a.href = `${WORKER_BASE}/download/${publicId}`;
    a.download = fileName;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

// ==================== DELETE ====================
async function deleteFile(publicId) {
    if (!confirm('Permanently delete this file?')) return;
    const res = await fetch(`${WORKER_BASE}/delete/${publicId}`, { method: 'DELETE' });
    if (res.ok) {
        await refreshFileList();
    } else {
        alert('Delete failed');
    }
}

// ==================== REPLACE ====================
function replaceFile(publicId) {
    const input = document.createElement('input');
    input.type = 'file';
    input.onchange = async () => {
        const newFile = input.files[0];
        if (!newFile) return;
        try {
            const initRes = await fetch(`${WORKER_BASE}/update/${publicId}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    fileName: newFile.name,
                    fileType: newFile.type || 'application/octet-stream'
                })
            });
            if (!initRes.ok) throw new Error('Update init failed');
            const { uploadUrl } = await initRes.json();
            // Reuse upload logic with the new uploadUrl, but it lacks a proper abort controller – we can reuse uploadFile with a custom wrapper
            // For simplicity, we'll reuse a similar chunked upload without abort.
            await chunkedUpload(newFile, uploadUrl, publicId);
            await refreshFileList();
        } catch (err) {
            alert('Replace failed: ' + err.message);
        }
    };
    input.click();
}

async function chunkedUpload(file, uploadUrl, publicId) {
    let uploaded = 0;
    try {
        const statusRes = await fetch(uploadUrl, {
            method: 'PUT',
            headers: {'Content-Range': `bytes */${file.size}`}
        });
        if (statusRes.status === 200 || statusRes.status === 201) {
            const fileData = await statusRes.json();
            await completeUpload(publicId, fileData.id, file.name, file.type || 'application/octet-stream', file.size);
            return;
        }
        const range = statusRes.headers.get('Range');
        if (range) {
            const m = range.match(/bytes=0-(\d+)/);
            if (m) uploaded = parseInt(m[1]) + 1;
        }
    } catch (e) {}

    const CHUNK_SIZE = 10 * 1024 * 1024;
    showProgress(true);
    while (uploaded < file.size) {
        const end = Math.min(uploaded + CHUNK_SIZE - 1, file.size - 1);
        const chunk = file.slice(uploaded, end + 1);
        const headers = {'Content-Range': `bytes ${uploaded}-${end}/${file.size}`};
        let retries = 0;
        let done = false;
        while (retries < 3 && !done) {
            try {
                const res = await fetch(uploadUrl, { method: 'PUT', headers, body: chunk });
                if (res.ok) {
                    if (res.status === 200 || res.status === 201) {
                        const fileData = await res.json();
                        await completeUpload(publicId, fileData.id, file.name, file.type || 'application/octet-stream', file.size);
                        done = true;
                        break;
                    }
                    done = true;
                } else if (res.status >= 500) {
                    retries++;
                    await sleep(1000 * retries);
                } else {
                    throw new Error('Chunk error ' + res.status);
                }
            } catch (err) {
                if (retries >= 2) throw err;
                retries++;
                await sleep(1000 * retries);
            }
        }
        if (done && (res && (res.status === 200 || res.status === 201) || uploaded === file.size - 1)) break;
        if (done) {
            uploaded = end + 1;
            updateProgress(uploaded, file.size);
        } else {
            const statusRes = await fetch(uploadUrl, {
                method: 'PUT',
                headers: {'Content-Range': `bytes */${file.size}`}
            });
            if (statusRes.status === 200 || statusRes.status === 201) {
                const fileData = await statusRes.json();
                await completeUpload(publicId, fileData.id, file.name, file.type || 'application/octet-stream', file.size);
                break;
            }
            const range = statusRes.headers.get('Range');
            if (range) {
                const m = range.match(/bytes=0-(\d+)/);
                if (m) uploaded = parseInt(m[1]) + 1;
            }
        }
    }
    showProgress(false);
}

// Initial load
refreshFileList();

// Re-check connection periodically
setInterval(checkConnection, 30000);
</script>
</body>
</html>
