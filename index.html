<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Public File Vault</title>

<body>

<script>
// ==================== CONFIG ====================
const WORKER_BASE = 'https://gdrive-files-api.donthulanithish53.workers.dev';

// State variables
let currentFileList = [];
let selectedFiles = new Set();
let sortOrder = 'newest';
let searchQuery = '';
let userEmail = null;
let userApproved = false;
let userRole = null;   // 'none','read','download','delete','full'
let userToken = null;
let isAdmin = false;   // true if admin session is active
let adminSessionToken = null;
let uploadAbortController = null;

// DOM helpers (same as before)
const $ = id => document.getElementById(id);
function toast(msg, type='info') { ... }
// ... all other utility functions identical ...

// ==================== INIT ====================
async function init() {
  // Check for user token from URL
  const params = new URLSearchParams(location.search);
  const utoken = params.get('utoken');
  const admToken = params.get('admin_token');

  if (admToken) {
    // Admin logged in
    adminSessionToken = admToken;
    isAdmin = true;
    history.replaceState({}, '', location.pathname);
    // Save admin token in localStorage for future visits (optional)
    localStorage.setItem('adminSessionToken', admToken);
  }
  if (utoken) {
    userToken = utoken;
    history.replaceState({}, '', location.pathname);
    await checkUserInfo();
    if (userApproved) {
      renderMainApp();
      if (userRole) applyPermissionsUI(userRole);
      await refreshFileList();
      startRolePolling(); // Poll for role changes
      return;
    } else {
      renderApprovalScreen();
      startApprovalPolling(); // Poll for admin approval + role
      return;
    }
  }

  // No token in URL – maybe admin token in localStorage?
  const savedAdmin = localStorage.getItem('adminSessionToken');
  if (savedAdmin) {
    // Validate admin session
    const res = await fetch(`${WORKER_BASE}/admin-session?token=${savedAdmin}`);
    const data = await res.json();
    if (data.admin) {
      adminSessionToken = savedAdmin;
      isAdmin = true;
      renderMainApp();
      $('adminBar').classList.remove('hidden');
      await loadPendingCount();
      await refreshFileList();
      return;
    } else {
      localStorage.removeItem('adminSessionToken');
    }
  }

  // Otherwise, show login options
  renderLoginScreen();
}

async function checkUserInfo() {
  if (!userToken) return;
  try {
    const res = await fetch(`${WORKER_BASE}/user-info?utoken=${userToken}`);
    const info = await res.json();
    userEmail = info.email;
    userApproved = info.approved;
    userRole = info.role;
  } catch (e) { /* ignore */ }
}

function renderLoginScreen() {
  // Same as previous version but also include admin login with ability to input token? Actually, admin login flow uses redirect.
  // ... (identical to previous login screen) ...
}

function renderApprovalScreen() {
  // ... (identical to previous) ...
}

function renderMainApp() {
  // Show main UI
  document.querySelector('.hint-text').style.display = 'block';
  if (isAdmin) {
    $('adminBar').classList.remove('hidden');
    $('adminUI').innerHTML = '';
  } else {
    $('adminBar').classList.add('hidden');
    $('adminUI').innerHTML = userEmail ? `<span style="font-size:0.8rem;">👤 ${userEmail} (${userRole || 'pending'})</span>` : '';
  }
}

// ==================== ADMIN BAR ====================
$('btnSync').addEventListener('click', syncFiles);
$('btnApprovals').addEventListener('click', toggleApprovalPanel);
$('btnUnauthorize').addEventListener('click', async () => {
  if (!isAdmin) return;
  if (adminSessionToken) {
    await fetch(`${WORKER_BASE}/admin-logout`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ admin_token: adminSessionToken })
    });
  }
  localStorage.removeItem('adminSessionToken');
  isAdmin = false;
  adminSessionToken = null;
  $('adminBar').classList.add('hidden');
  $('adminUI').innerHTML = '';
  toast('Admin logged out. Vault still active.', 'info');
  // If a user is also logged in, keep them; otherwise show login
  if (!userEmail) renderLoginScreen();
});

// ==================== APPROVAL PANEL (with role selection) ====================
function toggleApprovalPanel() {
  const panel = $('approvalPanel');
  panel.classList.toggle('active');
  if (panel.classList.contains('active')) loadApprovals();
}

async function loadApprovals() {
  const res = await fetch(`${WORKER_BASE}/admin/pending`, {
    headers: { 'X-Admin-Token': adminSessionToken || '' }
  });
  const emails = await res.json();
  const list = $('approvalList');
  if (!emails.length) {
    list.innerHTML = '<p style="color:var(--text-secondary);">No pending requests.</p>';
    return;
  }
  // Also load approved users for role management? Not now.
  list.innerHTML = emails.map(email => `
    <div class="approval-item">
      <span>${email}</span>
      <div style="display:flex;gap:6px;align-items:center;">
        <select class="role-select" style="padding:4px 8px;border-radius:4px;border:1px solid var(--border);">
          <option value="full">Full Access</option>
          <option value="delete">Delete</option>
          <option value="download">Download Only</option>
          <option value="read">Read Only</option>
          <option value="none">Nothing Visible</option>
        </select>
        <button class="btn btn-sm" style="background:var(--success);color:#fff;" data-approve="${email}">✅ Approve</button>
        <button class="btn btn-sm" style="background:var(--danger);color:#fff;" data-deny="${email}">❌ Deny</button>
      </div>
    </div>
  `).join('');

  // Attach events
  list.querySelectorAll('[data-approve]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const row = btn.closest('.approval-item');
      const roleSelect = row.querySelector('.role-select');
      const role = roleSelect.value;
      await fetch(`${WORKER_BASE}/admin/approve`, {
        method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Admin-Token': adminSessionToken },
        body: JSON.stringify({ email: btn.dataset.approve, role })
      });
      toast(`${btn.dataset.approve} approved as ${role}`, 'success');
      loadApprovals();
      loadPendingCount();
    });
  });
  list.querySelectorAll('[data-deny]').forEach(btn => {
    btn.addEventListener('click', async () => {
      await fetch(`${WORKER_BASE}/admin/deny`, {
        method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Admin-Token': adminSessionToken },
        body: JSON.stringify({ email: btn.dataset.deny })
      });
      toast(`${btn.dataset.deny} denied`, 'info');
      loadApprovals();
      loadPendingCount();
    });
  });
}

// ==================== ROLE-BASED UI ====================
function applyPermissionsUI(role) {
  const dropzone = $('dropzone');
  const hint = document.querySelector('.hint-text');
  // Hide upload elements if role doesn't allow upload (i.e., not read-only, none doesn't see anything anyway)
  const canUpload = role === 'full' || role === 'delete' || role === 'download';
  dropzone.style.display = canUpload ? '' : 'none';
  if (hint) hint.style.display = canUpload ? '' : 'none';

  // We also need to hide action buttons based on role in the file cards. We'll re-render the file list after applying.
  renderFileList(); // The render function will check userRole to decide which buttons to show.
}

// In the file list rendering, we check userRole to conditionally include buttons.
// (See renderFileList modifications)

function getAvailableActions(fileId, isUploading) {
  if (isUploading) return [];
  if (!userRole) return ['play','preview','download','delete','replace']; // admin or no role yet
  const actions = [];
  const pt = previewType(currentFileList.find(f => f.publicId === fileId)?.fileType);
  if (pt === 'video' || pt === 'audio') {
    if (['full','download','delete','read'].includes(userRole)) actions.push('play');
  }
  if (['image','pdf','text'].includes(pt)) {
    if (['full','download','delete','read'].includes(userRole)) actions.push('preview');
  }
  if (['full','download','delete'].includes(userRole)) actions.push('download');
  if (['full','delete'].includes(userRole)) actions.push('delete');
  if (userRole === 'full') actions.push('replace');
  return actions;
}

// Then modify renderFileList to use getAvailableActions to conditionally include buttons.

// ==================== POLLING FOR LIVE UPDATES ====================
let rolePollInterval, approvalPollInterval;

function startRolePolling() {
  if (rolePollInterval) clearInterval(rolePollInterval);
  rolePollInterval = setInterval(async () => {
    if (!userToken || !userApproved) return;
    try {
      const res = await fetch(`${WORKER_BASE}/user-info?utoken=${userToken}`);
      const info = await res.json();
      if (info.role !== userRole) {
        userRole = info.role;
        toast(`Your permissions have been updated to: ${userRole}`, 'info');
        applyPermissionsUI(userRole);
        if (userRole === 'none') {
          // Hide everything, show a message
          $('fileGrid').innerHTML = '<p style="grid-column:1/-1;text-align:center;padding:40px;">You no longer have access.</p>';
          $('dropzone').style.display = 'none';
          document.querySelector('.hint-text').style.display = 'none';
          clearInterval(rolePollInterval);
        }
      }
    } catch (e) { /* ignore */ }
  }, 5000);
}

function startApprovalPolling() {
  if (approvalPollInterval) clearInterval(approvalPollInterval);
  approvalPollInterval = setInterval(async () => {
    if (!userToken) return;
    try {
      const res = await fetch(`${WORKER_BASE}/user-info?utoken=${userToken}`);
      const info = await res.json();
      if (info.approved) {
        userApproved = true;
        userRole = info.role;
        clearInterval(approvalPollInterval);
        toast('You have been approved!', 'success');
        renderMainApp();
        applyPermissionsUI(userRole);
        await refreshFileList();
        startRolePolling();
      }
    } catch (e) { /* ignore */ }
  }, 10000);
}

// ==================== START ====================
init();
</script>
</body>
</html>
