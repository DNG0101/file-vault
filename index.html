<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Public File Vault – Gallery</title>
    <style>
        /* ========== CSS (improved gallery style) ========== */
        :root {
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warn: #f59e0b;
            --purple: #8b5cf6;
            --radius: 14px;
            --shadow: 0 4px 12px rgba(0,0,0,0.05);
            --toast-bg: #1e293b;
            --toast-text: #f1f5f9;
        }
        [data-theme="dark"] {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #e2e8f0;
            --text-secondary: #94a3b8;
            --border: #334155;
            --shadow: 0 4px 12px rgba(0,0,0,0.3);
            --toast-bg: #475569;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 20px; transition: background 0.2s, color 0.2s; }
        .container { max-width: 1400px; margin: 0 auto; }
        .hidden { display: none !important; }
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; }
        .header h1 { font-size: clamp(1.5rem, 5vw, 2rem); font-weight: 700; }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .btn-icon { padding: 8px; border: 1px solid var(--border); border-radius: 10px; background: var(--card-bg); cursor: pointer; min-width: 42px; min-height: 42px; display: flex; align-items: center; justify-content: center; }
        .btn { padding: 8px 16px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; background: var(--card-bg); color: var(--text); border: 1px solid var(--border); transition: all 0.2s; }
        .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
        .btn-danger { background: var(--danger); color: white; border-color: var(--danger); }
        .btn-outline { background: transparent; }
        .btn-sm { padding: 4px 12px; font-size: 0.8rem; }
        .admin-bar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; padding: 12px; background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 16px; }
        .toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .search-box { flex: 1; padding: 8px 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--card-bg); color: var(--text); outline: none; }
        .paste-box { display: flex; gap: 8px; margin-bottom: 20px; align-items: center; }
        .paste-box input { flex: 1; padding: 8px 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--card-bg); color: var(--text); }
        .dropzone { border: 2px dashed var(--border); border-radius: 16px; padding: 40px 20px; text-align: center; background: var(--card-bg); cursor: pointer; margin-bottom: 20px; transition: all 0.2s; }
        .dropzone:hover, .dragover { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 5%, var(--card-bg)); }
        .progress-box { margin-bottom: 20px; }
        .progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: var(--accent); transition: width 0.3s; }
        .progress-text { display: flex; justify-content: space-between; font-size: 0.8rem; margin-top: 6px; }
        .cancel-btn { background: var(--danger); color: white; border: none; padding: 2px 8px; border-radius: 4px; cursor: pointer; }
        .file-section { margin-bottom: 32px; }
        .section-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid var(--accent); color: var(--accent); display: flex; align-items: center; gap: 10px; }
        .section-title span { background: var(--accent); color: white; padding: 2px 8px; border-radius: 20px; font-size: 0.8rem; }
        .file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        .card { background: var(--card-bg); border-radius: var(--radius); padding: 12px; box-shadow: var(--shadow); border: 1px solid var(--border); position: relative; transition: all 0.2s; display: flex; flex-direction: column; }
        .card.selected { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent); }
        .card-checkbox { position: absolute; top: 10px; right: 10px; width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; z-index: 2; }
        .thumbnail { width: 100%; height: 160px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; background: transparent; overflow: hidden; border-radius: 10px; }
        .thumbnail img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
        .thumbnail span { font-size: 3rem; }
        .file-name { font-weight: 600; word-break: break-word; margin-bottom: 6px; font-size: 0.9rem; }
        .file-meta { font-size: 0.7rem; color: var(--text-secondary); margin-bottom: 10px; }
        .actions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .btn-xs { padding: 4px 8px; border: none; border-radius: 6px; font-size: 0.7rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-xs-play { background: var(--accent); color: white; }
        .btn-xs-preview { background: var(--purple); color: white; }
        .btn-xs-download { background: var(--success); color: white; }
        .btn-xs-delete { background: var(--danger); color: white; }
        .btn-xs-replace { background: var(--warn); color: #222; }
        .btn-xs-rename { background: #6c757d; color: white; }
        .btn-xs-copy { background: #0d6efd; color: white; }
        .comment-section { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 8px; font-size: 0.75rem; }
        .comment-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-weight: 600; cursor: pointer; }
        .comment-icon { font-size: 1rem; }
        .comment-count { background: var(--accent); color: white; border-radius: 10px; padding: 0 6px; font-size: 0.7rem; }
        .comment-list { max-height: 150px; overflow-y: auto; margin-bottom: 6px; display: none; }
        .comment-list.show { display: block; }
        .comment { padding: 4px 0; border-bottom: 1px dashed var(--border); display: flex; justify-content: space-between; align-items: center; }
        .comment strong { color: var(--accent); }
        .comment-text { word-break: break-word; flex: 1; margin-right: 8px; }
        .comment-actions button { background: none; border: none; cursor: pointer; font-size: 0.7rem; margin-left: 4px; color: var(--text-secondary); }
        .comment-form { display: flex; gap: 6px; margin-top: 6px; }
        .comment-form input { flex: 1; padding: 4px 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--card-bg); color: var(--text); }
        .tick-btn { background: none; border: none; cursor: pointer; font-size: 1.2rem; margin-right: 8px; padding: 0; }
        .tick-count { font-size: 0.7rem; color: var(--text-secondary); margin-right: 8px; }
        .panel { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; max-height: 500px; overflow-y: auto; }
        .approval-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); gap: 10px; flex-wrap: wrap; }
        .status-badge { padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; }
        .status-approved { background: #d1fae5; color: #065f46; }
        .status-pending { background: #fef3c7; color: #92400e; }
        .bulk-bar { background: var(--accent); color: white; padding: 8px 16px; border-radius: 8px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; }
        .preview-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .preview-overlay.hidden { display: none; }
        .preview-container { width: 90%; height: 90%; display: flex; align-items: center; justify-content: center; }
        .preview-container video, .preview-container audio { max-width: 100%; max-height: 100%; outline: none; background: #000; }
        .preview-toolbar { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; }
        .preview-toolbar button { background: rgba(0,0,0,0.6); border: none; color: white; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
        #toastContainer { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
        .toast { background: var(--toast-bg); color: var(--toast-text); padding: 8px 16px; border-radius: 8px; font-size: 0.85rem; animation: slideIn 0.3s ease; }
        .toast.error { background: var(--danger); }
        .toast.success { background: var(--success); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @media (max-width: 600px) { body { padding: 10px; } .file-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📁 File Vault</h1>
            <div class="header-right">
                <span id="storageStats"></span>
                <button class="btn-icon" id="btnDarkMode">🌓</button>
                <span id="userUI"></span>
            </div>
        </div>

        <!-- Admin bar (with direct approve input) -->
        <div class="admin-bar hidden" id="adminBar">
            <strong>🛡️ Admin</strong>
            <button class="btn btn-outline btn-sm" id="btnSync">🔄 Sync</button>
            <button class="btn btn-outline btn-sm" id="btnApprovals">👥 Pending</button>
            <button class="btn btn-outline btn-sm" id="btnAllUsers">👤 Users</button>
            <button class="btn btn-outline btn-sm" id="btnLogs">📋 Logs</button>
            <button class="btn btn-outline btn-sm" id="btnAnalytics">📊 Analytics</button>
            <button class="btn btn-outline btn-sm" id="btnShareManager">🔗 Shares</button>
            <div style="display:flex; gap:6px; margin-left:auto;">
                <input type="email" id="directApproveEmail" placeholder="Email to approve" style="padding:4px 8px; border-radius:6px; border:1px solid var(--border);">
                <button class="btn btn-sm btn-primary" id="btnDirectApprove">Direct Approve</button>
            </div>
            <button class="btn btn-danger btn-sm" id="btnAdminLogout">🔒 Logout</button>
        </div>

        <!-- Panels -->
        <div class="panel hidden" id="approvalPanel"><h3>Pending Approvals</h3><div id="approvalList"></div><button class="btn-sm btn-outline" id="refreshPendingBtn">🔄 Refresh</button></div>
        <div class="panel hidden" id="usersPanel"><h3>Active Users</h3><div id="usersList"></div><button class="btn-sm btn-outline" id="refreshUsersBtn">🔄 Refresh</button></div>
        <div class="panel hidden" id="logsPanel"><h3>Audit Logs</h3><div id="logsContent"></div><button class="btn btn-danger btn-sm" id="btnClearLogs">🗑 Clear All Logs</button><button class="btn-sm btn-outline" id="refreshLogsBtn">🔄 Refresh</button></div>
        <div class="panel hidden" id="analyticsPanel"><h3>Analytics</h3><div id="analyticsContent"></div><button class="btn-sm btn-outline" id="refreshAnalyticsBtn">🔄 Refresh</button></div>
        <div class="panel hidden" id="sharePanel"><h3>Share Manager</h3><div id="shareContent"></div></div>

        <!-- Toolbar -->
        <div class="toolbar">
            <input type="text" class="search-box" id="searchInput" placeholder="Search files... (Ctrl+F)">
            <select class="sort-select" id="sortSelect">
                <option value="newest">Newest</option><option value="oldest">Oldest</option>
                <option value="name-asc">Name A‑Z</option><option value="name-desc">Name Z‑A</option>
                <option value="size-desc">Largest</option><option value="size-asc">Smallest</option>
            </select>
            <button class="btn-sm btn-outline" id="refreshFilesBtn">🔄 Refresh Files</button>
        </div>

        <!-- Paste & Send Box -->
        <div class="paste-box">
            <input type="text" id="pasteInput" placeholder="Paste files here (Ctrl+V) — then click Send 📤" readonly style="background:var(--bg);">
            <button class="btn btn-primary" id="sendPasteBtn">📤 Send</button>
        </div>

        <div class="bulk-bar hidden" id="bulkBar">
            <span id="bulkCount">0 selected</span>
            <button id="btnBulkDelete">🗑 Delete Selected</button>
            <button id="btnBulkCancel">✕</button>
        </div>

        <div class="dropzone" id="dropzone">
            <p>📂 <strong>Drop files here</strong> or click to browse</p>
            <input type="file" id="fileInput" multiple>
        </div>

        <div class="progress-box hidden" id="progressBox">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="progress-text">
                <span id="percentDisplay">0%</span>
                <span id="speedDisplay">0 KB/s</span>
                <span id="sizeDisplay">0 / 0 B</span>
                <button class="cancel-btn" id="cancelUpload">Cancel</button>
            </div>
        </div>

        <div id="fileGrid"></div>
    </div>

    <div class="preview-overlay hidden" id="previewOverlay">
        <div class="preview-container" id="previewContainer"></div>
        <div class="preview-toolbar">
            <button id="btnFullscreen">⛶ Fullscreen</button>
            <button id="btnClosePreview">✕ Close</button>
        </div>
    </div>

    <div id="toastContainer"></div>

    <script>
        // ==================== CONFIG ====================
        const WORKER_BASE = 'https://gdrive-files-api.donthulanithish53.workers.dev';

        // Global lock
        let globalLock = false;
        async function withLock(fn) {
            while (globalLock) await new Promise(r => setTimeout(r, 50));
            globalLock = true;
            try { return await fn(); } finally { globalLock = false; }
        }

        // State
        let ST = {
            token: localStorage.getItem('vtoken'),
            email: null,
            isAdmin: false,
            approved: false,
            role: null,
            files: [],
            selected: new Set(),
            sort: localStorage.getItem('sort') || 'newest',
            query: '',
            uploadCtrl: null,
            dark: localStorage.getItem('darkMode') === 'true',
            shareToken: null,
        };
        let uploadingFiles = new Set();
        let cardData = new Map(); // publicId -> { comments, ticked, count }
        let pendingPasteFiles = []; // store pasted files before sending

        // DOM helpers
        const $ = id => document.getElementById(id);
        const D = {
            stats: $('storageStats'), userUI: $('userUI'), adminBar: $('adminBar'),
            dropzone: $('dropzone'), fileInp: $('fileInput'), progBox: $('progressBox'),
            progFill: $('progressFill'), pctDisp: $('percentDisplay'), speedDisp: $('speedDisplay'),
            sizeDisp: $('sizeDisplay'), cancelBtn: $('cancelUpload'), grid: $('fileGrid'),
            prevOv: $('previewOverlay'), prevCont: $('previewContainer'), btnFull: $('btnFullscreen'),
            btnCloseP: $('btnClosePreview'), search: $('searchInput'), sortSel: $('sortSelect'),
            bulkBar: $('bulkBar'), bulkCnt: $('bulkCount'), toastBox: $('toastContainer'),
            btnDark: $('btnDarkMode'), btnSync: $('btnSync'), btnAppr: $('btnApprovals'),
            btnAllUsers: $('btnAllUsers'), btnLogs: $('btnLogs'), btnAnalytics: $('btnAnalytics'),
            btnShare: $('btnShareManager'), btnUnAuth: $('btnAdminLogout'),
            pnlAppr: $('approvalPanel'), listAppr: $('approvalList'),
            pnlUsers: $('usersPanel'), listUsers: $('usersList'),
            pnlLogs: $('logsPanel'), logsCt: $('logsContent'),
            pnlAnalytics: $('analyticsPanel'), analyticsCt: $('analyticsContent'),
            pnlShare: $('sharePanel'), shareCt: $('shareContent'),
            pendingBadge: $('pendingBadge'), btnClearLogs: $('btnClearLogs'),
            btnBulkDelete: $('btnBulkDelete'), btnBulkCancel: $('btnBulkCancel'),
            refreshFilesBtn: $('refreshFilesBtn'), refreshPendingBtn: $('refreshPendingBtn'),
            refreshUsersBtn: $('refreshUsersBtn'), refreshLogsBtn: $('refreshLogsBtn'), refreshAnalyticsBtn: $('refreshAnalyticsBtn'),
            pasteInput: $('pasteInput'), sendPasteBtn: $('sendPasteBtn'),
            directApproveEmail: $('directApproveEmail'), btnDirectApprove: $('btnDirectApprove'),
        };

        function getAuthHeaders() {
            const h = {};
            if (ST.token) {
                if (ST.isAdmin) h['X-Admin-Token'] = ST.token;
                else h['X-User-Token'] = ST.token;
            }
            return h;
        }
        function getDownloadUrl(pid) { return `${WORKER_BASE}/download/${pid}?utoken=${ST.token}`; }
        function getPreviewUrl(pid) { return `${WORKER_BASE}/video/${pid}?utoken=${ST.token}`; }
        function toast(msg, type='info') {
            if (!D.toastBox) return;
            const el = document.createElement('div');
            el.className = `toast ${type}`;
            el.textContent = msg;
            D.toastBox.appendChild(el);
            setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 3000);
        }
        const esc = s => { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; };
        const fmtSz = b => { if(!b) return '0 B'; const u=['B','KB','MB','GB']; let i=0,s=b; while(s>=1024 && i<3) { s/=1024; i++; } return s.toFixed(1)+' '+u[i]; };
        const fmtSpeed = bytesPerSec => { if(bytesPerSec<1024) return bytesPerSec.toFixed(0)+' B/s'; if(bytesPerSec<1048576) return (bytesPerSec/1024).toFixed(1)+' KB/s'; return (bytesPerSec/1048576).toFixed(1)+' MB/s'; };
        const getThumbnailHtml = (mime, name, publicId) => {
            const url = getPreviewUrl(publicId);
            if (mime.startsWith('image')) {
                return `<img src="${url}" style="width:100%; height:100%; object-fit:cover; border-radius:10px;" onerror="this.style.display='none'; this.parentElement.innerHTML='🖼️'">`;
            } else if (mime.startsWith('video')) return '<span>🎬</span>';
            else if (mime.startsWith('audio')) return '<span>🎵</span>';
            else if (mime === 'application/pdf') return '<span>📕</span>';
            else if (mime.startsWith('text')) return '<span>📝</span>';
            else return '<span>📄</span>';
        };
        const prevType = m => {
            if (!m) return '';
            if (m.startsWith('video')) return 'video';
            if (m.startsWith('audio')) return 'audio';
            if (m.startsWith('image')) return 'image';
            if (m === 'application/pdf') return 'pdf';
            if (m.startsWith('text')) return 'text';
            return '';
        };
        async function copyToClipboard(text) {
            try {
                await navigator.clipboard.writeText(text);
                toast('Link copied to clipboard!', 'success');
            } catch (err) {
                toast('Copy failed', 'error');
            }
        }

        // Dark mode
        (function(){
            if(!D.btnDark) return;
            if(ST.dark) document.documentElement.setAttribute('data-theme','dark');
            D.btnDark.addEventListener('click', () => {
                ST.dark = !ST.dark;
                document.documentElement.setAttribute('data-theme', ST.dark ? 'dark' : 'light');
                localStorage.setItem('darkMode', ST.dark);
                if(ST.isAdmin && ST.token) {
                    fetch(`${WORKER_BASE}/admin/set-engine`, {
                        method:'POST', headers:{'Content-Type':'application/json', ...getAuthHeaders()},
                        body:JSON.stringify({ engine: ST.dark ? 'kv' : 'd1' })
                    }).catch(()=>{});
                }
            });
        })();

        // Authentication
        async function fetchUserInfo() {
            if (!ST.token) return false;
            return withLock(async () => {
                const r = await fetch(`${WORKER_BASE}/user-info?utoken=${ST.token}`);
                if (!r.ok) throw new Error();
                const i = await r.json();
                const wasApproved = ST.approved;
                ST.email = i.email; ST.isAdmin = i.isAdmin === true; ST.approved = i.approved; ST.role = i.role;
                if (!wasApproved && ST.approved) {
                    toast('Access granted! You have been approved.', 'success');
                    render();
                }
                return true;
            }).catch(e => { console.warn(e); return false; });
        }

        function showLogin() {
            if(D.adminBar) D.adminBar.classList.add('hidden');
            if(D.userUI) D.userUI.innerHTML = '';
            if(D.grid) D.grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;"><h2>Welcome to File Vault</h2><p>Sign in to access your files.</p><button class="btn btn-primary" id="btnLogin">🔑 Login with Google</button></div>`;
            const loginBtn = $('btnLogin');
            if(loginBtn) loginBtn.onclick = async () => {
                const r = await fetch(`${WORKER_BASE}/auth-url`);
                if(r.ok) window.location = (await r.json()).authUrl;
                else toast('Login failed','error');
            };
        }

        function showPending() {
            if(D.adminBar) D.adminBar.classList.add('hidden');
            if(D.userUI) D.userUI.innerHTML = '';
            if(D.dropzone) D.dropzone.style.display = 'none';
            const hint = document.querySelector('.hint-text');
            if(hint) hint.style.display = 'none';
            if(D.grid) D.grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;"><h2>🔐 Waiting for Approval</h2><p>Your email: <strong>${ST.email}</strong></p><p>After admin approves you, click <strong>Refresh Status</strong>.</p><div style="margin-top:16px;"><button class="btn btn-outline btn-sm" id="manualRefreshBtn">🔄 Refresh Status</button> <button class="btn btn-danger btn-sm" id="btnSelfRevoke">❌ Cancel Request</button></div></div>`;
            const refreshBtn = $('manualRefreshBtn');
            if(refreshBtn) refreshBtn.onclick = async () => {
                toast('Checking...', 'info');
                await fetchUserInfo();
            };
            const selfRevokeBtn = $('btnSelfRevoke');
            if(selfRevokeBtn) selfRevokeBtn.onclick = async () => {
                if(!confirm('Cancel request?')) return;
                await withLock(async () => {
                    await fetch(`${WORKER_BASE}/user-revoke-self`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({utoken:ST.token}) });
                });
                ST.token = null; localStorage.removeItem('vtoken'); showLogin(); toast('Request cancelled.');
            };
        }

        function showMain() {
            const hint = document.querySelector('.hint-text');
            if(hint) hint.style.display = '';
            if(ST.isAdmin) {
                if(D.adminBar) D.adminBar.classList.remove('hidden');
                if(D.userUI) D.userUI.innerHTML = '';
                if(D.dropzone) D.dropzone.style.display = '';
                loadPendingCount();
            } else {
                if(D.adminBar) D.adminBar.classList.add('hidden');
                if(D.userUI) D.userUI.innerHTML = `<span style="font-size:0.85rem;">👤 ${ST.email} (${ST.role}) <button class="btn btn-sm btn-outline" id="btnUserLogout">🔒 Logout</button></span>`;
                const logoutBtn = $('btnUserLogout');
                if(logoutBtn) logoutBtn.onclick = () => { ST.token = null; localStorage.removeItem('vtoken'); showLogin(); toast('Logged out.'); };
            }
        }

        function render() {
            if(!ST.email) { showLogin(); return; }
            if(ST.isAdmin) { showMain(); fetchFiles(); return; }
            if(!ST.approved) { showPending(); return; }
            showMain(); applyRoleUI(); fetchFiles();
        }

        // ---------- Admin panels ----------
        function safeAddEvent(element, event, handler) { if(element) element.addEventListener(event, handler); }

        safeAddEvent(D.btnSync, 'click', async () => {
            toast('Syncing...', 'info');
            await withLock(async () => {
                const r = await fetch(`${WORKER_BASE}/sync`, { method:'POST', headers:getAuthHeaders() });
                if(!r.ok) throw new Error();
                await fetchFiles();
                toast('Sync done', 'success');

        function togglePanel(panel, loadFn) { if(panel) { panel.classList.toggle('hidden'); if(!panel.classList.contains('hidden')) loadFn(); } }
        async function adminLogout() { if(confirm('Logout as admin?')) { ST.token = null; localStorage.removeItem('vtoken'); showLogin(); toast('Admin logged out'); } }
        async function loadPendingCount() {
            if(!ST.isAdmin || !D.pendingBadge) return;
            const r = await fetch(`${WORKER_BASE}/admin/pending`, { headers:getAuthHeaders() });
            const p = await r.json();
            D.pendingBadge.textContent = p.length;

        }
        function loadPending() {
            if(!D.listAppr) return;
            fetch(`${WORKER_BASE}/admin/pending`, { headers:getAuthHeaders() })
                .then(r=>r.json())
                .then(users => {
                    D.listAppr.innerHTML = users.length ? users.map(u => `<div class="approval-item"><span>${u.email}</span><div><select class="role-sel"><option value="full">Full</option><option value="delete">Delete</option><option value="upload">Upload Only</option><option value="download">Download Only</option><option value="read">Read Only</option><option value="none">None</option></select><button class="btn btn-sm btn-success" data-email="${u.email}">Approve</button><button class="btn btn-sm btn-danger" data-email="${u.email}">Deny</button></div></div>`).join('') : '<p>No pending users.</p>';
                    D.listAppr.querySelectorAll('button').forEach(btn => {
                        btn.addEventListener('click', async () => {
                            const email = btn.dataset.email;

        function loadAllUsers() {
            if(!D.listUsers) return;
            fetch(`${WORKER_BASE}/admin/all-users`, { headers:getAuthHeaders() })
                .then(r=>r.json())
                .then(users => {
                    const active = users.filter(u => u.status !== 'revoked' && u.is_admin !== 1);
                    let html = active.map(u => `<div class="approval-item">
                        <span>${u.email} <span class="status-badge status-${u.status}">${u.status}</span> ${u.role?`(${u.role})` : ''}</span>
                        <div>
                            ${u.status==='pending' ? 
                                `<select class="role-sel-${u.email}"><option value="full">Full</option><option value="delete">Delete</option><option value="upload">Upload Only</option><option value="download">Download</option><option value="read">Read</option><option value="none">None</option></select>
                                <button class="btn-sm btn-success" data-action="approve" data-email="${u.email}">Approve</button>` : ''}
                            ${u.status==='approved' ? 
                                `<select class="role-sel-${u.email}"><option value="full" ${u.role==='full'?'selected':''}>Full</option><option value="delete" ${u.role==='delete'?'selected':''}>Delete</option><option value="upload" ${u.role==='upload'?'selected':''}>Upload Only</option><option value="download" ${u.role==='download'?'selected':''}>Download</option><option value="read" ${u.role==='read'?'selected':''}>Read</option><option value="none" ${u.role==='none'?'selected':''}>None</option></select>
                                <button class="btn-sm btn-primary" data-action="update" data-email="${u.email}">Update</button>
                                <button class="btn-sm btn-danger" data-action="revoke" data-email="${u.email}">Revoke</button>

                    D.listUsers.querySelectorAll('button').forEach(btn => {

                                await withLock(async () => {
                                    await fetch(`${WORKER_BASE}/admin/make-subadmin`, { method:'POST', headers:{'Content-Type':'application/json', ...getAuthHeaders()}, body:JSON.stringify({email, makeAdmin: true}) });

                            else if (action === 'update') endpoint = 'approve';
                            else if (action === 'revoke') endpoint = 'revoke';

                                    await fetch(`${WORKER_BASE}/admin/${endpoint}`, { method:'POST', headers:{'Content-Type':'application/json', ...getAuthHeaders()}, body:JSON.stringify({email, role}) });

        // ---------- File logic -----------------------------
        async function fetchFiles() {
            await withLock(async () => {
                const r = await fetch(`${WORKER_BASE}/list`, { headers:getAuthHeaders() });
                if(!r.ok) throw new Error();
                const data = await r.json();
                ST.files = data.files;
                renderFiles();
            }).catch(e => toast('Failed to load files', 'error'));
        }

        async function loadCardData(publicId) {
            const [commentsRes, tickRes] = await Promise.all([
                fetch(`${WORKER_BASE}/comment/list?fileId=${publicId}`, { headers:getAuthHeaders() }),
                fetch(`${WORKER_BASE}/tick/get?fileId=${publicId}`, { headers:getAuthHeaders() })
            ]);
            const comments = await commentsRes.json();
            const tickData = await tickRes.json();
            return { comments: comments.comments, ticked: tickData.ticked, count: tickData.count };
        }

        async function refreshCard(publicId) {
            const card = document.querySelector(`.card[data-public-id="${publicId}"]`);
            if (!card) return;
            const newData = await loadCardData(publicId);
            cardData.set(publicId, newData);
            // Update tick
            const tickBtn = card.querySelector('.tick-btn');
            if (tickBtn) tickBtn.innerHTML = newData.ticked ? '✅' : '☑️';
            const tickCountSpan = card.querySelector('.tick-count');
            if (tickCountSpan) tickCountSpan.textContent = newData.count;
            // Update comment count
            const commentCountSpan = card.querySelector('.comment-count');
            if (commentCountSpan) commentCountSpan.textContent = newData.comments.length;
            // Update comment list (with permissions)
            const commentList = card.querySelector('.comment-list');
            if (commentList) {
                commentList.innerHTML = newData.comments.map(c => {
                    const canModify = (ST.isAdmin || c.user_email === ST.email);
                    return `
                        <div class="comment" data-comment-id="${c.id}">
                            <span class="comment-text"><strong>${esc(c.user_email)}</strong> ${esc(c.text)}</span>
                            ${canModify ? `<div class="comment-actions">
                                ${c.user_email === ST.email ? `<button class="edit-comment" data-id="${c.id}" data-text="${esc(c.text)}">✏️</button>` : ''}
                                <button class="delete-comment" data-id="${c.id}">🗑</button>
                            </div>` : ''}
                        </div>
                    `;
                }).join('');
                commentList.querySelectorAll('.edit-comment').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const commentId = btn.dataset.id;
                        const oldText = btn.dataset.text;
                        const newText = prompt('Edit comment:', oldText);
                        if (newText && newText !== oldText) {
                            await withLock(async () => {
                                await fetch(`${WORKER_BASE}/comment/edit`, {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json', ...getAuthHeaders() },
                                    body: JSON.stringify({ commentId, text: newText })
                                });
                                await refreshCard(publicId);
                            });
                        }
                    });
                });
                commentList.querySelectorAll('.delete-comment').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        if (!confirm('Delete this comment?')) return;
                        const commentId = btn.dataset.id;
                        await withLock(async () => {
                            await fetch(`${WORKER_BASE}/comment/delete`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json', ...getAuthHeaders() },
                                body: JSON.stringify({ commentId })
                            });
                            await refreshCard(publicId);
                        });
                    });
                });
            }
        }

        async function addComment(publicId, text) {
            if (!text.trim()) return;
            await withLock(async () => {
                await fetch(`${WORKER_BASE}/comment/add`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', ...getAuthHeaders() },
                    body: JSON.stringify({ fileId: publicId, text })
                });
                await refreshCard(publicId);
            }).catch(e => toast('Comment failed', 'error'));
        }

        async function toggleTick(publicId) {
            const data = cardData.get(publicId);
            if (!data) return;
            await withLock(async () => {
                await fetch(`${WORKER_BASE}/tick/set`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', ...getAuthHeaders() },
                    body: JSON.stringify({ fileId: publicId, ticked: !data.ticked })
                });
                await refreshCard(publicId);
            }).catch(e => toast('Tick failed', 'error'));
        }

        function renderFiles() {
            if (!D.grid) return;
            let list = [...ST.files];
            if (ST.query) list = list.filter(f => f.name.toLowerCase().includes(ST.query));
            const s = ST.sort;
            list.sort((a,b) => {
                switch(s) {
                    case 'newest': return b.createdAt - a.createdAt;
                    case 'oldest': return a.createdAt - b.createdAt;
                    case 'name-asc': return a.name.localeCompare(b.name);
                    case 'name-desc': return b.name.localeCompare(a.name);
                    case 'size-desc': return b.size - a.size;
                    case 'size-asc': return a.size - b.size;
                    default: return 0;
                }
            });
            const groups = {};
            list.forEach(f => { const key = f.uploadedBy || 'unknown'; if (!groups[key]) groups[key] = []; groups[key].push(f); });
            D.grid.innerHTML = '';
            if (Object.keys(groups).length === 0) { D.grid.innerHTML = '<p style="text-align:center;padding:30px;">No files yet.</p>'; return; }
            for (const [uploader, files] of Object.entries(groups)) {
                const section = document.createElement('div'); section.className = 'file-section';
                section.innerHTML = `<div class="section-title">📤 ${esc(uploader)} <span>${files.length}</span></div><div class="file-grid"></div>`;
                const gridDiv = section.querySelector('.file-grid');
                files.forEach(f => {
                    const actions = getFileActions(f.publicId);
                    const upBy = f.uploadedBy ? `<div style="font-size:0.7rem; color:var(--text-secondary); margin-bottom:4px;">📤 ${f.uploadedBy}</div>` : '';
                    const thumbnailHtml = getThumbnailHtml(f.mimeType, f.name, f.publicId);
                    const card = document.createElement('div');
                    card.className = `card${ST.selected.has(f.publicId) ? ' selected' : ''}`;
                    card.dataset.publicId = f.publicId;
                    card.innerHTML = `
                        <input type="checkbox" class="card-checkbox" data-id="${f.publicId}" ${ST.selected.has(f.publicId) ? 'checked' : ''}>
                        <div class="thumbnail">${thumbnailHtml}</div>
                        <div class="file-name">${esc(f.name)}</div>
                        <div class="file-meta">${fmtSz(f.size)} · ${new Date(f.createdAt).toLocaleString()}</div>
                        ${upBy}
                        <div class="actions">
                            ${actions.includes('play') ? `<button class="btn-xs btn-xs-play" data-action="play" data-id="${f.publicId}">▶ Play</button>` : ''}
                            ${actions.includes('preview') ? `<button class="btn-xs btn-xs-preview" data-action="preview" data-id="${f.publicId}">🔍 Preview</button>` : ''}
                            ${actions.includes('download') ? `<button class="btn-xs btn-xs-download" data-action="download" data-id="${f.publicId}">⬇ Download</button>` : ''}
                            ${actions.includes('rename') ? `<button class="btn-xs btn-xs-rename" data-action="rename" data-id="${f.publicId}">✏️ Rename</button>` : ''}
                            ${actions.includes('replace') ? `<button class="btn-xs btn-xs-replace" data-action="replace" data-id="${f.publicId}">🔄 Replace</button>` : ''}
                            ${actions.includes('delete') ? `<button class="btn-xs btn-xs-delete" data-action="delete" data-id="${f.publicId}">🗑 Delete</button>` : ''}
                            ${actions.includes('copy') ? `<button class="btn-xs btn-xs-copy" data-action="copy" data-id="${f.publicId}">📋 Copy</button>` : ''}
                            <button class="tick-btn" data-action="tick" data-id="${f.publicId}"></button>
                            <span class="tick-count"></span>
                            <div class="comment-section">
                                <div class="comment-header">
                                    <span class="comment-icon">💬</span>
                                    <span class="comment-count"></span>
                                </div>
                                <div class="comment-list"></div>
                                <div class="comment-form">
                                    <input type="text" placeholder="Add a comment...">
                                    <button class="btn-xs btn-outline post-comment">Post</button>
                                </div>
                            </div>
                        </div>
                    `;
                    gridDiv.appendChild(card);
                    // Load data asynchronously
                    (async () => {
                        const data = await loadCardData(f.publicId);
                        cardData.set(f.publicId, data);
                        const tickBtn = card.querySelector('.tick-btn');
                        if (tickBtn) tickBtn.innerHTML = data.ticked ? '✅' : '☑️';
                        const tickCountSpan = card.querySelector('.tick-count');
                        if (tickCountSpan) tickCountSpan.textContent = data.count;
                        const commentCountSpan = card.querySelector('.comment-count');
                        if (commentCountSpan) commentCountSpan.textContent = data.comments.length;
                        const commentList = card.querySelector('.comment-list');
                        if (commentList) {
                            commentList.innerHTML = data.comments.map(c => {
                                const canModify = (ST.isAdmin || c.user_email === ST.email);
                                return `
                                    <div class="comment" data-comment-id="${c.id}">
                                        <span class="comment-text"><strong>${esc(c.user_email)}</strong> ${esc(c.text)}</span>
                                        ${canModify ? `<div class="comment-actions">
                                            ${c.user_email === ST.email ? `<button class="edit-comment" data-id="${c.id}" data-text="${esc(c.text)}">✏️</button>` : ''}
                                            <button class="delete-comment" data-id="${c.id}">🗑</button>
                                        </div>` : ''}
                                    </div>
                                `;
                            }).join('');
                            commentList.querySelectorAll('.edit-comment').forEach(btn => {
                                btn.addEventListener('click', async (e) => {
                                    const commentId = btn.dataset.id;
                                    const oldText = btn.dataset.text;
                                    const newText = prompt('Edit comment:', oldText);
                                    if (newText && newText !== oldText) {
                                        await withLock(async () => {
                                            await fetch(`${WORKER_BASE}/comment/edit`, {
                                                method: 'POST',
                                                headers: { 'Content-Type': 'application/json', ...getAuthHeaders() },
                                                body: JSON.stringify({ commentId, text: newText })
                                            });
                                            await refreshCard(f.publicId);
                                        });
                                    }
                                });
                            });
                            commentList.querySelectorAll('.delete-comment').forEach(btn => {
                                btn.addEventListener('click', async () => {
                                    if (!confirm('Delete this comment?')) return;
                                    const commentId = btn.dataset.id;
                                    await withLock(async () => {
                                        await fetch(`${WORKER_BASE}/comment/delete`, {
                                            method: 'POST',
                                            headers: { 'Content-Type': 'application/json', ...getAuthHeaders() },
                                            body: JSON.stringify({ commentId })
                                        });
                                        await refreshCard(f.publicId);
                                    });
                                });
                            });
                        }
                        const commentInput = card.querySelector('.comment-form input');
                        const postBtn = card.querySelector('.post-comment');
                        if (postBtn) {
                            postBtn.addEventListener('click', async () => {
                                const text = commentInput.value;
                                if (text.trim()) {
                                    await addComment(f.publicId, text);
                                    commentInput.value = '';
                                }
                            });
                        }
                        const header = card.querySelector('.comment-header');
                        if (header) header.addEventListener('click', () => {
                            const list = card.querySelector('.comment-list');
                            if (list) list.classList.toggle('show');
                        });
                    })();
                });
                D.grid.appendChild(section);
            }
            attachEvents();
            updateBulkBar();
        }

        function getFileActions(pid) {
            if (ST.isAdmin) return ['play','preview','download','rename','replace','delete','copy'];
            if (!ST.role) return [];
            const f = ST.files.find(f => f.publicId === pid);
            if (!f) return [];
            const pt = prevType(f.mimeType);
            const a = [];
            if ((pt === 'video' || pt === 'audio') && ['full','delete','upload','download','read'].includes(ST.role)) a.push('play');
            if (['image','pdf','text'].includes(pt) && ['full','delete','upload','download','read'].includes(ST.role)) a.push('preview');
            if (['full','delete','upload','download'].includes(ST.role)) a.push('download');
            if (['full'].includes(ST.role)) a.push('rename','replace','copy');
            if (['full','delete'].includes(ST.role)) a.push('delete');
            return a;
        }

        function attachEvents() {
            if (!D.grid) return;
            D.grid.querySelectorAll('.card-checkbox').forEach(cb => {
                cb.removeEventListener('change', checkboxHandler);
                cb.addEventListener('change', checkboxHandler);
            });
            D.grid.querySelectorAll('.actions button').forEach(btn => {
                if (btn.classList.contains('tick-btn')) {
                    btn.removeEventListener('click', tickHandler);
                    btn.addEventListener('click', tickHandler);
                } else {
                    btn.removeEventListener('click', actionHandler);
                    btn.addEventListener('click', actionHandler);
                }
            });
            D.grid.querySelectorAll('.card').forEach(card => {
                card.removeEventListener('click', cardClickHandler);
                card.addEventListener('click', cardClickHandler);
            });
        }
        function checkboxHandler(e) { e.stopPropagation(); toggleSelect(e.target.dataset.id, e.target.checked); }
        async function tickHandler(e) { e.stopPropagation(); const pid = e.currentTarget.dataset.id; await toggleTick(pid); }
        function actionHandler(e) { e.stopPropagation(); const action = e.currentTarget.dataset.action, id = e.currentTarget.dataset.id; if (action && action !== 'tick') fileAction(action, id); }
        function cardClickHandler(e) { if (e.target.classList.contains('card-checkbox') || e.target.closest('.actions')) return; const cb = this.querySelector('.card-checkbox'); if (cb) toggleSelect(cb.dataset.id, !cb.checked); }
        function toggleSelect(id, checked) { if (checked) ST.selected.add(id); else ST.selected.delete(id); updateBulkBar(); const card = document.querySelector(`.card[data-public-id="${id}"]`); if (card) card.classList.toggle('selected', checked); }
        function updateBulkBar() { if (D.bulkBar) { if (ST.selected.size) { D.bulkBar.classList.remove('hidden'); if (D.bulkCnt) D.bulkCnt.textContent = `${ST.selected.size} selected`; } else D.bulkBar.classList.add('hidden'); } }
        function fileAction(action, id) {
            switch(action) {
                case 'play': openPreview(id, 'video'); break;
                case 'preview': openPreview(id, prevType(ST.files.find(f=>f.publicId===id)?.mimeType)); break;
                case 'download': window.open(getDownloadUrl(id), '_blank'); break;
                case 'delete': deleteFile(id); break;
                case 'replace': replaceFile(id); break;
                case 'rename': renameFile(id); break;
                case 'copy': copyToClipboard(getDownloadUrl(id)); break;
            }
        }
        async function deleteFile(pid) {
            if (!confirm('Delete?')) return;
            await withLock(async () => {
                const r = await fetch(`${WORKER_BASE}/delete`, { method:'POST', headers:{'Content-Type':'application/json', ...getAuthHeaders()}, body:JSON.stringify({publicId:pid}) });
                if (r.ok) { await fetchFiles(); toast('Deleted'); }
                else throw new Error();
            }).catch(() => toast('Delete failed', 'error'));
        }
        function replaceFile(pid) {
            const inp = document.createElement('input'); inp.type = 'file';
            inp.onchange = async () => {
                const file = inp.files[0];
                if (!file) return;
                await withLock(async () => {
                    const init = await fetch(`${WORKER_BASE}/update`, { method:'POST', headers:{'Content-Type':'application/json', ...getAuthHeaders()}, body:JSON.stringify({publicId:pid,fileName:file.name,fileSize:file.size,fileType:file.type||'application/octet-stream'}) });
                    if (!init.ok) { toast('Replace init failed','error'); return; }
                    const data = await init.json();
                    const replacePublicId = data.publicId;
                    await uploadFile(file, replacePublicId);
                    await fetchFiles();
                });
            };
            inp.click();
        }
        async function renameFile(pid) {
            const f = ST.files.find(f => f.publicId === pid);
            if (!f) return;
            const newName = prompt('New name:', f.name);
            if (!newName || newName === f.name) return;
            await withLock(async () => {
                const r = await fetch(`${WORKER_BASE}/rename`, { method:'POST', headers:{'Content-Type':'application/json', ...getAuthHeaders()}, body:JSON.stringify({publicId:pid,newName}) });
                if (r.ok) { await fetchFiles(); toast('Renamed'); }
                else throw new Error();
            }).catch(() => toast('Rename failed', 'error'));
        }

        // Upload (single file, used by drop/paste/send)
        async function uploadFile(file, existingPid = null) {
            const fileKey = existingPid || file.name + file.size + file.lastModified;
            if (uploadingFiles.has(fileKey)) { toast(`${file.name} already uploading.`, 'info'); return; }
            uploadingFiles.add(fileKey);
            if (ST.uploadCtrl) ST.uploadCtrl.abort();
            ST.uploadCtrl = new AbortController();
            if (D.progBox) D.progBox.classList.remove('hidden');
            try {
                let pid = existingPid;
                if (!pid) {
                    const initRes = await fetch(`${WORKER_BASE}/upload-init`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', ...getAuthHeaders() },
                        body: JSON.stringify({ fileName: file.name, fileSize: file.size, fileType: file.type || 'application/octet-stream' }),
                        signal: ST.uploadCtrl.signal
                    });
                    if (!initRes.ok) throw new Error('Init failed');
                    const initData = await initRes.json();
                    pid = initData.publicId;
                }
                const CHUNK = 10 * 1024 * 1024;
                let uploaded = 0, lastBytes = 0, lastTime = Date.now();
                while (uploaded < file.size) {
                    if (ST.uploadCtrl.signal.aborted) throw new Error('Cancelled');
                    const end = Math.min(uploaded + CHUNK - 1, file.size - 1);
                    const chunk = file.slice(uploaded, end + 1);
                    let retries = 3, done = false;
                    while (retries-- && !done) {
                        const chunkRes = await fetch(`${WORKER_BASE}/upload-chunk/${pid}`, {
                            method: 'PUT',
                            headers: { 'Content-Range': `bytes ${uploaded}-${end}/${file.size}`, ...getAuthHeaders() },
                            body: chunk,
                            signal: ST.uploadCtrl.signal
                        });
                        const data = await chunkRes.json();
                        if (chunkRes.ok) {
                            if (data.complete === true || data.status === 'complete') { done = true; break; }
                            if (typeof data.uploadedBytes === 'number') {
                                uploaded = data.uploadedBytes;
                                const now = Date.now();
                                const timeDiff = Math.max(1, now - lastTime);
                                const speed = ((uploaded - lastBytes) / timeDiff) * 1000;
                                updateProgress(uploaded, file.size, speed);
                                lastBytes = uploaded; lastTime = now;
                            }
                            done = true;
                        } else {
                            if (retries <= 0) throw new Error(data.error || 'Chunk error');
                            await sleep(1000);
                        }
                    }
                    if (done && uploaded >= file.size) break;
                    if (!done) {
                        const statusRes = await fetch(`${WORKER_BASE}/upload-status/${pid}`, { headers: getAuthHeaders(), signal: ST.uploadCtrl.signal });
                        if (statusRes.ok) { const s = await statusRes.json(); uploaded = s.uploadedBytes || uploaded; updateProgress(uploaded, file.size, 0); }
                    }
                }
                toast(`${file.name} uploaded`, 'success');
                await fetchFiles();
            } catch (err) {
                if (err.message !== 'Cancelled') toast(`Upload failed: ${err.message}`, 'error');
            } finally {
                if (D.progBox) D.progBox.classList.add('hidden');
                ST.uploadCtrl = null;
                uploadingFiles.delete(fileKey);
            }
        }
        function updateProgress(uploaded, total, speedBps) {
            const p = Math.round(uploaded / total * 100);
            if (D.progFill) D.progFill.style.width = p + '%';
            if (D.pctDisp) D.pctDisp.textContent = p + '%';
            if (D.speedDisp) D.speedDisp.textContent = speedBps ? fmtSpeed(speedBps) : '--';
            if (D.sizeDisp) D.sizeDisp.textContent = `${fmtSz(uploaded)} / ${fmtSz(total)}`;
        }
        const sleep = ms => new Promise(r => setTimeout(r, ms));
        safeAddEvent(D.cancelBtn, 'click', () => { if (ST.uploadCtrl) { ST.uploadCtrl.abort(); ST.uploadCtrl = null; if (D.progBox) D.progBox.classList.add('hidden'); } });

        // Paste & Send: store pasted files, upload when Send clicked
        document.addEventListener('paste', (e) => {
            const items = e.clipboardData.items;
            const files = [];
            for (let i = 0; i < items.length; i++) {
                if (items[i].kind === 'file') {
                    const file = items[i].getAsFile();
                    files.push(file);
                }
            }
            if (files.length) {
                pendingPasteFiles = files;
                D.pasteInput.value = `${files.length} file(s) pasted. Click Send to upload.`;
                toast(`${files.length} file(s) pasted. Click Send to upload.`, 'info');
            } else {
                toast('No file found in clipboard. Use Ctrl+V on a file.', 'info');
            }
        });
        safeAddEvent(D.sendPasteBtn, 'click', async () => {
            if (pendingPasteFiles.length === 0) {
                toast('No pasted files. Paste a file first (Ctrl+V).', 'info');
                return;
            }
            toast(`Uploading ${pendingPasteFiles.length} file(s)...`, 'info');
            for (const file of pendingPasteFiles) {
                await uploadFile(file);
            }
            pendingPasteFiles = [];
            D.pasteInput.value = '';
        });

        // Preview
        function openPreview(pid, type) {
            if (!D.prevCont) return;
            D.prevCont.innerHTML = '';
            const url = getPreviewUrl(pid);
            if (type === 'video') {
                const video = document.createElement('video');
                video.src = url; video.controls = true; video.autoplay = true; video.style.width = '100%'; video.style.height = '100%'; video.style.objectFit = 'contain';
                D.prevCont.appendChild(video);
            } else if (type === 'audio') {
                const audio = document.createElement('audio');
                audio.src = url; audio.controls = true; audio.autoplay = true; audio.style.width = '100%';
                D.prevCont.appendChild(audio);
            } else if (type === 'image') {
                const img = document.createElement('img'); img.src = url; img.style.maxWidth = '95%'; img.style.maxHeight = '95%';
                D.prevCont.appendChild(img);
            } else if (type === 'pdf') {
                const ifr = document.createElement('iframe'); ifr.src = url; ifr.style.width = '90%'; ifr.style.height = '90%';
                D.prevCont.appendChild(ifr);
            } else if (type === 'text') {
                fetch(url, { headers: getAuthHeaders() }).then(r => r.text()).then(t => { const pre = document.createElement('pre'); pre.textContent = t; D.prevCont.appendChild(pre); });
            } else { return; }
            if (D.prevOv) D.prevOv.classList.remove('hidden');
        }
        function closePreview() { if (D.prevCont) D.prevCont.innerHTML = ''; if (D.prevOv) D.prevOv.classList.add('hidden'); if (document.fullscreenElement) document.exitFullscreen(); }
        safeAddEvent(D.btnCloseP, 'click', closePreview);
        safeAddEvent(D.btnFull, 'click', () => { if (document.fullscreenElement) document.exitFullscreen(); else if (D.prevOv) D.prevOv.requestFullscreen(); });

        function applyRoleUI() {
            const canUpload = ['full','delete','upload'].includes(ST.role);
            if (D.dropzone) D.dropzone.style.display = canUpload ? '' : 'none';
            const hint = document.querySelector('.hint-text');
            if (hint) hint.style.display = canUpload ? '' : 'none';
        }

        // Share preview (when ?share= token)
        async function showSharePreview() {
            const res = await fetch(`${WORKER_BASE}/share/verify?token=${ST.shareToken}`);
            if (!res.ok) { toast('Invalid or expired share link', 'error'); showLogin(); return; }
            const data = await res.json();
            if (D.grid) D.grid.innerHTML = `
                <div style="grid-column:1/-1;text-align:center;padding:60px;">
                    <div class="thumbnail" style="font-size:4rem;">${getThumbnailHtml(data.mimeType, data.fileName, data.publicId)}</div>
                    <h2>${esc(data.fileName)}</h2>
                    <p>${fmtSz(data.fileSize)}</p>
                    <button class="btn btn-primary" id="shareDownloadBtn">⬇ Download</button>
                    <button class="btn btn-outline" onclick="location.href='/'">🔐 Login to Vault</button>
                </div>`;
            const shareBtn = $('shareDownloadBtn');
            if (shareBtn) shareBtn.addEventListener('click', () => {
                window.location.href = `${WORKER_BASE}/share/download?token=${ST.shareToken}`;
            });
            if (D.dropzone) D.dropzone.style.display = 'none';
            const hint = document.querySelector('.hint-text');
            if (hint) hint.style.display = 'none';
            if (D.adminBar) D.adminBar.classList.add('hidden');
            if (D.userUI) D.userUI.innerHTML = '';
        }

        // Drag & drop, regular file input
        if (D.dropzone) {
            ['dragenter','dragover','dragleave','drop'].forEach(ev => D.dropzone.addEventListener(ev, e => e.preventDefault()));
            ['dragenter','dragover'].forEach(ev => D.dropzone.addEventListener(ev, () => D.dropzone.classList.add('dragover')));
            ['dragleave','drop'].forEach(ev => D.dropzone.addEventListener(ev, () => D.dropzone.classList.remove('dragover')));
            D.dropzone.addEventListener('drop', e => { const files = e.dataTransfer.files; if (files.length) handleFiles(files); });
            D.dropzone.addEventListener('click', () => D.fileInp.click());
        }
        if (D.fileInp) D.fileInp.addEventListener('change', e => handleFiles(e.target.files));
        function handleFiles(files) { for (const f of files) uploadFile(f); }
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && e.key === 'u') { e.preventDefault(); if (D.fileInp) D.fileInp.click(); }
            if (e.ctrlKey && e.key === 'f') { e.preventDefault(); if (D.search) D.search.focus(); }
            if (e.key === 'Escape') closePreview();
        });
        if (D.search) D.search.addEventListener('input', () => { ST.query = D.search.value.toLowerCase(); renderFiles(); });
        if (D.sortSel) D.sortSel.addEventListener('change', () => { ST.sort = D.sortSel.value; localStorage.setItem('sort', ST.sort); renderFiles(); D.sortSel.value = ST.sort; });

        // Init
        async function init() {
            const p = new URLSearchParams(location.search);
            const utoken = p.get('utoken');
            const share = p.get('share');
            const err = p.get('auth_error');
            if (share) {
                ST.shareToken = share;
                history.replaceState({}, '', location.pathname);
                await showSharePreview();
                return;
            }
            if (err) { toast('Auth error: ' + err.replace(/_/g, ' '), 'error'); history.replaceState({}, '', location.pathname); }
            if (utoken) {
                ST.token = utoken;
                localStorage.setItem('vtoken', utoken);
                history.replaceState({}, '', location.pathname);
            }
            if (ST.token && await fetchUserInfo()) {
                render();
                return;
            }
            showLogin();
        }
        init();
    </script>
</body>
</html>
