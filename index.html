<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault — Secure File Storage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── Design Tokens ────────────────────────────────────── */
:root {
  --c-bg:        #0a0a0f;
  --c-surface:   #111118;
  --c-surface2:  #1a1a26;
  --c-border:    rgba(255,255,255,0.07);
  --c-border2:   rgba(255,255,255,0.13);
  --c-text:      #e8e8f0;
  --c-text2:     #6e6e8a;
  --c-text3:     #3e3e5a;
  --c-accent:    #7c6aff;
  --c-accent2:   #a78bfa;
  --c-green:     #22d3a4;
  --c-red:       #ff4d6d;
  --c-yellow:    #f5c542;
  --c-blue:      #38bdf8;
  --r:           10px;
  --r-lg:        16px;
  --shadow:      0 4px 32px rgba(0,0,0,0.5);
  --shadow-lg:   0 8px 48px rgba(0,0,0,0.7);
  --font-ui:     'Syne', sans-serif;
  --font-mono:   'Space Mono', monospace;
  --transition:  0.18s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="light"] {
  --c-bg:        #f0f0f8;
  --c-surface:   #ffffff;
  --c-surface2:  #f5f5ff;
  --c-border:    rgba(0,0,0,0.07);
  --c-border2:   rgba(0,0,0,0.13);
  --c-text:      #1a1a2e;
  --c-text2:     #6e6e8a;
  --c-text3:     #aaaacc;
  --shadow:      0 4px 20px rgba(0,0,0,0.08);
  --shadow-lg:   0 8px 40px rgba(0,0,0,0.12);
}

/* ── Reset & Base ─────────────────────────────────────── */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body {
  font-family: var(--font-ui);
  background: var(--c-bg);
  color: var(--c-text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Background grid texture */
body::before {
  content:'';
  position:fixed; inset:0;
  background-image:
    linear-gradient(rgba(124,106,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(124,106,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events:none; z-index:0;
}

.wrap { position:relative; z-index:1; max-width:1180px; margin:0 auto; padding:28px 20px 60px; }

/* ── Glow orbs ────────────────────────────────────────── */
.orb {
  position:fixed; border-radius:50%; filter:blur(120px);
  pointer-events:none; opacity:0.15; z-index:0;
  transition: opacity 2s;
}
.orb-1 { width:500px; height:500px; background:var(--c-accent); top:-200px; right:-150px; }
.orb-2 { width:400px; height:400px; background:#38bdf8; bottom:-100px; left:-100px; }

/* ── Header ───────────────────────────────────────────── */
.header {
  display:flex; justify-content:space-between; align-items:center;
  flex-wrap:wrap; gap:12px; margin-bottom:32px;
  padding-bottom:24px; border-bottom:1px solid var(--c-border);
}
.brand {
  display:flex; align-items:center; gap:14px;
}
.brand-icon {
  width:42px; height:42px;
  background: linear-gradient(135deg, var(--c-accent), var(--c-blue));
  border-radius:10px; display:flex; align-items:center; justify-content:center;
  font-size:1.2rem; box-shadow:0 0 24px rgba(124,106,255,0.4);
}
.brand-name {
  font-size:1.5rem; font-weight:800; letter-spacing:-0.02em;
  background:linear-gradient(135deg, var(--c-text) 60%, var(--c-accent2));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.brand-sub { font-size:0.7rem; font-family:var(--font-mono); color:var(--c-text2); letter-spacing:0.1em; text-transform:uppercase; }

.header-right { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }

.stats-pill {
  font-family:var(--font-mono); font-size:0.72rem; color:var(--c-text2);
  background:var(--c-surface2); border:1px solid var(--c-border); border-radius:100px;
  padding:5px 12px; white-space:nowrap;
}

/* ── Buttons ──────────────────────────────────────────── */
.btn {
  display:inline-flex; align-items:center; gap:6px;
  padding:8px 14px; border-radius:var(--r); border:none;
  font-family:var(--font-ui); font-size:0.82rem; font-weight:600;
  cursor:pointer; transition:var(--transition);
  white-space:nowrap; touch-action:manipulation;
  min-height:36px;
}
.btn:active { transform:scale(0.96); }
.btn-ghost {
  background:transparent; color:var(--c-text2);
  border:1px solid var(--c-border);
}
.btn-ghost:hover { background:var(--c-surface2); color:var(--c-text); border-color:var(--c-border2); }
.btn-primary {
  background:var(--c-accent); color:#fff;
  box-shadow:0 0 20px rgba(124,106,255,0.35);
}
.btn-primary:hover { background:#6857e8; box-shadow:0 0 28px rgba(124,106,255,0.5); }
.btn-danger { background:rgba(255,77,109,0.15); color:var(--c-red); border:1px solid rgba(255,77,109,0.25); }
.btn-danger:hover { background:rgba(255,77,109,0.25); }
.btn-success { background:rgba(34,211,164,0.15); color:var(--c-green); border:1px solid rgba(34,211,164,0.25); }
.btn-warn { background:rgba(245,197,66,0.15); color:var(--c-yellow); border:1px solid rgba(245,197,66,0.25); }
.btn-sm { padding:5px 10px; font-size:0.75rem; min-height:30px; border-radius:7px; }
.btn-icon {
  width:36px; height:36px; padding:0; border-radius:8px;
  display:flex; align-items:center; justify-content:center; font-size:1rem;
  background:var(--c-surface2); border:1px solid var(--c-border); color:var(--c-text2);
  cursor:pointer; transition:var(--transition);
}
.btn-icon:hover { color:var(--c-text); border-color:var(--c-border2); }

/* ── Admin Bar ────────────────────────────────────────── */
.admin-bar {
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  padding:12px 16px; margin-bottom:16px;
  background:linear-gradient(135deg, rgba(124,106,255,0.08), rgba(56,189,248,0.05));
  border:1px solid rgba(124,106,255,0.2); border-radius:var(--r-lg);
  font-size:0.82rem;
}
.admin-bar.hidden { display:none; }
.admin-label {
  font-family:var(--font-mono); font-size:0.7rem; font-weight:700;
  color:var(--c-accent2); letter-spacing:0.1em; text-transform:uppercase;
  padding:3px 8px; background:rgba(124,106,255,0.15); border-radius:4px;
  border:1px solid rgba(124,106,255,0.3);
}
.admin-spacer { flex:1; }
.pending-badge {
  display:inline-flex; align-items:center; justify-content:center;
  width:18px; height:18px; border-radius:50%;
  background:var(--c-red); color:#fff; font-size:0.65rem; font-weight:700;
  margin-left:4px; display:none;
}

/* ── Approval Panel ───────────────────────────────────── */
.approval-panel {
  background:var(--c-surface); border:1px solid var(--c-border);
  border-radius:var(--r-lg); padding:20px; margin-bottom:20px;
  display:none; animation:fadeDown 0.2s ease;
}
.approval-panel.open { display:block; }
.panel-title { font-size:1rem; font-weight:700; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
.approval-item {
  display:flex; justify-content:space-between; align-items:center;
  padding:12px 0; border-bottom:1px solid var(--c-border);
  gap:10px; flex-wrap:wrap;
}
.approval-item:last-child { border-bottom:none; }
.approval-email { font-family:var(--font-mono); font-size:0.8rem; color:var(--c-text2); }
.approval-time { font-size:0.72rem; color:var(--c-text3); margin-top:2px; }
.role-select {
  padding:5px 8px; border-radius:6px; border:1px solid var(--c-border);
  background:var(--c-surface2); color:var(--c-text); font-size:0.8rem;
  font-family:var(--font-ui); cursor:pointer;
}

/* ── Users Panel ──────────────────────────────────────── */
.users-panel {
  background:var(--c-surface); border:1px solid var(--c-border);
  border-radius:var(--r-lg); padding:20px; margin-bottom:20px;
  display:none;
}
.users-panel.open { display:block; animation:fadeDown 0.2s ease; }
.user-item {
  display:flex; justify-content:space-between; align-items:center;
  padding:10px 0; border-bottom:1px solid var(--c-border); gap:10px; flex-wrap:wrap;
}
.user-item:last-child { border-bottom:none; }

/* ── Toolbar ──────────────────────────────────────────── */
.toolbar {
  display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px; align-items:center;
}
.search-wrap { position:relative; flex:1; min-width:200px; }
.search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--c-text3); pointer-events:none; font-size:0.9rem; }
.search-box {
  width:100%; padding:10px 14px 10px 36px;
  background:var(--c-surface); border:1px solid var(--c-border);
  border-radius:var(--r); font-family:var(--font-ui); font-size:0.88rem;
  color:var(--c-text); outline:none; transition:var(--transition);
}
.search-box::placeholder { color:var(--c-text3); }
.search-box:focus { border-color:var(--c-accent); box-shadow:0 0 0 3px rgba(124,106,255,0.15); }
.sort-select {
  padding:10px 14px; background:var(--c-surface); border:1px solid var(--c-border);
  border-radius:var(--r); font-family:var(--font-ui); font-size:0.82rem;
  color:var(--c-text); cursor:pointer; outline:none;
}
.sort-select:focus { border-color:var(--c-accent); }

/* ── Hint Bar ─────────────────────────────────────────── */
.hint-bar {
  font-family:var(--font-mono); font-size:0.7rem; color:var(--c-text3);
  text-align:center; margin-bottom:16px; letter-spacing:0.03em;
}
.hint-bar kbd {
  background:var(--c-surface2); border:1px solid var(--c-border2);
  border-radius:4px; padding:2px 6px; font-family:var(--font-mono); font-size:0.7rem;
  color:var(--c-text2);
}

/* ── Drop Zone ────────────────────────────────────────── */
.dropzone {
  position:relative; overflow:hidden;
  background:var(--c-surface);
  border:2px dashed var(--c-border2);
  border-radius:var(--r-lg); padding:48px 20px;
  text-align:center; cursor:pointer; transition:var(--transition);
  margin-bottom:20px;
}
.dropzone::before {
  content:''; position:absolute; inset:0; opacity:0; transition:var(--transition);
  background:radial-gradient(ellipse at center, rgba(124,106,255,0.08) 0%, transparent 70%);
}
.dropzone:hover, .dropzone.dragover {
  border-color:var(--c-accent);
  box-shadow:0 0 0 4px rgba(124,106,255,0.1);
}
.dropzone:hover::before, .dropzone.dragover::before { opacity:1; }
.dropzone input { display:none; }
.dz-icon { font-size:2.5rem; margin-bottom:10px; opacity:0.6; }
.dz-title { font-size:1rem; font-weight:700; margin-bottom:6px; color:var(--c-text); }
.dz-sub { font-size:0.8rem; color:var(--c-text2); }

/* ── Progress ─────────────────────────────────────────── */
.progress-wrap { margin-bottom:16px; display:none; }
.progress-bar {
  height:6px; background:var(--c-surface2); border-radius:100px; overflow:hidden;
  box-shadow:0 0 0 1px var(--c-border);
}
.progress-fill {
  height:100%; width:0%; border-radius:100px;
  background:linear-gradient(90deg, var(--c-accent), var(--c-blue));
  transition:width 0.25s ease; box-shadow:0 0 8px rgba(124,106,255,0.5);
}
.progress-meta {
  display:flex; justify-content:space-between; align-items:center;
  margin-top:8px; font-family:var(--font-mono); font-size:0.72rem; color:var(--c-text2);
}
.progress-filename { font-size:0.78rem; font-weight:600; margin-bottom:6px; color:var(--c-text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* ── Bulk Bar ─────────────────────────────────────────── */
.bulk-bar {
  display:none; align-items:center; gap:10px; flex-wrap:wrap;
  padding:10px 16px; margin-bottom:12px;
  background:rgba(124,106,255,0.1); border:1px solid rgba(124,106,255,0.25);
  border-radius:var(--r); font-size:0.82rem; animation:fadeIn 0.15s ease;
}
.bulk-bar.active { display:flex; }
.bulk-count { font-weight:700; color:var(--c-accent2); }
.bulk-spacer { flex:1; }

/* ── File Grid ────────────────────────────────────────── */
.file-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
  gap:14px;
}
.empty-state {
  grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--c-text2);
}
.empty-icon { font-size:3rem; margin-bottom:12px; opacity:0.4; }
.empty-text { font-size:0.9rem; }

/* ── File Card ────────────────────────────────────────── */
.card {
  position:relative; overflow:hidden;
  background:var(--c-surface); border:1px solid var(--c-border);
  border-radius:var(--r-lg); padding:16px;
  display:flex; flex-direction:column; gap:0;
  transition:var(--transition);
  cursor:pointer; /* for selection */
}
.card::after {
  content:''; position:absolute; inset:0; opacity:0; transition:var(--transition);
  background:linear-gradient(135deg, rgba(124,106,255,0.04) 0%, transparent 100%);
  pointer-events:none;
}
.card:hover { border-color:var(--c-border2); transform:translateY(-2px); box-shadow:var(--shadow); }
.card:hover::after { opacity:1; }
.card.selected { border-color:var(--c-accent); box-shadow:0 0 0 3px rgba(124,106,255,0.15); }
.card.uploading { opacity:0.5; pointer-events:none; }
.card.uploading::before {
  content:''; position:absolute; inset:0; z-index:1;
  background:repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(124,106,255,0.04) 10px, rgba(124,106,255,0.04) 20px);
  animation:shimmer 1.5s linear infinite;
}
@keyframes shimmer { 0%{background-position:0 0} 100%{background-position:40px 40px} }

.card-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:12px; }
.card-checkbox { width:16px; height:16px; accent-color:var(--c-accent); cursor:pointer; flex-shrink:0; }

.file-icon-wrap {
  width:44px; height:44px; border-radius:10px; display:flex; align-items:center; justify-content:center;
  font-size:1.5rem; flex-shrink:0;
}
.fi-video { background:rgba(56,189,248,0.12); border:1px solid rgba(56,189,248,0.2); }
.fi-audio { background:rgba(124,106,255,0.12); border:1px solid rgba(124,106,255,0.2); }
.fi-image { background:rgba(34,211,164,0.12); border:1px solid rgba(34,211,164,0.2); }
.fi-pdf   { background:rgba(255,77,109,0.12);  border:1px solid rgba(255,77,109,0.2); }
.fi-text  { background:rgba(245,197,66,0.12);  border:1px solid rgba(245,197,66,0.2); }
.fi-other { background:rgba(255,255,255,0.05); border:1px solid var(--c-border); }

.card-header-info { flex:1; min-width:0; padding:0 10px; }
.file-name {
  font-weight:700; font-size:0.88rem; word-break:break-all; line-height:1.3;
  margin-bottom:4px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}
.file-meta { font-family:var(--font-mono); font-size:0.7rem; color:var(--c-text2); }

.file-type-badge {
  font-family:var(--font-mono); font-size:0.62rem; letter-spacing:0.05em; font-weight:700;
  padding:2px 7px; border-radius:4px; text-transform:uppercase; flex-shrink:0;
  background:var(--c-surface2); border:1px solid var(--c-border); color:var(--c-text2);
}

.card-actions { display:flex; flex-wrap:wrap; gap:6px; margin-top:14px; padding-top:12px; border-top:1px solid var(--c-border); }

/* ── Preview Overlay ──────────────────────────────────── */
.preview-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.96); z-index:1000;
  backdrop-filter:blur(16px);
}
.preview-overlay.active { display:flex; flex-direction:column; }
.preview-topbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 20px; background:rgba(255,255,255,0.04);
  border-bottom:1px solid rgba(255,255,255,0.07); flex-shrink:0;
}
.preview-title { font-size:0.9rem; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:60%; }
.preview-actions { display:flex; gap:8px; }
.preview-body {
  flex:1; display:flex; align-items:center; justify-content:center; overflow:hidden; padding:20px;
}
.preview-body img { max-width:100%; max-height:100%; object-fit:contain; border-radius:4px; }
.preview-body video { max-width:100%; max-height:100%; outline:none; }
.preview-body audio { width:80%; max-width:500px; }
.preview-body iframe { width:100%; height:100%; border:none; border-radius:4px; }
.preview-body pre {
  background:#0d0d14; color:#d4d4d8; padding:28px; overflow:auto;
  white-space:pre-wrap; word-break:break-all; width:100%; max-width:900px; max-height:100%;
  border-radius:10px; font-family:var(--font-mono); font-size:0.85rem; line-height:1.6;
  border:1px solid rgba(255,255,255,0.07);
}
.preview-close-bg { position:absolute; inset:0; z-index:-1; cursor:pointer; }

/* ── Login Screen ─────────────────────────────────────── */
.login-screen {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:70vh; gap:20px; text-align:center;
  animation:fadeIn 0.4s ease;
}
.login-logo {
  width:72px; height:72px;
  background:linear-gradient(135deg, var(--c-accent), var(--c-blue));
  border-radius:20px; display:flex; align-items:center; justify-content:center;
  font-size:2rem; box-shadow:0 0 40px rgba(124,106,255,0.4); margin-bottom:8px;
}
.login-title { font-size:2rem; font-weight:800; letter-spacing:-0.03em; }
.login-sub { color:var(--c-text2); font-size:0.9rem; max-width:340px; line-height:1.6; }
.login-btns { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin-top:8px; }
.login-divider { color:var(--c-text3); font-size:0.8rem; }

/* ── Approval Screen ──────────────────────────────────── */
.approval-screen {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:70vh; gap:16px; text-align:center; animation:fadeIn 0.4s ease;
}
.approval-icon {
  width:64px; height:64px; background:rgba(124,106,255,0.12); border:1px solid rgba(124,106,255,0.3);
  border-radius:16px; display:flex; align-items:center; justify-content:center; font-size:1.8rem;
}
.approval-email-pill {
  font-family:var(--font-mono); font-size:0.8rem; color:var(--c-accent2);
  background:rgba(124,106,255,0.1); border:1px solid rgba(124,106,255,0.25);
  border-radius:100px; padding:5px 14px;
}

/* ── Toast ────────────────────────────────────────────── */
.toast-wrap { position:fixed; bottom:24px; right:24px; z-index:9999; display:flex; flex-direction:column-reverse; gap:8px; max-width:360px; }
.toast {
  display:flex; align-items:center; gap:10px;
  padding:12px 16px; border-radius:10px; font-size:0.83rem; font-weight:600;
  box-shadow:var(--shadow-lg); animation:slideRight 0.25s ease; color:#fff;
}
.toast-info    { background:#1e1e30; border:1px solid var(--c-border2); color:var(--c-text); }
.toast-success { background:rgba(34,211,164,0.15); border:1px solid rgba(34,211,164,0.3); color:var(--c-green); }
.toast-error   { background:rgba(255,77,109,0.15);  border:1px solid rgba(255,77,109,0.3);  color:var(--c-red); }
.toast-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.toast-info    .toast-dot { background:var(--c-text2); }
.toast-success .toast-dot { background:var(--c-green); }
.toast-error   .toast-dot { background:var(--c-red); }

/* ── Section loader ───────────────────────────────────── */
.skeleton-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px,1fr)); gap:14px; }
.skeleton-card { height:160px; background:var(--c-surface); border:1px solid var(--c-border); border-radius:var(--r-lg); overflow:hidden; }
.skeleton-card::after {
  content:''; display:block; height:100%;
  background:linear-gradient(90deg, transparent 30%, rgba(255,255,255,0.04) 50%, transparent 70%);
  background-size:200% 100%; animation:skeletonShimmer 1.4s ease infinite;
}
@keyframes skeletonShimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* ── Scrollbar ────────────────────────────────────────── */
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--c-border2); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--c-text3); }

/* ── Animations ───────────────────────────────────────── */
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
@keyframes slideRight { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }

/* ── Responsive ───────────────────────────────────────── */
@media (max-width:600px) {
  .wrap { padding:16px 12px 40px; }
  .file-grid, .skeleton-grid { grid-template-columns:1fr; }
  .toolbar { flex-direction:column; }
  .admin-bar { flex-direction:column; align-items:flex-start; }
}
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="wrap">
  <!-- Header -->
  <div class="header">
    <div class="brand">
      <div class="brand-icon">🔒</div>
      <div>
        <div class="brand-name">Vault</div>
        <div class="brand-sub">Secure File Storage</div>
      </div>
    </div>
    <div class="header-right">
      <span class="stats-pill" id="storageStats"></span>
      <span id="userPill"></span>
      <button class="btn-icon" id="btnTheme" title="Toggle theme" aria-label="Toggle theme">🌓</button>
    </div>
  </div>

  <!-- Admin Bar -->
  <div class="admin-bar hidden" id="adminBar">
    <span class="admin-label">⚡ Admin</span>
    <button class="btn btn-ghost btn-sm" id="btnSync">↻ Sync Drive</button>
    <button class="btn btn-ghost btn-sm" id="btnApprovals">
      Approvals
      <span class="pending-badge" id="pendingBadge">0</span>
    </button>
    <button class="btn btn-ghost btn-sm" id="btnUsers">Users</button>
    <span class="admin-spacer"></span>
    <button class="btn btn-danger btn-sm" id="btnAdminLogout">Logout Admin</button>
  </div>

  <!-- Approval Panel -->
  <div class="approval-panel" id="approvalPanel">
    <div class="panel-title">🕐 Pending Approvals</div>
    <div id="approvalList"></div>
  </div>

  <!-- Users Panel -->
  <div class="users-panel" id="usersPanel">
    <div class="panel-title">👥 Approved Users</div>
    <div id="usersList"></div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar" id="toolbar" style="display:none">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" class="search-box" id="searchInput" placeholder="Search files…" aria-label="Search files">
    </div>
    <select class="sort-select" id="sortSelect" aria-label="Sort">
      <option value="newest">Newest</option>
      <option value="oldest">Oldest</option>
      <option value="name-asc">Name A→Z</option>
      <option value="name-desc">Name Z→A</option>
      <option value="size-desc">Largest</option>
      <option value="size-asc">Smallest</option>
    </select>
  </div>

  <!-- Bulk Bar -->
  <div class="bulk-bar" id="bulkBar">
    <span class="bulk-count" id="bulkCount">0 selected</span>
    <span class="bulk-spacer"></span>
    <button class="btn btn-danger btn-sm" id="btnBulkDelete">🗑 Delete Selected</button>
    <button class="btn btn-ghost btn-sm" id="btnBulkCancel">✕ Clear</button>
  </div>

  <!-- Hint Bar -->
  <div class="hint-bar" id="hintBar" style="display:none">
    <kbd>Ctrl</kbd>+<kbd>V</kbd> paste &ensp;·&ensp;
    <kbd>Ctrl</kbd>+<kbd>U</kbd> upload &ensp;·&ensp;
    <kbd>Ctrl</kbd>+<kbd>F</kbd> search &ensp;·&ensp;
    <kbd>Esc</kbd> close
  </div>

  <!-- Drop Zone -->
  <div class="dropzone" id="dropzone" style="display:none">
    <div class="dz-icon">📂</div>
    <div class="dz-title">Drop files here or click to browse</div>
    <div class="dz-sub">Supports any file type · Multiple files allowed</div>
    <input type="file" id="fileInput" multiple>
  </div>

  <!-- Progress -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-filename" id="progressName"></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-meta">
      <span id="percentDisplay">0%</span>
      <span id="sizeDisplay">—</span>
      <button class="btn btn-danger btn-sm" id="cancelUpload">✕ Cancel</button>
    </div>
  </div>

  <!-- File Grid -->
  <div id="fileGrid"></div>
</div>

<!-- Preview Overlay -->
<div class="preview-overlay" id="previewOverlay" role="dialog" aria-modal="true">
  <div class="preview-close-bg" id="previewBg"></div>
  <div class="preview-topbar">
    <div class="preview-title" id="previewTitle">Preview</div>
    <div class="preview-actions">
      <button class="btn btn-ghost btn-sm" id="btnFullscreen">⛶ Fullscreen</button>
      <button class="btn btn-ghost btn-sm" id="btnClosePreview">✕ Close</button>
    </div>
  </div>
  <div class="preview-body" id="previewBody"></div>
</div>

<!-- Toast Container -->
<div class="toast-wrap" id="toastWrap"></div>

<script>
// ══════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════
const WORKER_BASE = 'https://gdrive-files-api.donthulanithish53.workers.dev';

// ══════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════
const state = {
  files: [],
  selected: new Set(),
  sort: 'newest',
  search: '',
  userEmail: null,
  userApproved: false,
  userRole: null,
  userToken: null,
  isAdmin: false,
  adminToken: null,
  uploadAbort: null,
};

// ══════════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════════
const $ = id => document.getElementById(id);

function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.innerHTML = `<span class="toast-dot"></span><span>${msg}</span>`;
  $('toastWrap').appendChild(el);
  setTimeout(() => {
    el.style.transition = 'opacity 0.3s, transform 0.3s';
    el.style.opacity = '0'; el.style.transform = 'translateX(20px)';
    setTimeout(() => el.remove(), 300);
  }, 3200);
}

function fmtBytes(b) {
  if (!b || isNaN(b)) return '—';
  const units = ['B','KB','MB','GB','TB'];
  let i = 0, v = b;
  while (v >= 1024 && i < units.length - 1) { v /= 1024; i++; }
  return v.toFixed(1) + ' ' + units[i];
}

function fmtDate(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000)   return 'just now';
  if (diff < 3600000) return `${Math.floor(diff/60000)}m ago`;
  if (diff < 86400000)return `${Math.floor(diff/3600000)}h ago`;
  if (diff < 604800000) return `${Math.floor(diff/86400000)}d ago`;
  return d.toLocaleDateString();
}

function esc(s) {
  const el = document.createElement('div'); el.textContent = s; return el.innerHTML;
}

function getExt(name) {
  return (name || '').split('.').pop().toUpperCase().slice(0, 5) || 'FILE';
}

function getFileClass(mime) {
  if (!mime) return 'fi-other';
  if (mime.startsWith('video/')) return 'fi-video';
  if (mime.startsWith('audio/')) return 'fi-audio';
  if (mime.startsWith('image/')) return 'fi-image';
  if (mime === 'application/pdf') return 'fi-pdf';
  if (mime.startsWith('text/') || mime === 'application/json') return 'fi-text';
  return 'fi-other';
}

function getEmoji(mime) {
  if (!mime) return '📄';
  if (mime.startsWith('video/')) return '🎬';
  if (mime.startsWith('audio/')) return '🎵';
  if (mime.startsWith('image/')) return '🖼️';
  if (mime === 'application/pdf') return '📕';
  if (mime.startsWith('text/')) return '📝';
  return '📄';
}

function previewType(mime) {
  if (!mime) return 'other';
  if (mime.startsWith('video/')) return 'video';
  if (mime.startsWith('audio/')) return 'audio';
  if (mime.startsWith('image/')) return 'image';
  if (mime === 'application/pdf') return 'pdf';
  if (mime.startsWith('text/') || mime === 'application/json') return 'text';
  return 'other';
}

// Auth headers helper
function authHeaders(extra = {}) {
  const h = { 'Content-Type': 'application/json', ...extra };
  if (state.isAdmin && state.adminToken) h['X-Admin-Token'] = state.adminToken;
  else if (state.userToken) h['X-User-Token'] = state.userToken;
  return h;
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

// ══════════════════════════════════════════════════════
// THEME
// ══════════════════════════════════════════════════════
(function initTheme() {
  const saved = localStorage.getItem('vault-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  $('btnTheme').addEventListener('click', () => {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('vault-theme', next);
  });
})();

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
async function init() {
  const params = new URLSearchParams(location.search);
  const adminToken = params.get('admin_token');
  const userToken  = params.get('utoken');

  if (adminToken) {
    state.adminToken = adminToken;
    state.isAdmin = true;
    localStorage.setItem('vault_admin_token', adminToken);
    history.replaceState({}, '', location.pathname);
    showMainApp();
    $('adminBar').classList.remove('hidden');
    await Promise.all([loadPendingCount(), refreshFiles()]);
    startAdminPoll();
    return;
  }

  if (userToken) {
    state.userToken = userToken;
    localStorage.setItem('vault_user_token', userToken);
    history.replaceState({}, '', location.pathname);
    const ok = await loadUserInfo();
    if (ok && state.userApproved) {
      showMainApp();
      applyRoleUI();
      await refreshFiles();
      startRolePoll();
    } else {
      showApprovalScreen();
      startApprovalPoll();
    }
    return;
  }

  // Try saved admin session
  const savedAdmin = localStorage.getItem('vault_admin_token');
  if (savedAdmin) {
    try {
      const res = await fetch(`${WORKER_BASE}/admin-session?token=${savedAdmin}`);
      const data = await res.json();
      if (data.admin) {
        state.adminToken = savedAdmin;
        state.isAdmin = true;
        showMainApp();
        $('adminBar').classList.remove('hidden');
        await Promise.all([loadPendingCount(), refreshFiles()]);
        startAdminPoll();
        return;
      } else {
        localStorage.removeItem('vault_admin_token');
      }
    } catch {}
  }

  // Try saved user token
  const savedUser = localStorage.getItem('vault_user_token');
  if (savedUser) {
    state.userToken = savedUser;
    const ok = await loadUserInfo();
    if (ok && state.userApproved) {
      showMainApp();
      applyRoleUI();
      await refreshFiles();
      startRolePoll();
      return;
    } else if (ok && !state.userApproved) {
      showApprovalScreen();
      startApprovalPoll();
      return;
    } else {
      localStorage.removeItem('vault_user_token');
    }
  }

  showLoginScreen();
}

async function loadUserInfo() {
  try {
    const res = await fetch(`${WORKER_BASE}/user-info?utoken=${state.userToken}`);
    if (!res.ok) return false;
    const info = await res.json();
    state.userEmail   = info.email;
    state.userApproved = info.approved;
    state.userRole    = info.role;
    return true;
  } catch { return false; }
}

// ══════════════════════════════════════════════════════
// SCREENS
// ══════════════════════════════════════════════════════
function showLoginScreen() {
  $('toolbar').style.display = 'none';
  $('hintBar').style.display = 'none';
  $('dropzone').style.display = 'none';
  $('adminBar').classList.add('hidden');
  $('userPill').innerHTML = '';
  $('storageStats').textContent = '';
  $('fileGrid').innerHTML = `
    <div class="login-screen">
      <div class="login-logo">🔒</div>
      <h2 class="login-title">Welcome to Vault</h2>
      <p class="login-sub">Secure, role-based file storage backed by Google Drive.</p>
      <div class="login-btns">
        <button class="btn btn-primary" id="btnAdminLogin">🔑 Admin Login</button>
        <span class="login-divider">or</span>
        <button class="btn btn-ghost" id="btnUserLogin">👤 User Login</button>
      </div>
    </div>`;
  $('btnAdminLogin').addEventListener('click', async () => {
    $('btnAdminLogin').textContent = 'Redirecting…'; $('btnAdminLogin').disabled = true;
    const res = await fetch(`${WORKER_BASE}/admin-auth-url`);
    const { authUrl } = await res.json();
    window.location.href = authUrl;
  });
  $('btnUserLogin').addEventListener('click', async () => {
    $('btnUserLogin').textContent = 'Redirecting…'; $('btnUserLogin').disabled = true;
    const res = await fetch(`${WORKER_BASE}/user-auth-url`);
    const { authUrl } = await res.json();
    window.location.href = authUrl;
  });
}

function showApprovalScreen() {
  $('toolbar').style.display = 'none';
  $('hintBar').style.display = 'none';
  $('dropzone').style.display = 'none';
  $('fileGrid').innerHTML = `
    <div class="approval-screen">
      <div class="approval-icon">🔐</div>
      <h2>Approval Required</h2>
      <div class="approval-email-pill">${esc(state.userEmail || '')}</div>
      <p style="color:var(--c-text2);font-size:0.88rem;max-width:320px;line-height:1.6">
        Your account hasn't been approved yet. Request access below and wait for an admin to approve you.
      </p>
      <button class="btn btn-primary" id="btnRequestAccess">📩 Request Access</button>
      <p id="requestSent" style="color:var(--c-green);display:none;font-size:0.85rem">
        ✓ Request sent! Waiting for admin approval. This page will update automatically.
      </p>
      <button class="btn btn-ghost btn-sm" onclick="location.reload()" style="margin-top:8px">↻ Refresh</button>
    </div>`;
  $('btnRequestAccess').addEventListener('click', async () => {
    $('btnRequestAccess').disabled = true; $('btnRequestAccess').textContent = 'Sending…';
    await fetch(`${WORKER_BASE}/request-access`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ email: state.userEmail }),
    });
    $('requestSent').style.display = 'block';
    $('btnRequestAccess').textContent = '✓ Sent';
  });
}

function showMainApp() {
  $('toolbar').style.display = '';
  $('hintBar').style.display = '';
  if (state.userEmail && !state.isAdmin) {
    $('userPill').innerHTML = `<span class="stats-pill" title="${esc(state.userEmail)}">👤 ${esc(state.userEmail.split('@')[0])} · ${state.userRole || '…'}</span>`;
  }
}

// ══════════════════════════════════════════════════════
// PERMISSIONS
// ══════════════════════════════════════════════════════
const ROLES = ['none','read','download','delete','full'];
function roleAtLeast(role, min) { return ROLES.indexOf(role) >= ROLES.indexOf(min); }
function canUpload()   { return state.isAdmin || roleAtLeast(state.userRole, 'download'); }
function canDownload() { return state.isAdmin || roleAtLeast(state.userRole, 'download'); }
function canDelete()   { return state.isAdmin || roleAtLeast(state.userRole, 'delete'); }
function canReplace()  { return state.isAdmin || state.userRole === 'full'; }
function canView()     { return state.isAdmin || roleAtLeast(state.userRole, 'read'); }

function applyRoleUI() {
  $('dropzone').style.display = canUpload() ? '' : 'none';
  $('hintBar').style.display  = canUpload() ? '' : 'none';
  if (state.userEmail && !state.isAdmin) {
    $('userPill').innerHTML = `<span class="stats-pill">👤 ${esc(state.userEmail.split('@')[0])} · ${state.userRole || 'none'}</span>`;
  }
  renderFiles();
}

function getCardActions(f) {
  const pt = previewType(f.fileType);
  const acts = [];
  if (!state.isAdmin && (!state.userRole || state.userRole === 'none')) return [];
  if ((pt === 'video' || pt === 'audio') && canView()) acts.push('play');
  if (['image','pdf','text'].includes(pt) && canView()) acts.push('preview');
  if (canDownload()) acts.push('download');
  if (canReplace()) acts.push('replace');
  if (canDelete()) acts.push('delete');
  return acts;
}

// ══════════════════════════════════════════════════════
// FILE LIST
// ══════════════════════════════════════════════════════
async function refreshFiles() {
  // Show skeleton while loading
  if (!state.files.length) {
    $('fileGrid').innerHTML = `<div class="skeleton-grid">${Array(6).fill('<div class="skeleton-card"></div>').join('')}</div>`;
  }
  try {
    const res = await fetch(`${WORKER_BASE}/list`, { headers: authHeaders({ 'Content-Type': undefined }) });
    if (!res.ok) throw new Error('List failed');
    const serverFiles = await res.json();
    const optimistic = state.files.filter(f => f._temp);
    const serverIds = new Set(serverFiles.map(f => f.publicId));
    state.files = [...optimistic.filter(f => !serverIds.has(f.publicId)), ...serverFiles];
    updateStats();
    renderFiles();
  } catch (e) {
    $('fileGrid').innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">Failed to load files. Check your connection.</div></div>`;
  }
}

function updateStats() {
  const real = state.files.filter(f => !f._temp);
  const total = real.reduce((a, f) => a + (f.size || 0), 0);
  $('storageStats').textContent = `${real.length} file${real.length !== 1 ? 's' : ''} · ${fmtBytes(total)}`;
}

function renderFiles() {
  let files = [...state.files];
  const q = state.search.toLowerCase();
  if (q) files = files.filter(f => (f.fileName || '').toLowerCase().includes(q));

  switch (state.sort) {
    case 'newest':    files.sort((a,b) => (b.uploadedAt||0)-(a.uploadedAt||0)); break;
    case 'oldest':    files.sort((a,b) => (a.uploadedAt||0)-(b.uploadedAt||0)); break;
    case 'name-asc':  files.sort((a,b) => (a.fileName||'').localeCompare(b.fileName||'')); break;
    case 'name-desc': files.sort((a,b) => (b.fileName||'').localeCompare(a.fileName||'')); break;
    case 'size-desc': files.sort((a,b) => (b.size||0)-(a.size||0)); break;
    case 'size-asc':  files.sort((a,b) => (a.size||0)-(b.size||0)); break;
  }

  const grid = $('fileGrid');
  if (!files.length) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">${q ? 'No files match your search.' : 'No files yet. Upload something or sync your Drive.'}</div></div>`;
    return;
  }

  grid.innerHTML = '';
  grid.className = 'file-grid';
  const frag = document.createDocumentFragment();

  files.forEach(f => {
    const isTemp = f._temp;
    const isSelected = state.selected.has(f.publicId);
    const acts = getCardActions(f);
    const pt = previewType(f.fileType);

    const card = document.createElement('div');
    card.className = `card${isTemp ? ' uploading' : ''}${isSelected ? ' selected' : ''}`;
    card.dataset.id = f.publicId;

    card.innerHTML = `
      <div class="card-top">
        <div class="file-icon-wrap ${getFileClass(f.fileType)}">${getEmoji(f.fileType)}</div>
        <div class="card-header-info">
          <div class="file-name" title="${esc(f.fileName)}">${esc(f.fileName)}</div>
          <div class="file-meta">${fmtBytes(f.size)} · ${fmtDate(f.uploadedAt)}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">
          <span class="file-type-badge">${esc(getExt(f.fileName))}</span>
          ${!isTemp ? `<input type="checkbox" class="card-checkbox" data-id="${f.publicId}" ${isSelected ? 'checked' : ''} aria-label="Select ${esc(f.fileName)}">` : ''}
        </div>
      </div>
      ${acts.length ? `
      <div class="card-actions">
        ${acts.includes('play')     ? `<button class="btn btn-sm" style="background:rgba(56,189,248,0.12);color:var(--c-blue);border:1px solid rgba(56,189,248,0.2)" data-action="play">▶ Play</button>` : ''}
        ${acts.includes('preview')  ? `<button class="btn btn-sm" style="background:rgba(124,106,255,0.12);color:var(--c-accent2);border:1px solid rgba(124,106,255,0.2)" data-action="preview">🔍 View</button>` : ''}
        ${acts.includes('download') ? `<button class="btn btn-success btn-sm" data-action="download">⬇ Save</button>` : ''}
        ${acts.includes('replace')  ? `<button class="btn btn-warn btn-sm" data-action="replace">🔄 Replace</button>` : ''}
        ${acts.includes('delete')   ? `<button class="btn btn-danger btn-sm" data-action="delete">🗑</button>` : ''}
      </div>` : ''}`;

    // Events
    card.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const action = btn.dataset.action;
        if (action === 'play') openPreview(f, 'play');
        else if (action === 'preview') openPreview(f, 'view');
        else if (action === 'download') downloadFile(f);
        else if (action === 'delete') deleteFile(f.publicId);
        else if (action === 'replace') replaceFile(f.publicId);
      });
    });

    const cb = card.querySelector('.card-checkbox');
    if (cb) cb.addEventListener('click', e => {
      e.stopPropagation();
      if (cb.checked) state.selected.add(f.publicId);
      else state.selected.delete(f.publicId);
      card.classList.toggle('selected', cb.checked);
      updateBulkBar();
    });

    card.addEventListener('click', e => {
      if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
      if (!f.publicId || f._temp) return;
      const nowSelected = !state.selected.has(f.publicId);
      if (nowSelected) state.selected.add(f.publicId);
      else state.selected.delete(f.publicId);
      card.classList.toggle('selected', nowSelected);
      const checkbox = card.querySelector('.card-checkbox');
      if (checkbox) checkbox.checked = nowSelected;
      updateBulkBar();
    });

    frag.appendChild(card);
  });
  grid.appendChild(frag);
}

// ══════════════════════════════════════════════════════
// BULK ACTIONS
// ══════════════════════════════════════════════════════
function updateBulkBar() {
  const bar = $('bulkBar');
  const n = state.selected.size;
  if (n > 0) { bar.classList.add('active'); $('bulkCount').textContent = `${n} selected`; }
  else bar.classList.remove('active');
}

$('btnBulkCancel').addEventListener('click', () => {
  state.selected.clear(); updateBulkBar(); renderFiles();
});

$('btnBulkDelete').addEventListener('click', async () => {
  if (!confirm(`Delete ${state.selected.size} file(s)? This cannot be undone.`)) return;
  const ids = [...state.selected];
  state.selected.clear(); updateBulkBar();
  let ok = 0, fail = 0;
  await Promise.all(ids.map(async id => {
    try {
      const res = await fetch(`${WORKER_BASE}/delete`, {
        method:'POST', headers: authHeaders(),
        body: JSON.stringify({ publicId: id })
      });
      if (res.ok) { state.files = state.files.filter(f => f.publicId !== id); ok++; }
      else fail++;
    } catch { fail++; }
  }));
  renderFiles(); updateStats();
  toast(`Deleted ${ok} file${ok !== 1 ? 's' : ''}${fail ? `, ${fail} failed` : ''}`, ok > 0 ? 'success' : 'error');
});

// ══════════════════════════════════════════════════════
// DRAG, DROP, PASTE
// ══════════════════════════════════════════════════════
const dz = $('dropzone');
dz.addEventListener('click', () => $('fileInput').click());
$('fileInput').addEventListener('change', e => {
  if (e.target.files.length) processFiles([...e.target.files]);
  e.target.value = '';
});

dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', e => { if (!dz.contains(e.relatedTarget)) dz.classList.remove('dragover'); });
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('dragover');
  if (e.dataTransfer.files.length) processFiles([...e.dataTransfer.files]);
});

document.addEventListener('paste', e => {
  if (!canUpload()) return;
  const files = [...(e.clipboardData?.items || [])]
    .filter(i => i.kind === 'file').map(i => i.getAsFile()).filter(Boolean);
  if (files.length) { e.preventDefault(); processFiles(files); }
});

document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'u') { e.preventDefault(); if (canUpload()) $('fileInput').click(); }
  if (e.ctrlKey && e.key === 'f') { e.preventDefault(); $('searchInput').focus(); }
  if (e.key === 'Escape') {
    if ($('previewOverlay').classList.contains('active')) closePreview();
    else if (state.selected.size) { state.selected.clear(); updateBulkBar(); renderFiles(); }
    else if ($('approvalPanel').classList.contains('open')) $('approvalPanel').classList.remove('open');
    else if ($('usersPanel').classList.contains('open')) $('usersPanel').classList.remove('open');
  }
  if (e.key === 'Delete' && state.selected.size && document.activeElement.tagName !== 'INPUT') {
    $('btnBulkDelete').click();
  }
});

// ══════════════════════════════════════════════════════
// UPLOAD ENGINE
// ══════════════════════════════════════════════════════
async function processFiles(files) {
  if (!canUpload()) { toast('You do not have upload permission', 'error'); return; }
  for (const file of files) {
    const tempId = `temp_${Date.now()}_${Math.random().toString(36).slice(2)}`;
    state.files.unshift({ publicId: tempId, fileName: file.name, fileType: file.type || 'application/octet-stream', size: file.size, uploadedAt: Date.now(), _temp: true });
    renderFiles();
    try {
      await uploadFile(file, tempId);
    } catch (err) {
      if (err.message !== 'Cancelled') toast(`Upload failed: ${err.message}`, 'error');
      state.files = state.files.filter(f => f.publicId !== tempId);
      renderFiles();
    }
  }
  await refreshFiles();
}

async function uploadFile(file, tempId) {
  if (state.uploadAbort) state.uploadAbort.abort();
  state.uploadAbort = new AbortController();
  const signal = state.uploadAbort.signal;

  const pw = $('progressWrap');
  pw.style.display = 'block';
  $('progressName').textContent = file.name;

  try {
    // Init
    const initRes = await fetch(`${WORKER_BASE}/upload-init`, {
      method:'POST', headers: authHeaders(), signal,
      body: JSON.stringify({ fileName: file.name, fileSize: file.size, fileType: file.type || 'application/octet-stream' }),
    });
    if (!initRes.ok) {
      const e = await initRes.json().catch(() => ({}));
      throw new Error(e.error || 'Init failed');
    }
    const { publicId } = await initRes.json();

    // Update temp entry with real ID
    const entry = state.files.find(f => f.publicId === tempId);
    if (entry) entry.publicId = publicId;

    // Check if already uploaded (resume support)
    let uploaded = 0;
    try {
      const statusRes = await fetch(`${WORKER_BASE}/upload-status/${publicId}`, {
        headers: authHeaders({ 'Content-Type': undefined }), signal
      });
      if (statusRes.ok) {
        const d = await statusRes.json();
        if (d.complete) { pw.style.display = 'none'; toast(`${file.name} uploaded!`, 'success'); return; }
        uploaded = d.uploaded || 0;
      }
    } catch {}

    const CHUNK = 10 * 1024 * 1024;
    while (uploaded < file.size) {
      if (signal.aborted) throw new Error('Cancelled');
      const end  = Math.min(uploaded + CHUNK - 1, file.size - 1);
      const chunk = file.slice(uploaded, end + 1);

      let done = false, retries = 0;
      while (!done && retries < 3) {
        try {
          const res = await fetch(`${WORKER_BASE}/upload-chunk/${publicId}`, {
            method:'PUT', signal,
            headers: { 'Content-Range': `bytes ${uploaded}-${end}/${file.size}`, ...authHeaders({ 'Content-Type': undefined }) },
            body: chunk,
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(data.error || `Chunk ${res.status}`);
          if (data.complete) { done = true; uploaded = file.size; }
          else if (data.uploaded !== undefined) { uploaded = data.uploaded; done = true; }
        } catch (err) {
          if (signal.aborted) throw new Error('Cancelled');
          if (retries >= 2) throw err;
          retries++;
          await sleep(1000 * retries);
        }
      }
      updateProgress(uploaded, file.size);
    }
    toast(`${file.name} uploaded!`, 'success');
  } finally {
    pw.style.display = 'none';
    state.uploadAbort = null;
  }
}

function updateProgress(uploaded, total) {
  const pct = total ? Math.round((uploaded / total) * 100) : 0;
  $('progressFill').style.width = pct + '%';
  $('percentDisplay').textContent = pct + '%';
  $('sizeDisplay').textContent = `${fmtBytes(uploaded)} / ${fmtBytes(total)}`;
}

$('cancelUpload').addEventListener('click', () => {
  if (state.uploadAbort) { state.uploadAbort.abort(); state.uploadAbort = null; $('progressWrap').style.display = 'none'; }
});

// ══════════════════════════════════════════════════════
// SEARCH & SORT
// ══════════════════════════════════════════════════════
$('searchInput').addEventListener('input', () => { state.search = $('searchInput').value; renderFiles(); });
$('sortSelect').addEventListener('change', () => { state.sort = $('sortSelect').value; renderFiles(); });

// ══════════════════════════════════════════════════════
// PREVIEW
// ══════════════════════════════════════════════════════
function openPreview(f, mode) {
  const pt = previewType(f.fileType);
  const url = `${WORKER_BASE}/video/${f.publicId}`;
  const body = $('previewBody');
  body.innerHTML = '';
  $('previewTitle').textContent = f.fileName || 'Preview';

  if (mode === 'play' || pt === 'video' || pt === 'audio') {
    const tag = (pt === 'audio') ? 'audio' : 'video';
    const el = document.createElement(tag);
    el.src = url; el.controls = true; el.playsInline = true;
    if (tag === 'audio') { el.style.width = '80%'; el.style.maxWidth = '500px'; }
    body.appendChild(el);
    el.play().catch(() => {});
  } else if (pt === 'image') {
    const img = document.createElement('img');
    img.src = url; img.alt = f.fileName || 'Image';
    body.appendChild(img);
  } else if (pt === 'pdf') {
    const iframe = document.createElement('iframe');
    iframe.src = url; iframe.style.width = '100%'; iframe.style.height = '100%';
    body.appendChild(iframe);
  } else if (pt === 'text') {
    fetch(url, { headers: authHeaders({ 'Content-Type': undefined }) })
      .then(r => r.text())
      .then(t => {
        const pre = document.createElement('pre');
        pre.textContent = t;
        body.appendChild(pre);
      }).catch(() => { body.innerHTML = '<p style="color:var(--c-text2)">Failed to load preview</p>'; });
  } else {
    // Offer download instead
    downloadFile(f);
    return;
  }
  $('previewOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closePreview() {
  $('previewBody').innerHTML = '';
  $('previewOverlay').classList.remove('active');
  document.body.style.overflow = '';
  if (document.fullscreenElement) document.exitFullscreen();
}

$('btnClosePreview').addEventListener('click', closePreview);
$('previewBg').addEventListener('click', closePreview);
$('btnFullscreen').addEventListener('click', () => {
  if (document.fullscreenElement) document.exitFullscreen();
  else $('previewOverlay').requestFullscreen().catch(() => {});
});

// ══════════════════════════════════════════════════════
// FILE OPERATIONS
// ══════════════════════════════════════════════════════
function downloadFile(f) {
  const a = document.createElement('a');
  a.href = `${WORKER_BASE}/download/${f.publicId}`;
  // Pass auth token as query param for download (since we can't set headers on anchor)
  if (state.userToken) a.href += `?utoken=${state.userToken}`;
  a.download = f.fileName || 'file';
  document.body.appendChild(a); a.click(); setTimeout(() => a.remove(), 100);
}

async function deleteFile(publicId) {
  if (!confirm('Delete this file? This cannot be undone.')) return;
  const res = await fetch(`${WORKER_BASE}/delete`, {
    method:'POST', headers: authHeaders(),
    body: JSON.stringify({ publicId })
  });
  if (res.ok) {
    state.files = state.files.filter(f => f.publicId !== publicId);
    state.selected.delete(publicId);
    renderFiles(); updateStats(); updateBulkBar();
    toast('File deleted', 'success');
  } else {
    const e = await res.json().catch(() => ({}));
    toast(e.error || 'Delete failed', 'error');
  }
}

function replaceFile(publicId) {
  const input = document.createElement('input'); input.type = 'file';
  input.addEventListener('change', async () => {
    const file = input.files[0]; if (!file) return;
    $('progressWrap').style.display = 'block';
    $('progressName').textContent = `Replacing: ${file.name}`;
    try {
      const initRes = await fetch(`${WORKER_BASE}/update`, {
        method:'POST', headers: authHeaders(),
        body: JSON.stringify({ publicId, fileName: file.name, fileType: file.type || 'application/octet-stream', fileSize: file.size }),
      });
      if (!initRes.ok) throw new Error((await initRes.json().catch(()=>({}))).error || 'Update init failed');
      const { publicId: pid } = await initRes.json();

      let uploaded = 0;
      const CHUNK = 10 * 1024 * 1024;
      while (uploaded < file.size) {
        const end = Math.min(uploaded + CHUNK - 1, file.size - 1);
        const chunk = file.slice(uploaded, end + 1);
        let done = false, retries = 0;
        while (!done && retries < 3) {
          try {
            const res = await fetch(`${WORKER_BASE}/upload-chunk/${pid}`, {
              method:'PUT',
              headers: { 'Content-Range': `bytes ${uploaded}-${end}/${file.size}`, ...authHeaders({ 'Content-Type': undefined }) },
              body: chunk,
            });
            const d = await res.json().catch(()=>({}));
            if (!res.ok) throw new Error(d.error || 'Chunk failed');
            if (d.complete) { done = true; uploaded = file.size; }
            else if (d.uploaded !== undefined) { uploaded = d.uploaded; done = true; }
          } catch (e) {
            if (retries >= 2) throw e;
            retries++; await sleep(1000 * retries);
          }
        }
        updateProgress(uploaded, file.size);
      }
      await refreshFiles();
      toast('File replaced!', 'success');
    } catch (e) {
      toast('Replace failed: ' + e.message, 'error');
    } finally {
      $('progressWrap').style.display = 'none';
    }
  });
  input.click();
}

// ══════════════════════════════════════════════════════
// ADMIN BAR
// ══════════════════════════════════════════════════════
$('btnSync').addEventListener('click', async () => {
  $('btnSync').textContent = '↻ Syncing…'; $('btnSync').disabled = true;
  const res = await fetch(`${WORKER_BASE}/sync`, { method:'POST', headers: authHeaders() });
  $('btnSync').textContent = '↻ Sync Drive'; $('btnSync').disabled = false;
  if (res.ok) { const d = await res.json(); await refreshFiles(); toast(`Synced ${d.synced || 0} files`, 'success'); }
  else toast('Sync failed', 'error');
});

$('btnApprovals').addEventListener('click', () => {
  const panel = $('approvalPanel');
  const open = panel.classList.toggle('open');
  $('usersPanel').classList.remove('open');
  if (open) loadApprovals();
});

$('btnUsers').addEventListener('click', () => {
  const panel = $('usersPanel');
  const open = panel.classList.toggle('open');
  $('approvalPanel').classList.remove('open');
  if (open) loadUsers();
});

$('btnAdminLogout').addEventListener('click', async () => {
  if (!confirm('Logout as admin? The vault remains accessible to approved users.')) return;
  if (state.adminToken) {
    await fetch(`${WORKER_BASE}/admin-logout`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ admin_token: state.adminToken })
    });
  }
  localStorage.removeItem('vault_admin_token');
  state.isAdmin = false; state.adminToken = null;
  $('adminBar').classList.add('hidden');
  toast('Admin session ended', 'info');
  if (!state.userToken) showLoginScreen();
});

async function loadPendingCount() {
  if (!state.adminToken) return;
  try {
    const res = await fetch(`${WORKER_BASE}/admin/pending`, { headers: authHeaders() });
    if (!res.ok) return;
    const list = await res.json();
    const badge = $('pendingBadge');
    if (list.length) { badge.style.display = 'inline-flex'; badge.textContent = list.length; }
    else badge.style.display = 'none';
  } catch {}
}

async function loadApprovals() {
  const list = $('approvalList');
  list.innerHTML = '<p style="color:var(--c-text2);font-size:0.85rem">Loading…</p>';
  try {
    const res = await fetch(`${WORKER_BASE}/admin/pending`, { headers: authHeaders() });
    const items = await res.json();
    if (!items.length) { list.innerHTML = '<p style="color:var(--c-text2);font-size:0.85rem">No pending requests.</p>'; return; }
    list.innerHTML = items.map(item => `
      <div class="approval-item">
        <div>
          <div class="approval-email">${esc(item.email || item)}</div>
          ${item.requestedAt ? `<div class="approval-time">${fmtDate(item.requestedAt)}</div>` : ''}
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <select class="role-select" data-email="${esc(item.email || item)}">
            <option value="full">Full Access</option>
            <option value="delete">Can Delete</option>
            <option value="download">Download Only</option>
            <option value="read">Read Only</option>
            <option value="none">No Access</option>
          </select>
          <button class="btn btn-success btn-sm" data-approve="${esc(item.email || item)}">✓ Approve</button>
          <button class="btn btn-danger btn-sm" data-deny="${esc(item.email || item)}">✕ Deny</button>
        </div>
      </div>`).join('');

    list.querySelectorAll('[data-approve]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const email = btn.dataset.approve;
        const role = btn.closest('.approval-item').querySelector('.role-select').value;
        await fetch(`${WORKER_BASE}/admin/approve`, {
          method:'POST', headers: authHeaders(), body: JSON.stringify({ email, role })
        });
        toast(`${email} approved as "${role}"`, 'success');
        loadApprovals(); loadPendingCount();
      });
    });
    list.querySelectorAll('[data-deny]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const email = btn.dataset.deny;
        await fetch(`${WORKER_BASE}/admin/deny`, {
          method:'POST', headers: authHeaders(), body: JSON.stringify({ email })
        });
        toast(`${email} denied`, 'info');
        loadApprovals(); loadPendingCount();
      });
    });
  } catch {
    list.innerHTML = '<p style="color:var(--c-red)">Failed to load approvals</p>';
  }
}

async function loadUsers() {
  const list = $('usersList');
  list.innerHTML = '<p style="color:var(--c-text2);font-size:0.85rem">Loading…</p>';
  try {
    const res = await fetch(`${WORKER_BASE}/admin/users`, { headers: authHeaders() });
    const users = await res.json();
    if (!users.length) { list.innerHTML = '<p style="color:var(--c-text2);font-size:0.85rem">No approved users yet.</p>'; return; }
    list.innerHTML = users.map(u => `
      <div class="user-item">
        <div class="approval-email">${esc(u.email)}</div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <select class="role-select" data-email="${esc(u.email)}">
            ${['full','delete','download','read','none'].map(r => `<option value="${r}"${u.role===r?' selected':''}>${r}</option>`).join('')}
          </select>
          <button class="btn btn-ghost btn-sm" data-update="${esc(u.email)}">Update</button>
          <button class="btn btn-danger btn-sm" data-revoke="${esc(u.email)}">Revoke</button>
        </div>
      </div>`).join('');

    list.querySelectorAll('[data-update]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const email = btn.dataset.update;
        const role = btn.closest('.user-item').querySelector('.role-select').value;
        await fetch(`${WORKER_BASE}/admin/update-role`, {
          method:'POST', headers: authHeaders(), body: JSON.stringify({ email, role })
        });
        toast(`${email} → ${role}`, 'success');
      });
    });
    list.querySelectorAll('[data-revoke]').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!confirm(`Revoke access for ${btn.dataset.revoke}?`)) return;
        await fetch(`${WORKER_BASE}/admin/revoke`, {
          method:'POST', headers: authHeaders(), body: JSON.stringify({ email: btn.dataset.revoke })
        });
        toast(`Access revoked for ${btn.dataset.revoke}`, 'info');
        loadUsers();
      });
    });
  } catch {
    list.innerHTML = '<p style="color:var(--c-red)">Failed to load users</p>';
  }
}

// ══════════════════════════════════════════════════════
// POLLING
// ══════════════════════════════════════════════════════
let rolePollTimer, approvalPollTimer, adminPollTimer;

function startRolePoll() {
  clearInterval(rolePollTimer);
  rolePollTimer = setInterval(async () => {
    if (!state.userToken) return;
    const res = await fetch(`${WORKER_BASE}/user-info?utoken=${state.userToken}`).catch(() => null);
    if (!res?.ok) return;
    const info = await res.json();
    if (info.role !== state.userRole) {
      state.userRole = info.role;
      toast(`Permission updated: ${info.role}`, 'info');
      applyRoleUI();
      if (info.role === 'none') clearInterval(rolePollTimer);
    }
  }, 8000);
}

function startApprovalPoll() {
  clearInterval(approvalPollTimer);
  approvalPollTimer = setInterval(async () => {
    if (!state.userToken) return;
    const res = await fetch(`${WORKER_BASE}/user-info?utoken=${state.userToken}`).catch(() => null);
    if (!res?.ok) return;
    const info = await res.json();
    if (info.approved) {
      state.userApproved = true; state.userRole = info.role;
      clearInterval(approvalPollTimer);
      toast('You have been approved! 🎉', 'success');
      showMainApp(); applyRoleUI();
      await refreshFiles();
      startRolePoll();
    }
  }, 10000);
}

function startAdminPoll() {
  clearInterval(adminPollTimer);
  adminPollTimer = setInterval(() => loadPendingCount(), 30000);
}

// ══════════════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════════════
init();
</script>
