<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Public File Vault</title>
<style>
  :root {
    --bg: #f5f7fa;
    --card-bg: #ffffff;
    --text: #1a1a1a;
    --accent: #1a73e8;
    --success: #0f9d58;
    --danger: #ea4335;
    --warn: #f9ab00;
    --radius: 12px;
    --shadow: 0 4px 12px rgba(0,0,0,0.06);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; padding: 20px;
  }
  .container { max-width: 960px; margin: 0 auto; }
  .hidden { display: none !important; }
  /* Auth prompt */
  .auth-box {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 80vh; text-align: center;
  }
  .auth-btn {
    padding: 14px 28px; font-size: 1.2rem; background: var(--accent);
    color: white; border: none; border-radius: 8px; cursor: pointer;
  }
  .auth-btn:hover { background: #1557b0; }
  /* Header */
  .header {
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 10px; margin-bottom: 24px;
  }
  h1 { font-size: clamp(1.5rem, 6vw, 2rem); font-weight: 700; }
  .status-badge {
    display: flex; align-items: center; gap: 6px; font-size: 0.85rem;
    font-weight: 600; padding: 6px 14px; border-radius: 20px; background: #eee;
  }
  .online { background: #e6f4ea; color: #1e8e3e; }
  .offline { background: #fce8e6; color: #c5221f; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
  /* Dropzone */
  .dropzone {
    border: 3px dashed #ccc; border-radius: 16px; padding: 40px 20px;
    text-align: center; background: var(--card-bg); cursor: pointer;
    transition: 0.2s; margin-bottom: 20px; user-select: none;
  }
  .dropzone:hover, .dragover { border-color: var(--accent); background: #e8f0fe; }
  .dropzone input { display: none; }
  /* Progress */
  .progress-box { margin-bottom: 20px; display: none; }
  .progress-bar { height: 8px; background: #e0e0e0; border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0%; background: var(--accent); border-radius: 4px; transition: width 0.3s; }
  .progress-text { display: flex; justify-content: space-between; font-size: 0.8rem; margin-top: 6px; }
  .cancel-btn { background: var(--danger); color: #fff; border: none; padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
  /* File cards */
  .file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .card {
    background: var(--card-bg); border-radius: var(--radius); padding: 16px;
    box-shadow: var(--shadow); display: flex; flex-direction: column;
  }
  .file-name { font-weight: 600; word-break: break-all; margin-bottom: 8px; }
  .file-meta { font-size: 0.8rem; color: #666; margin-bottom: 12px; }
  .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: auto; }
  .btn {
    padding: 8px 12px; border: none; border-radius: 8px; font-size: 0.8rem;
    font-weight: 600; cursor: pointer; background: #eee; display: inline-flex;
    align-items: center; justify-content: center; gap: 4px;
    touch-action: manipulation; min-width: 44px; min-height: 40px; transition: 0.2s;
  }
  .btn:active { transform: scale(0.96); }
  .btn-play { background: var(--accent); color: #fff; }
  .btn-download { background: var(--success); color: #fff; }
  .btn-delete { background: var(--danger); color: #fff; }
  .btn-replace { background: var(--warn); color: #222; }
  /* Video overlay */
  .video-overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #000; z-index: 1000; justify-content: center; align-items: center;
    flex-direction: column;
  }
  .video-overlay.active { display: flex; }
  .video-container {
    width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
  }
  .video-container video {
    max-width: 100%; max-height: 100%; object-fit: contain; background: #000;
  }
  .video-toolbar {
    position: absolute; top: 16px; right: 16px; display: flex; gap: 10px; z-index: 1001;
  }
  .video-toolbar button {
    background: rgba(255,255,255,0.15); border: none; color: #fff;
    padding: 10px 16px; border-radius: 8px; cursor: pointer; backdrop-filter: blur(10px);
    font-size: 0.9rem;
  }
  .video-toolbar button:hover { background: rgba(255,255,255,0.3); }
  @media (max-width: 500px) {
    body { padding: 12px; }
    .dropzone { padding: 30px 15px; }
  }
</style>
</head>
<body>

<!-- Auth prompt (visible when not authenticated) -->
<div id="authPrompt" class="auth-box hidden">
  <h1>📁 Public File Vault</h1>
  <p style="margin-bottom: 20px;">This app needs permission to store files in your Google Drive.</p>
  <button class="auth-btn" id="authBtn">Authorize with Google</button>
</div>

<!-- Main app (visible after auth) -->
<div id="mainApp" class="hidden">
  <div class="container">
    <div class="header">
      <h1>📁 Public File Vault</h1>
      <div class="status-badge online" id="statusBadge">
        <span class="dot"></span> <span id="statusText">Connected</span>
      </div>
    </div>
    <div class="dropzone" id="dropzone">
      <p>📂 <strong>Drop files here</strong> or click to browse</p>
      <input type="file" id="fileInput" multiple>
    </div>
    <div class="progress-box" id="progressBox">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text">
        <span id="percentDisplay">0%</span>
        <span id="sizeDisplay">0 / 0 B</span>
        <button class="cancel-btn" id="cancelUpload">Cancel</button>
      </div>
    </div>
    <div class="file-grid" id="fileGrid"></div>
  </div>

  <!-- Video overlay -->
  <div class="video-overlay" id="videoOverlay">
    <div class="video-container">
      <video id="videoPlayer" controls playsinline></video>
    </div>
    <div class="video-toolbar">
      <button id="btnFullscreen">⛶ Fullscreen</button>
      <button id="btnCloseVideo">✕ Close</button>
    </div>
  </div>
</div>

<script>
// ===================== CONFIGURATION =====================
const WORKER_BASE = 'https://gdrive-files-api.donthulanithish53.workers.dev';

// ===================== DOM ELEMENTS =====================
const authPrompt = document.getElementById('authPrompt');
const mainApp = document.getElementById('mainApp');
const authBtn = document.getElementById('authBtn');
const statusBadge = document.getElementById('statusBadge');
const statusText = document.getElementById('statusText');
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const progressBox = document.getElementById('progressBox');
const progressFill = document.getElementById('progressFill');
const percentDisplay = document.getElementById('percentDisplay');
const sizeDisplay = document.getElementById('sizeDisplay');
const cancelBtn = document.getElementById('cancelUpload');
const fileGrid = document.getElementById('fileGrid');
const videoOverlay = document.getElementById('videoOverlay');
const videoPlayer = document.getElementById('videoPlayer');
const btnFullscreen = document.getElementById('btnFullscreen');
const btnCloseVideo = document.getElementById('btnCloseVideo');

let uploadAbortController = null;
let currentFileList = [];

// ===================== AUTHENTICATION =====================
async function checkAuth() {
  try {
    const res = await fetch(`${WORKER_BASE}/check-auth`);
    const data = await res.json();
    if (data.authenticated) {
      authPrompt.classList.add('hidden');
      mainApp.classList.remove('hidden');
      refreshFileList();
    } else {
      authPrompt.classList.remove('hidden');
      mainApp.classList.add('hidden');
    }
  } catch (e) {
    console.error('Auth check failed:', e);
    authPrompt.classList.remove('hidden');
    mainApp.classList.add('hidden');
  }
}

authBtn.addEventListener('click', async () => {
  const res = await fetch(`${WORKER_BASE}/auth-url`);
  const { authUrl } = await res.json();
  window.location.href = authUrl;
});

// ===================== DRAG & DROP =====================
dropzone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => {
  if (e.target.files.length) processFiles(e.target.files);
  fileInput.value = '';
});
dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('dragover'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
dropzone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropzone.classList.remove('dragover');
  if (e.dataTransfer.files.length) processFiles(e.dataTransfer.files);
});

// ===================== UPLOAD ENGINE =====================
async function processFiles(files) {
  for (const file of files) {
    try { await uploadFile(file); } catch (err) {
      alert(`Upload failed: ${err.message}`);
      console.error(err);
    }
  }
  await refreshFileList();
}

async function uploadFile(file) {
  if (uploadAbortController) uploadAbortController.abort();
  uploadAbortController = new AbortController();
  const signal = uploadAbortController.signal;
  progressBox.style.display = 'block';

  try {
    // 1. Init resumable upload
    const initRes = await fetch(`${WORKER_BASE}/upload-init`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fileName: file.name, fileSize: file.size, fileType: file.type || 'application/octet-stream' }),
      signal,
    });
    if (!initRes.ok) throw new Error(`Init failed: HTTP ${initRes.status}`);
    const { publicId } = await initRes.json();

    // 2. Resume progress
    let uploaded = 0;
    try {
      const statusRes = await fetch(`${WORKER_BASE}/upload-status/${publicId}`, { signal });
      if (statusRes.ok) {
        const data = await statusRes.json();
        if (data.complete) { progressBox.style.display = 'none'; return; }
        uploaded = data.uploaded || 0;
      }
    } catch (e) {}

    // 3. Chunked upload
    const CHUNK_SIZE = 10 * 1024 * 1024; // 10 MB
    while (uploaded < file.size) {
      if (signal.aborted) throw new Error('Cancelled');
      const end = Math.min(uploaded + CHUNK_SIZE - 1, file.size - 1);
      const chunk = file.slice(uploaded, end + 1);

      let retries = 0, done = false;
      while (retries < 3 && !done) {
        try {
          const res = await fetch(`${WORKER_BASE}/upload-chunk/${publicId}`, {
            method: 'PUT',
            headers: { 'Content-Range': `bytes ${uploaded}-${end}/${file.size}` },
            body: chunk,
            signal,
          });
          const data = await res.json().catch(() => ({}));
          if (res.ok && data.complete) { done = true; break; }
          else if (res.ok && data.uploaded !== undefined) {
            uploaded = data.uploaded;
            updateProgress(uploaded, file.size);
            done = true;
          } else throw new Error(data.error || `Chunk error HTTP ${res.status}`);
        } catch (err) {
          if (retries >= 2) throw err;
          retries++;
          await sleep(1000 * retries);
        }
      }
      if (done && uploaded >= file.size - 1) break;
      if (!done) {
        const statusRes = await fetch(`${WORKER_BASE}/upload-status/${publicId}`, { signal });
        if (statusRes.ok) {
          const s = await statusRes.json();
          uploaded = s.uploaded || uploaded;
          updateProgress(uploaded, file.size);
        }
      }
    }
  } finally {
    progressBox.style.display = 'none';
    uploadAbortController = null;
  }
}

function updateProgress(uploaded, total) {
  const pct = total ? Math.round((uploaded / total) * 100) : 0;
  progressFill.style.width = `${pct}%`;
  percentDisplay.textContent = `${pct}%`;
  sizeDisplay.textContent = `${formatBytes(uploaded)} / ${formatBytes(total)}`;
}
function formatBytes(bytes) {
  if (!bytes) return '0 B';
  const units = ['B','KB','MB','GB','TB'];
  let i = 0, s = bytes;
  while (s >= 1024 && i < units.length - 1) { s /= 1024; i++; }
  return s.toFixed(1) + ' ' + units[i];
}
const sleep = ms => new Promise(r => setTimeout(r, ms));

cancelBtn.addEventListener('click', () => {
  if (uploadAbortController) {
    uploadAbortController.abort();
    uploadAbortController = null;
    progressBox.style.display = 'none';
  }
});

// ===================== FILE LIST =====================
async function refreshFileList() {
  try {
    const res = await fetch(`${WORKER_BASE}/list`);
    if (!res.ok) return;
    currentFileList = await res.json();
    renderFileList();
  } catch (e) { console.error(e); }
}

function renderFileList() {
  fileGrid.innerHTML = '';
  if (!currentFileList.length) {
    fileGrid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:#888;">No files yet. Upload something!</p>';
    return;
  }
  currentFileList.forEach(f => {
    const card = document.createElement('div');
    card.className = 'card';
    const isMedia = f.fileType?.startsWith('video/') || f.fileType?.startsWith('audio/');
    card.innerHTML = `
      <div class="file-name">${escapeHtml(f.fileName)}</div>
      <div class="file-meta">${formatBytes(f.size)} · ${new Date(f.uploadedAt).toLocaleString()}</div>
      <div class="actions">
        ${isMedia ? `<button class="btn btn-play" onclick="playFile('${f.publicId}')">▶ Play</button>` : ''}
        <button class="btn btn-download" onclick="downloadFile('${f.publicId}','${escapeHtml(f.fileName)}')">⬇ Download</button>
        <button class="btn btn-delete" onclick="deleteFile('${f.publicId}')">🗑 Delete</button>
        <button class="btn btn-replace" onclick="replaceFile('${f.publicId}')">🔄 Replace</button>
      </div>`;
    fileGrid.appendChild(card);
  });
}
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ===================== PLAY / DOWNLOAD / DELETE / REPLACE =====================
function playFile(publicId) {
  videoPlayer.src = `${WORKER_BASE}/video/${publicId}`;
  videoOverlay.classList.add('active');
  videoPlayer.play().catch(() => {});
}

btnCloseVideo.addEventListener('click', closeVideo);
function closeVideo() {
  videoPlayer.pause();
  videoPlayer.removeAttribute('src');
  videoPlayer.load();
  videoOverlay.classList.remove('active');
  if (document.fullscreenElement) document.exitFullscreen();
}
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && videoOverlay.classList.contains('active')) closeVideo();
});

btnFullscreen.addEventListener('click', () => {
  if (document.fullscreenElement) {
    document.exitFullscreen();
  } else {
    videoOverlay.requestFullscreen();
  }
});

function downloadFile(publicId, name) {
  const a = document.createElement('a');
  a.href = `${WORKER_BASE}/download/${publicId}`;
  a.download = name;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

async function deleteFile(publicId) {
  if (!confirm('Delete this file?')) return;
  const res = await fetch(`${WORKER_BASE}/delete/${publicId}`, { method: 'DELETE' });
  if (res.ok) refreshFileList();
  else alert('Delete failed');
}

function replaceFile(publicId) {
  const input = document.createElement('input');
  input.type = 'file';
  input.onchange = async () => {
    const file = input.files[0];
    if (!file) return;
    try {
      // 1. Init update session
      const initRes = await fetch(`${WORKER_BASE}/update/${publicId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fileName: file.name, fileType: file.type || 'application/octet-stream' })
      });
      if (!initRes.ok) throw new Error('Update init failed');
      const { publicId: newPid } = await initRes.json();
      // 2. Upload using the new session
      await uploadReplaceFile(file, newPid);
      refreshFileList();
    } catch (err) { alert('Replace failed: ' + err.message); }
  };
  input.click();
}

async function uploadReplaceFile(file, publicId) {
  progressBox.style.display = 'block';
  let uploaded = 0;
  try {
    const statusRes = await fetch(`${WORKER_BASE}/upload-status/${publicId}`);
    if (statusRes.ok) {
      const data = await statusRes.json();
      if (data.complete) return;
      uploaded = data.uploaded || 0;
    }
  } catch (e) {}

  const CHUNK_SIZE = 10 * 1024 * 1024;
  while (uploaded < file.size) {
    const end = Math.min(uploaded + CHUNK_SIZE - 1, file.size - 1);
    const chunk = file.slice(uploaded, end + 1);
    let retries = 0, done = false;
    while (retries < 3 && !done) {
      try {
        const res = await fetch(`${WORKER_BASE}/upload-chunk/${publicId}`, {
          method: 'PUT',
          headers: { 'Content-Range': `bytes ${uploaded}-${end}/${file.size}` },
          body: chunk,
        });
        const data = await res.json().catch(() => ({}));
        if (data.complete) { done = true; break; }
        else if (res.ok && data.uploaded !== undefined) {
          uploaded = data.uploaded;
          updateProgress(uploaded, file.size);
          done = true;
        } else throw new Error(data.error || 'Chunk error');
      } catch (err) {
        if (retries >= 2) throw err;
        retries++;
        await sleep(1000 * retries);
      }
    }
    if (done && uploaded >= file.size - 1) break;
  }
  progressBox.style.display = 'none';
}

// ===================== INITIAL LOAD =====================
checkAuth();
</script>
</body>
</html>
