<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Public File Vault</title>
<style>
  :root {
    --bg: #f5f7fa; --card-bg: #ffffff; --text: #1a1a1a; --text-secondary: #666;
    --border: #e0e0e0; --accent: #1a73e8; --accent-hover: #1557b0; --success: #0f9d58;
    --danger: #ea4335; --warn: #f9ab00; --purple: #6c5ce7; --radius: 12px;
    --shadow: 0 4px 12px rgba(0,0,0,0.06); --overlay-bg: rgba(0,0,0,0.95);
    --toast-bg: #333; --toast-text: #fff;
  }
  [data-theme="dark"] {
    --bg: #1a1a2e; --card-bg: #16213e; --text: #e0e0e0; --text-secondary: #aaa;
    --border: #2a2a4a; --shadow: 0 4px 12px rgba(0,0,0,0.3); --overlay-bg: rgba(0,0,0,0.98);
    --toast-bg: #444;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; transition: background 0.3s, color 0.3s; }
  .container { max-width: 1100px; margin: 0 auto; }
  .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
  h1 { font-size: clamp(1.5rem, 6vw, 2rem); font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .btn-icon { padding: 8px 10px; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; background: var(--card-bg); color: var(--text); border: 1px solid var(--border); transition: 0.2s; min-width: 40px; min-height: 40px; display: flex; align-items: center; justify-content: center; }
  .btn-icon:hover { background: var(--border); }
  .btn { padding: 8px 14px; border: none; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; background: #eee; color: #333; display: inline-flex; align-items: center; gap: 6px; touch-action: manipulation; min-width: 44px; min-height: 40px; transition: 0.2s; white-space: nowrap; }
  .btn:active { transform: scale(0.96); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-outline:hover { background: var(--border); }
  .toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
  .search-box { flex: 1; min-width: 200px; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.9rem; background: var(--card-bg); color: var(--text); outline: none; transition: border 0.2s; }
  .search-box:focus { border-color: var(--accent); }
  .sort-select { padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.9rem; background: var(--card-bg); color: var(--text); cursor: pointer; }
  .stats { font-size: 0.8rem; color: var(--text-secondary); white-space: nowrap; }
  .dropzone { border: 3px dashed var(--border); border-radius: 16px; padding: 40px 20px; text-align: center; background: var(--card-bg); cursor: pointer; transition: 0.2s; margin-bottom: 16px; user-select: none; }
  .dropzone:hover, .dragover { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 5%, var(--card-bg)); }
  .dropzone input { display: none; }
  .hint-text { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 12px; text-align: center; }
  .hint-text kbd { background: var(--card-bg); border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px; font-size: 0.8rem; font-family: monospace; }
  .progress-box { margin-bottom: 16px; display: none; }
  .progress-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0%; background: var(--accent); transition: width 0.3s; }
  .progress-text { display: flex; justify-content: space-between; font-size: 0.8rem; margin-top: 6px; color: var(--text-secondary); }
  .cancel-btn { background: var(--danger); color: #fff; border: none; padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
  .file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
  .card { background: var(--card-bg); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); display: flex; flex-direction: column; position: relative; transition: box-shadow 0.2s, transform 0.2s; border: 2px solid transparent; }
  .card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.12); transform: translateY(-2px); }
  .card.selected { border-color: var(--accent); }
  .card.uploading { opacity: 0.5; pointer-events: none; }
  .card-checkbox { position: absolute; top: 10px; right: 10px; width: 20px; height: 20px; accent-color: var(--accent); cursor: pointer; z-index: 2; }
  .file-icon { font-size: 2.5rem; text-align: center; margin-bottom: 10px; }
  .file-name { font-weight: 600; word-break: break-all; margin-bottom: 6px; font-size: 0.95rem; }
  .file-meta { font-size: 0.78rem; color: var(--text-secondary); margin-bottom: 10px; }
  .actions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: auto; }
  .btn-sm { padding: 6px 10px; border: none; border-radius: 6px; font-size: 0.75rem; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 3px; touch-action: manipulation; min-width: 36px; min-height: 34px; transition: 0.2s; }
  .btn-sm:active { transform: scale(0.95); }
  .btn-sm-play { background: var(--accent); color: #fff; }
  .btn-sm-preview { background: var(--purple); color: #fff; }
  .btn-sm-download { background: var(--success); color: #fff; }
  .btn-sm-delete { background: var(--danger); color: #fff; }
  .btn-sm-replace { background: var(--warn); color: #222; }
  .preview-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--overlay-bg); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
  .preview-overlay.active { display: flex; }
  .preview-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
  .preview-container img, .preview-container iframe, .preview-container video, .preview-container pre { max-width: 95%; max-height: 95%; object-fit: contain; border-radius: 4px; }
  .preview-container pre { background: #1e1e1e; color: #d4d4d4; padding: 24px; overflow: auto; white-space: pre-wrap; word-break: break-all; max-width: 85%; max-height: 85%; border-radius: 8px; font-family: 'Fira Code', 'Consolas', monospace; font-size: 0.9rem; line-height: 1.5; }
  .preview-container audio { width: 80%; max-width: 500px; }
  .preview-toolbar { position: absolute; top: 16px; right: 16px; display: flex; gap: 10px; z-index: 1001; }
  .preview-toolbar button { background: rgba(255,255,255,0.12); border: none; color: #fff; padding: 10px 16px; border-radius: 8px; cursor: pointer; backdrop-filter: blur(10px); font-size: 0.9rem; transition: background 0.2s; }
  .preview-toolbar button:hover { background: rgba(255,255,255,0.25); }
  .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column-reverse; gap: 8px; max-width: 400px; }
  .toast { padding: 12px 16px; border-radius: 8px; color: var(--toast-text); background: var(--toast-bg); font-size: 0.85rem; font-weight: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.2); animation: slideIn 0.3s ease; display: flex; align-items: center; gap: 8px; }
  .toast.error { background: var(--danger); }
  .toast.success { background: var(--success); }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .bulk-bar { display: none; align-items: center; gap: 10px; padding: 10px 16px; background: var(--accent); color: #fff; border-radius: 8px; margin-bottom: 12px; font-size: 0.85rem; flex-wrap: wrap; }
  .bulk-bar.active { display: flex; }
  .bulk-bar button { background: rgba(255,255,255,0.2); color: #fff; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
  .admin-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; padding: 10px; background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--border); }
  .admin-bar.hidden { display: none; }
  .approval-panel { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; display: none; }
  .approval-panel.active { display: block; }
  .approval-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); gap: 10px; flex-wrap: wrap; }
  .login-box { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; text-align: center; gap: 12px; }
  .login-box h2 { font-size: 1.4rem; }
  @media (max-width: 600px) { body { padding: 10px; } .dropzone { padding: 24px 14px; } .file-grid { grid-template-columns: 1fr; } .toolbar { flex-direction: column; } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📁 Public File Vault</h1>
    <div class="header-right">
      <span class="stats" id="storageStats"></span>
      <button class="btn-icon" id="btnDarkMode" title="Dark mode">🌓</button>
      <span id="adminUI"></span>
    </div>
  </div>

  <div class="admin-bar hidden" id="adminBar">
    <strong>🛡️ Admin</strong>
    <button class="btn btn-outline btn-sm" id="btnSync">🔄 Sync</button>
    <button class="btn btn-outline btn-sm" id="btnApprovals">👥 Approvals <span id="pendingBadge" style="background:var(--danger);color:#fff;border-radius:10px;padding:1px 6px;font-size:0.7rem;display:none;">0</span></button>
    <button class="btn btn-danger btn-sm" id="btnUnauthorize">🔒 Logout Admin</button>
  </div>

  <div class="approval-panel" id="approvalPanel">
    <h3 style="margin-bottom:12px;">Pending Approvals</h3>
    <div id="approvalList"><p>Loading...</p></div>
  </div>

  <div class="toolbar">
    <input type="text" class="search-box" id="searchInput" placeholder="🔍 Search files... (Ctrl+F)">
    <select class="sort-select" id="sortSelect">
      <option value="newest">Newest</option>
      <option value="oldest">Oldest</option>
      <option value="name-asc">Name A-Z</option>
      <option value="name-desc">Name Z-A</option>
      <option value="size-desc">Largest</option>
      <option value="size-asc">Smallest</option>
    </select>
  </div>

  <div class="bulk-bar" id="bulkBar">
    <span id="bulkCount">0 selected</span>
    <button id="btnBulkDelete">🗑 Delete</button>
    <button id="btnBulkCancel">✕</button>
  </div>

  <div class="hint-text">
    <kbd>Ctrl</kbd>+<kbd>V</kbd> paste &nbsp;|&nbsp;
    <kbd>Ctrl</kbd>+<kbd>U</kbd> upload &nbsp;|&nbsp;
    <kbd>Ctrl</kbd>+<kbd>F</kbd> search &nbsp;|&nbsp;
    <kbd>Esc</kbd> close
  </div>

  <div class="dropzone" id="dropzone">
    <p>📂 <strong>Drop files here</strong> or click to browse</p>
    <input type="file" id="fileInput" multiple>
  </div>

  <div class="progress-box" id="progressBox">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text">
      <span id="percentDisplay">0%</span>
      <span id="sizeDisplay">0 / 0 B</span>
      <button class="cancel-btn" id="cancelUpload">Cancel</button>
    </div>
  </div>

  <div class="file-grid" id="fileGrid"></div>
</div>

<div class="preview-overlay" id="previewOverlay">
  <div class="preview-container" id="previewContainer"></div>
  <div class="preview-toolbar">
    <button id="btnFullscreen">⛶ Fullscreen</button>
    <button id="btnClosePreview">✕ Close</button>
  </div>
</div>
<div class="toast-container" id="toastContainer"></div>

<script>
// ==================== CONFIG ====================
const WORKER_BASE = 'https://gdrive-files-api.donthulanithish53.workers.dev';

// ==================== STATE ====================
let currentFileList = [];
let selectedFiles = new Set();
let sortOrder = 'newest';
let searchQuery = '';
let userEmail = null;
let userApproved = false;
let userRole = null;   // 'none','read','download','delete','full'
let userToken = null;
let isAdmin = false;
let adminSessionToken = null;
let uploadAbortController = null;
let rolePollInterval, approvalPollInterval;

// ==================== HELPERS ====================
const $ = id => document.getElementById(id);
function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  $('toastContainer').appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.3s'; setTimeout(() => el.remove(), 300); }, 3000);
}
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmtBytes(bytes) {
  if (!bytes) return '0 B';
  const u = ['B','KB','MB','GB','TB']; let i = 0, s = bytes;
  while (s >= 1024 && i < u.length - 1) { s /= 1024; i++; }
  return s.toFixed(1) + ' ' + u[i];
}
function getIcon(mime) {
  if (!mime) return '📄';
  if (mime.startsWith('video/')) return '🎬';
  if (mime.startsWith('audio/')) return '🎵';
  if (mime.startsWith('image/')) return '🖼️';
  if (mime === 'application/pdf') return '📕';
  if (mime.startsWith('text/')) return '📝';
  return '📄';
}
function previewType(mime) {
  if (!mime) return 'other';
  if (mime.startsWith('video/')) return 'video';
  if (mime.startsWith('audio/')) return 'audio';
  if (mime.startsWith('image/')) return 'image';
  if (mime === 'application/pdf') return 'pdf';
  if (mime.startsWith('text/') || mime === 'application/json') return 'text';
  return 'other';
}

// ==================== DARK MODE ====================
(function() {
  if (localStorage.getItem('darkMode') === 'true') document.documentElement.setAttribute('data-theme', 'dark');
  $('btnDarkMode').addEventListener('click', () => {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('darkMode', next === 'dark');
  });
})();

// ==================== INIT ====================
async function init() {
  const params = new URLSearchParams(location.search);
  const utoken = params.get('utoken');
  const admToken = params.get('admin_token');

  if (admToken) {
    // Admin just logged in
    adminSessionToken = admToken;
    isAdmin = true;
    history.replaceState({}, '', location.pathname);
    localStorage.setItem('adminSessionToken', admToken);
    renderMainApp();
    $('adminBar').classList.remove('hidden');
    await loadPendingCount();
    await refreshFileList();
    return;
  }

  if (utoken) {
    // User just logged in
    userToken = utoken;
    history.replaceState({}, '', location.pathname);
    await checkUserInfo();
    if (userApproved) {
      renderMainApp();
      applyPermissionsUI(userRole);
      await refreshFileList();
      startRolePolling();
      return;
    } else {
      renderApprovalScreen();
      startApprovalPolling();
      return;
    }
  }

  // No fresh token – check for saved admin session
  const savedAdmin = localStorage.getItem('adminSessionToken');
  if (savedAdmin) {
    try {
      const res = await fetch(`${WORKER_BASE}/admin-session?token=${savedAdmin}`);
      if ((await res.json()).admin) {
        adminSessionToken = savedAdmin;
        isAdmin = true;
        renderMainApp();
        $('adminBar').classList.remove('hidden');
        await loadPendingCount();
        await refreshFileList();
        return;
      } else {
        localStorage.removeItem('adminSessionToken');
      }
    } catch (e) {}
  }

  // No authentication at all – show login options
  renderLoginScreen();
}

async function checkUserInfo() {
  if (!userToken) return;
  try {
    const res = await fetch(`${WORKER_BASE}/user-info?utoken=${userToken}`);
    if (!res.ok) throw new Error('Failed to get user info');
    const info = await res.json();
    userEmail = info.email;
    userApproved = info.approved;
    userRole = info.role;
  } catch (e) {
    toast('Failed to load user info', 'error');
  }
}

// ==================== SCREENS ====================
function renderLoginScreen() {
  $('adminBar').classList.add('hidden');
  $('adminUI').innerHTML = '';
  $('fileGrid').innerHTML = `
    <div class="login-box" style="grid-column:1/-1;">
      <h2>Welcome to File Vault</h2>
      <p style="color:var(--text-secondary);">Choose how to access:</p>
      <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">
        <button class="btn btn-primary" id="adminLoginBtn">🔑 Admin Login</button>
        <button class="btn btn-outline" id="userLoginBtn">👤 User Login</button>
      </div>
    </div>`;
  document.querySelector('.hint-text').style.display = 'none';
  $('storageStats').textContent = '';
  $('adminLoginBtn').addEventListener('click', async () => {
    const res = await fetch(`${WORKER_BASE}/admin-auth-url`);
    const { authUrl } = await res.json();
    window.location.href = authUrl;
  });
  $('userLoginBtn').addEventListener('click', async () => {
    const res = await fetch(`${WORKER_BASE}/user-auth-url`);
    const { authUrl } = await res.json();
    window.location.href = authUrl;
  });
}

function renderApprovalScreen() {
  $('adminBar').classList.add('hidden');
  $('adminUI').innerHTML = '';
  $('fileGrid').innerHTML = `
    <div class="login-box" style="grid-column:1/-1;">
      <h2>🔐 Approval Required</h2>
      <p>Your email: <strong>${userEmail}</strong></p>
      <p style="color:var(--text-secondary);">You haven't been approved yet.</p>
      <button class="btn btn-primary" id="requestAccessBtn">📩 Request Access</button>
      <p id="pendingNote" style="color:var(--success);display:none;">✅ Access requested! Waiting for admin approval.</p>
      <p style="margin-top:16px;font-size:0.85rem;">After approval, <button class="btn btn-outline btn-sm" onclick="location.reload()">refresh</button>.</p>
    </div>`;
  document.querySelector('.hint-text').style.display = 'none';
  $('storageStats').textContent = '';
  $('requestAccessBtn').addEventListener('click', async () => {
    await fetch(`${WORKER_BASE}/request-access`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: userEmail })
    });
    $('pendingNote').style.display = 'block';
    $('requestAccessBtn').disabled = true;
    $('requestAccessBtn').textContent = '✅ Sent';
  });
}

function renderMainApp() {
  document.querySelector('.hint-text').style.display = 'block';
  if (!isAdmin) {
    $('adminBar').classList.add('hidden');
    $('adminUI').innerHTML = userEmail ? `<span style="font-size:0.8rem;color:var(--text-secondary);">👤 ${userEmail} (${userRole || 'pending'})</span>` : '';
  }
}

// ==================== ADMIN BAR ====================
$('btnSync').addEventListener('click', async () => {
  toast('Syncing files from Drive…', 'info');
  const res = await fetch(`${WORKER_BASE}/sync`, { method: 'POST' });
  if (res.ok) { await refreshFileList(); toast('Sync complete!', 'success'); }
  else toast('Sync failed', 'error');
});

$('btnApprovals').addEventListener('click', () => {
  const panel = $('approvalPanel');
  panel.classList.toggle('active');
  if (panel.classList.contains('active')) loadApprovals();
});

$('btnUnauthorize').addEventListener('click', async () => {
  if (!confirm('Logout as admin? The vault will still work for users.')) return;
  if (adminSessionToken) {
    await fetch(`${WORKER_BASE}/admin-logout`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ admin_token: adminSessionToken })
    });
  }
  localStorage.removeItem('adminSessionToken');
  isAdmin = false;
  adminSessionToken = null;
  $('adminBar').classList.add('hidden');
  $('adminUI').innerHTML = '';
  toast('Admin logged out', 'info');
  if (!userEmail) renderLoginScreen();
});

async function loadPendingCount() {
  if (!adminSessionToken) return;
  const res = await fetch(`${WORKER_BASE}/admin/pending`, { headers: { 'X-Admin-Token': adminSessionToken } });
  if (!res.ok) return;
  const emails = await res.json();
  const badge = $('pendingBadge');
  if (emails.length) { badge.style.display = 'inline'; badge.textContent = emails.length; }
  else badge.style.display = 'none';
}

async function loadApprovals() {
  if (!adminSessionToken) return;
  const res = await fetch(`${WORKER_BASE}/admin/pending`, { headers: { 'X-Admin-Token': adminSessionToken } });
  const emails = await res.json();
  const list = $('approvalList');
  if (!emails.length) { list.innerHTML = '<p style="color:var(--text-secondary);">No pending requests.</p>'; return; }
  list.innerHTML = emails.map(email => `
    <div class="approval-item">
      <span>${email}</span>
      <div style="display:flex;gap:6px;align-items:center;">
        <select class="role-select" style="padding:4px 8px;border-radius:4px;border:1px solid var(--border);">
          <option value="full">Full Access</option>
          <option value="delete">Can Delete</option>
          <option value="download">Download Only</option>
          <option value="read">Read Only</option>
          <option value="none">Nothing Visible</option>
        </select>
        <button class="btn btn-sm" style="background:var(--success);color:#fff;" data-approve="${email}">✅ Approve</button>
        <button class="btn btn-sm" style="background:var(--danger);color:#fff;" data-deny="${email}">❌ Deny</button>
      </div>
    </div>
  `).join('');

  list.querySelectorAll('[data-approve]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const role = btn.closest('.approval-item').querySelector('.role-select').value;
      await fetch(`${WORKER_BASE}/admin/approve`, {
        method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Admin-Token': adminSessionToken },
        body: JSON.stringify({ email: btn.dataset.approve, role })
      });
      toast(`${btn.dataset.approve} approved as ${role}`, 'success');
      loadApprovals();
      loadPendingCount();
    });
  });
  list.querySelectorAll('[data-deny]').forEach(btn => {
    btn.addEventListener('click', async () => {
      await fetch(`${WORKER_BASE}/admin/deny`, {
        method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Admin-Token': adminSessionToken },
        body: JSON.stringify({ email: btn.dataset.deny })
      });
      toast(`${btn.dataset.deny} denied`, 'info');
      loadApprovals();
      loadPendingCount();
    });
  });
}

// ==================== ROLE-BASED UI ====================
function applyPermissionsUI(role) {
  const dropzone = $('dropzone');
  const hint = document.querySelector('.hint-text');
  const canUpload = role === 'full' || role === 'delete' || role === 'download';
  dropzone.style.display = canUpload ? '' : 'none';
  if (hint) hint.style.display = canUpload ? '' : 'none';
  renderFileList();
}

function getAvailableActions(publicId) {
  if (isAdmin) return ['play', 'preview', 'download', 'delete', 'replace'];
  if (!userRole) return [];
  const actions = [];
  const file = currentFileList.find(f => f.publicId === publicId);
  if (!file) return [];
  const pt = previewType(file.fileType);
  if (pt === 'video' || pt === 'audio') {
    if (['full', 'delete', 'download', 'read'].includes(userRole)) actions.push('play');
  }
  if (['image', 'pdf', 'text'].includes(pt)) {
    if (['full', 'delete', 'download', 'read'].includes(userRole)) actions.push('preview');
  }
  if (['full', 'delete', 'download'].includes(userRole)) actions.push('download');
  if (['full', 'delete'].includes(userRole)) actions.push('delete');
  if (userRole === 'full') actions.push('replace');
  return actions;
}

// ==================== DRAG & DROP + PASTE ====================
const dz = $('dropzone');
dz.addEventListener('click', () => $('fileInput').click());
$('fileInput').addEventListener('change', e => {
  if (e.target.files.length) processFiles(e.target.files);
  e.target.value = '';
});
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('dragover');
  if (e.dataTransfer.files.length) processFiles(e.dataTransfer.files);
});
document.addEventListener('paste', e => {
  const items = e.clipboardData?.items;
  if (!items) return;
  const files = [];
  for (const item of items) {
    if (item.kind === 'file') {
      const file = item.getAsFile();
      if (file) files.push(file);
    }
  }
  if (files.length) { e.preventDefault(); processFiles(files); }
});
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'u') { e.preventDefault(); $('fileInput').click(); }
  if (e.ctrlKey && e.key === 'f') { e.preventDefault(); $('searchInput').focus(); }
  if (e.key === 'Escape') {
    if ($('previewOverlay').classList.contains('active')) closePreview();
    if (selectedFiles.size) { selectedFiles.clear(); renderFileList(); updateBulkBar(); }
    if ($('approvalPanel').classList.contains('active')) $('approvalPanel').classList.remove('active');
  }
});

// ==================== UPLOAD ENGINE ====================
async function processFiles(files) {
  for (const file of files) {
    const tempId = 'temp_' + Date.now() + Math.random();
    currentFileList.unshift({ publicId: tempId, fileName: file.name, fileType: file.type || 'application/octet-stream', size: file.size, uploadedAt: Date.now() });
    renderFileList();
    try { await uploadFile(file, tempId); } catch (err) {
      toast(`Upload failed: ${err.message}`, 'error');
      currentFileList = currentFileList.filter(f => f.publicId !== tempId);
      renderFileList();
    }
  }
  await refreshFileList();
}

async function uploadFile(file, tempId) {
  if (uploadAbortController) uploadAbortController.abort();
  uploadAbortController = new AbortController();
  const signal = uploadAbortController.signal;
  const pb = $('progressBox'); pb.style.display = 'block';

  try {
    const initRes = await fetch(`${WORKER_BASE}/upload-init`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fileName: file.name, fileSize: file.size, fileType: file.type || 'application/octet-stream' }),
      signal,
    });
    if (!initRes.ok) throw new Error(((await initRes.json().catch(()=>({}))).error) || 'Init failed');
    const { publicId } = await initRes.json();
    const entry = currentFileList.find(f => f.publicId === tempId);
    if (entry) entry.publicId = publicId;
    renderFileList();

    let uploaded = 0;
    try {
      const statusRes = await fetch(`${WORKER_BASE}/upload-status/${publicId}`, { signal });
      if (statusRes.ok) {
        const d = await statusRes.json();
        if (d.complete) { pb.style.display = 'none'; return; }
        uploaded = d.uploaded || 0;
      }
    } catch (e) {}

    const CHUNK = 10 * 1024 * 1024;
    while (uploaded < file.size) {
      if (signal.aborted) throw new Error('Cancelled');
      const end = Math.min(uploaded + CHUNK - 1, file.size - 1);
      const chunk = file.slice(uploaded, end + 1);
      let retries = 0, done = false;
      while (retries < 3 && !done) {
        try {
          const res = await fetch(`${WORKER_BASE}/upload-chunk/${publicId}`, {
            method: 'PUT', headers: { 'Content-Range': `bytes ${uploaded}-${end}/${file.size}` }, body: chunk, signal,
          });
          const data = await res.json().catch(()=>({}));
          if (!res.ok) throw new Error(data.error || `Chunk error`);
          if (data.complete) { done = true; break; }
          if (data.uploaded !== undefined) { uploaded = data.uploaded; updateProgress(uploaded, file.size); done = true; }
        } catch (err) { if (retries >= 2) throw err; retries++; await sleep(1000 * retries); }
      }
      if (done && uploaded >= file.size - 1) break;
      if (!done) {
        const statusRes = await fetch(`${WORKER_BASE}/upload-status/${publicId}`, { signal });
        if (statusRes.ok) { const s = await statusRes.json(); uploaded = s.uploaded || uploaded; updateProgress(uploaded, file.size); }
      }
    }
    toast(`${file.name} uploaded!`, 'success');
  } finally { pb.style.display = 'none'; uploadAbortController = null; }
}

function updateProgress(uploaded, total) {
  const pct = total ? Math.round((uploaded / total) * 100) : 0;
  $('progressFill').style.width = pct + '%';
  $('percentDisplay').textContent = pct + '%';
  $('sizeDisplay').textContent = `${fmtBytes(uploaded)} / ${fmtBytes(total)}`;
}
const sleep = ms => new Promise(r => setTimeout(r, ms));
$('cancelUpload').addEventListener('click', () => {
  if (uploadAbortController) { uploadAbortController.abort(); uploadAbortController = null; $('progressBox').style.display = 'none'; }
});

// ==================== FILE LIST ====================
async function refreshFileList() {
  try {
    const res = await fetch(`${WORKER_BASE}/list`);
    if (!res.ok) throw new Error('List failed');
    const serverFiles = await res.json();
    const optimistic = currentFileList.filter(f => f.publicId?.startsWith('temp_'));
    const serverIds = new Set(serverFiles.map(f => f.publicId));
    currentFileList = [...optimistic.filter(f => !serverIds.has(f.publicId)), ...serverFiles];
    updateStats();
    renderFileList();
  } catch (e) { console.error(e); }
}

function updateStats() {
  const real = currentFileList.filter(f => !f.publicId?.startsWith('temp_'));
  $('storageStats').textContent = `${real.length} file${real.length !== 1 ? 's' : ''} · ${fmtBytes(real.reduce((a, b) => a + (b.size || 0), 0))}`;
}

function renderFileList() {
  let files = [...currentFileList];
  if (searchQuery) files = files.filter(f => f.fileName.toLowerCase().includes(searchQuery.toLowerCase()));
  switch (sortOrder) {
    case 'newest': files.sort((a, b) => (b.uploadedAt || 0) - (a.uploadedAt || 0)); break;
    case 'oldest': files.sort((a, b) => (a.uploadedAt || 0) - (b.uploadedAt || 0)); break;
    case 'name-asc': files.sort((a, b) => a.fileName.localeCompare(b.fileName)); break;
    case 'name-desc': files.sort((a, b) => b.fileName.localeCompare(a.fileName)); break;
    case 'size-desc': files.sort((a, b) => (b.size || 0) - (a.size || 0)); break;
    case 'size-asc': files.sort((a, b) => (a.size || 0) - (b.size || 0)); break;
  }
  const grid = $('fileGrid');
  grid.innerHTML = '';
  if (!files.length) {
    grid.innerHTML = `<p style="grid-column:1/-1;text-align:center;color:var(--text-secondary);padding:30px;">${searchQuery ? 'No files match your search.' : 'No files yet. Upload or Sync.'}</p>`;
    return;
  }
  files.forEach(f => {
    const isUploading = f.publicId?.startsWith('temp_');
    const card = document.createElement('div');
    card.className = 'card' + (isUploading ? ' uploading' : '') + (selectedFiles.has(f.publicId) ? ' selected' : '');
    card.dataset.publicId = f.publicId;
    const actions = getAvailableActions(f.publicId);
    const pt = previewType(f.fileType);
    card.innerHTML = `
      ${!isUploading ? `<input type="checkbox" class="card-checkbox" data-id="${f.publicId}" ${selectedFiles.has(f.publicId) ? 'checked' : ''}>` : ''}
      <div class="file-icon">${getIcon(f.fileType)}</div>
      <div class="file-name">${esc(f.fileName)}</div>
      <div class="file-meta">${fmtBytes(f.size)} · ${new Date(f.uploadedAt).toLocaleString()}${isUploading ? ' · Uploading...' : ''}</div>
      <div class="actions">
        ${actions.includes('play') ? `<button class="btn-sm btn-sm-play" data-action="play" data-id="${f.publicId}">▶ Play</button>` : ''}
        ${actions.includes('preview') ? `<button class="btn-sm btn-sm-preview" data-action="preview" data-id="${f.publicId}">🔍 Preview</button>` : ''}
        ${actions.includes('download') ? `<button class="btn-sm btn-sm-download" data-action="download" data-id="${f.publicId}" data-name="${esc(f.fileName)}">⬇</button>` : ''}
        ${actions.includes('delete') ? `<button class="btn-sm btn-sm-delete" data-action="delete" data-id="${f.publicId}">🗑</button>` : ''}
        ${actions.includes('replace') ? `<button class="btn-sm btn-sm-replace" data-action="replace" data-id="${f.publicId}">🔄</button>` : ''}
      </div>`;
    grid.appendChild(card);
  });

  // Attach button actions
  grid.querySelectorAll('.btn-sm[data-action]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const action = btn.dataset.action, id = btn.dataset.id;
      if (action === 'play') openPreview(id, 'video');
      else if (action === 'preview') openPreview(id, previewType(currentFileList.find(f => f.publicId === id)?.fileType));
      else if (action === 'download') downloadFile(id, btn.dataset.name);
      else if (action === 'delete') deleteFile(id);
      else if (action === 'replace') replaceFile(id);
    });
  });

  // Checkbox & card selection
  grid.querySelectorAll('.card-checkbox').forEach(cb => {
    cb.addEventListener('click', e => {
      e.stopPropagation();
      const id = cb.dataset.id;
      if (cb.checked) selectedFiles.add(id); else selectedFiles.delete(id);
      updateBulkBar();
      renderFileList();
    });
  });
  grid.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
      const id = card.dataset.publicId;
      if (!id || id.startsWith('temp_')) return;
      if (selectedFiles.has(id)) selectedFiles.delete(id); else selectedFiles.add(id);
      updateBulkBar();
      renderFileList();
    });
  });
  updateBulkBar();
}

// ==================== BULK ACTIONS ====================
function updateBulkBar() {
  const bar = $('bulkBar');
  if (selectedFiles.size > 0) { bar.classList.add('active'); $('bulkCount').textContent = `${selectedFiles.size} selected`; }
  else bar.classList.remove('active');
}
$('btnBulkCancel').addEventListener('click', () => { selectedFiles.clear(); renderFileList(); updateBulkBar(); });
$('btnBulkDelete').addEventListener('click', async () => {
  if (!confirm(`Delete ${selectedFiles.size} file(s)?`)) return;
  for (const id of selectedFiles) {
    await fetch(`${WORKER_BASE}/delete`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ publicId: id }) }).catch(() => {});
  }
  selectedFiles.clear(); updateBulkBar(); await refreshFileList(); toast('Deleted', 'success');
});

// ==================== SEARCH & SORT ====================
$('searchInput').addEventListener('input', () => { searchQuery = $('searchInput').value; renderFileList(); });
$('sortSelect').addEventListener('change', () => { sortOrder = $('sortSelect').value; renderFileList(); });

// ==================== PREVIEW ====================
function openPreview(publicId, type) {
  const container = $('previewContainer');
  container.innerHTML = '';
  const url = `${WORKER_BASE}/video/${publicId}`;
  if (type === 'video' || type === 'audio') {
    const media = document.createElement(type === 'audio' ? 'audio' : 'video');
    media.src = url; media.controls = true; media.playsInline = true;
    media.style.maxWidth = '95%'; media.style.maxHeight = '95%';
    if (type === 'audio') { media.style.width = '500px'; media.style.maxHeight = '80px'; }
    container.appendChild(media);
    media.play().catch(() => {});
  } else if (type === 'image') {
    const img = document.createElement('img'); img.src = url; img.style.maxWidth = '95%'; img.style.maxHeight = '95%'; img.style.objectFit = 'contain';
    container.appendChild(img);
  } else if (type === 'pdf') {
    const iframe = document.createElement('iframe'); iframe.src = url; iframe.style.width = '90%'; iframe.style.height = '90%';
    container.appendChild(iframe);
  } else if (type === 'text') {
    fetch(url).then(r => r.text()).then(t => {
      const pre = document.createElement('pre'); pre.textContent = t; container.appendChild(pre);
    }).catch(() => { container.innerHTML = '<p style="color:#fff;">Failed to load preview</p>'; });
  } else { downloadFile(publicId); return; }
  $('previewOverlay').classList.add('active');
}
function closePreview() {
  $('previewContainer').innerHTML = '';
  $('previewOverlay').classList.remove('active');
  if (document.fullscreenElement) document.exitFullscreen();
}
$('btnClosePreview').addEventListener('click', closePreview);
$('btnFullscreen').addEventListener('click', () => {
  if (document.fullscreenElement) document.exitFullscreen();
  else $('previewOverlay').requestFullscreen();
});

// ==================== DOWNLOAD / DELETE / REPLACE ====================
function downloadFile(publicId, name) {
  const a = document.createElement('a');
  a.href = `${WORKER_BASE}/download/${publicId}`;
  a.download = name || 'file';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}
async function deleteFile(publicId) {
  if (!confirm('Delete?')) return;
  const res = await fetch(`${WORKER_BASE}/delete`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ publicId }) });
  if (res.ok) {
    currentFileList = currentFileList.filter(f => f.publicId !== publicId);
    selectedFiles.delete(publicId); renderFileList(); updateBulkBar(); updateStats();
    toast('Deleted', 'success');
  } else toast('Delete failed', 'error');
}
function replaceFile(publicId) {
  const input = document.createElement('input'); input.type = 'file';
  input.onchange = async () => {
    const file = input.files[0]; if (!file) return;
    try {
      $('progressBox').style.display = 'block';
      const initRes = await fetch(`${WORKER_BASE}/update`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ publicId, fileName: file.name, fileType: file.type || 'application/octet-stream' })
      });
      if (!initRes.ok) throw new Error(((await initRes.json().catch(()=>({}))).error) || 'Update init failed');
      const { publicId: newPid } = await initRes.json();
      let uploaded = 0;
      const CHUNK = 10 * 1024 * 1024;
      while (uploaded < file.size) {
        const end = Math.min(uploaded + CHUNK - 1, file.size - 1);
        const chunk = file.slice(uploaded, end + 1);
        let retries = 0, done = false;
        while (retries < 3 && !done) {
          try {
            const res = await fetch(`${WORKER_BASE}/upload-chunk/${newPid}`, {
              method: 'PUT', headers: { 'Content-Range': `bytes ${uploaded}-${end}/${file.size}` }, body: chunk
            });
            const data = await res.json().catch(()=>({}));
            if (!res.ok) throw new Error(data.error || 'Chunk error');
            if (data.complete) { done = true; break; }
            if (data.uploaded !== undefined) { uploaded = data.uploaded; updateProgress(uploaded, file.size); done = true; }
          } catch (err) { if (retries >= 2) throw err; retries++; await sleep(1000 * retries); }
        }
        if (done && uploaded >= file.size - 1) break;
      }
      await refreshFileList();
      toast('File replaced!', 'success');
    } catch (err) { toast('Replace failed: ' + err.message, 'error'); }
    finally { $('progressBox').style.display = 'none'; }
  };
  input.click();
}

// ==================== POLLING ====================
function startRolePolling() {
  if (rolePollInterval) clearInterval(rolePollInterval);
  rolePollInterval = setInterval(async () => {
    if (!userToken || !userApproved) return;
    try {
      const res = await fetch(`${WORKER_BASE}/user-info?utoken=${userToken}`);
      const info = await res.json();
      if (info.role !== userRole) {
        userRole = info.role;
        toast(`Permissions updated: ${userRole}`, 'info');
        applyPermissionsUI(userRole);
        if (userRole === 'none') {
          $('fileGrid').innerHTML = '<p style="grid-column:1/-1;text-align:center;padding:40px;">You no longer have access.</p>';
          $('dropzone').style.display = 'none';
          document.querySelector('.hint-text').style.display = 'none';
          clearInterval(rolePollInterval);
        }
      }
    } catch (e) {}
  }, 5000);
}

function startApprovalPolling() {
  if (approvalPollInterval) clearInterval(approvalPollInterval);
  approvalPollInterval = setInterval(async () => {
    if (!userToken) return;
    try {
      const res = await fetch(`${WORKER_BASE}/user-info?utoken=${userToken}`);
      const info = await res.json();
      if (info.approved) {
        userApproved = true;
        userRole = info.role;
        clearInterval(approvalPollInterval);
        toast('You have been approved!', 'success');
        renderMainApp();
        applyPermissionsUI(userRole);
        await refreshFileList();
        startRolePolling();
      }
    } catch (e) {}
  }, 10000);
}

// ==================== START ====================
init();
</script>
