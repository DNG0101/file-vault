<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Admin Test</title></head>
<body>
  <div id="msg"></div>
  <script>
    const params = new URLSearchParams(location.search);
    const adminToken = params.get('admin_token');
    if (adminToken) {
      fetch('https://gdrive-files-api.donthulanithish53.workers.dev/admin-session?token=' + adminToken)
        .then(r => r.json())
        .then(data => {
          if (data.admin) {
            document.getElementById('msg').innerHTML = '✅ Admin session valid!<br>Email: ' + data.email;
          } else {
            document.getElementById('msg').innerText = '❌ Invalid admin session.';
          }
        });
    } else {
      document.getElementById('msg').innerText = 'No admin_token in URL. Please log in again.';
    }
  </script>
</body>
</html>
