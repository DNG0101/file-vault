<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>File Vault</title>
<style>
  /* ======== CSS ======== */
  :root {
    --bg: #f8fafc; --card-bg: #ffffff; --text: #1e293b; --text-secondary: #64748b;
    --border: #e2e8f0; --accent: #2563eb; --accent-hover: #1d4ed8; --success: #16a34a;
    --danger: #dc2626; --warn: #f59e0b; --purple: #7c3aed; --radius: 12px;
    --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); --overlay-bg: rgba(0,0,0,0.92);
    --toast-bg: #334155; --toast-text: #f1f5f9;
  }
  [data-theme="dark"] {
    --bg: #0f172a; --card-bg: #1e293b; --text: #e2e8f0; --text-secondary: #94a3b8;
    --border: #334155; --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.3);
    --overlay-bg: rgba(0,0,0,0.96); --toast-bg: #475569;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px;
    transition: background 0.3s, color 0.3s;
  }
  .container { max-width: 1200px; margin:0 auto; }
  /* Header */
  .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap:12px; margin-bottom: 24px; }
  .header h1 { font-size: clamp(1.8rem, 6vw, 2.2rem); font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .btn-icon { padding: 8px; border: 1px solid var(--border); border-radius: 8px; background: var(--card-bg); color: var(--text); cursor: pointer; transition: 0.2s; min-width: 40px; min-height: 40px; display: flex; align-items: center; justify-content: center; }
  .btn-icon:hover { background: var(--border); }
  .btn {
    padding: 10px 18px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px; font-size: 0.9rem;
    transition: all 0.15s; touch-action: manipulation; min-width: 44px; min-height: 44px;
    background: var(--card-bg); color: var(--text); border: 1px solid var(--border);
  }
  .btn:hover { background: var(--border); }
  .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-danger { background: var(--danger); color: white; border-color: var(--danger); }
  .btn-outline { background: transparent; border: 1px solid var(--border); }
  .btn-sm { padding: 6px 12px; font-size: 0.8rem; border-radius: 6px; min-height: 36px; }
  /* Toolbar */
  .toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
  .search-box { flex:1; min-width:200px; padding:10px 14px; border:1px solid var(--border); border-radius:8px; background:var(--card-bg); color:var(--text); outline:none; }
  .search-box:focus { border-color:var(--accent); }
  .sort-select { padding:10px 14px; border:1px solid var(--border); border-radius:8px; background:var(--card-bg); color:var(--text); cursor:pointer; }
  .stats { font-size:0.85rem; color:var(--text-secondary); white-space:nowrap; }
  /* Dropzone */
  .dropzone {
    border: 2px dashed var(--border); border-radius: 16px; padding: 48px 20px;
    text-align: center; background: var(--card-bg); cursor: pointer;
    transition: border-color 0.2s, background 0.2s; margin-bottom: 20px;
  }
  .dropzone:hover, .dragover { border-color: var(--accent); background: #f1f5f9; }
  .dropzone input { display:none; }
  .hint-text { font-size:0.85rem; color:var(--text-secondary); margin-bottom:16px; text-align:center; }
  .hint-text kbd { background:var(--card-bg); border:1px solid var(--border); border-radius:4px; padding:2px 6px; font-family:monospace; }
  /* Progress */
  .progress-box { margin-bottom:20px; display:none; }
  .progress-bar { height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
  .progress-fill { height:100%; width:0%; background:var(--accent); transition:width 0.2s; }
  .progress-text { display:flex; justify-content:space-between; font-size:0.75rem; margin-top:6px; color:var(--text-secondary); }
  .cancel-btn { background: var(--danger); color: white; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size:0.75rem; }
  /* File grid */
  .file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
  .card {
    background: var(--card-bg); border-radius: var(--radius); padding: 20px;
    box-shadow: var(--shadow); border: 1px solid var(--border);
    display: flex; flex-direction: column; position: relative;
    transition: box-shadow 0.2s, transform 0.2s;
  }
  .card:hover { box-shadow: 0 10px 25px -5px rgba(0,0,0,0.08); transform: translateY(-2px); }
  .card.selected { border-color: var(--accent); }
  .card.uploading { opacity:0.5; pointer-events:none; }
  .card-checkbox { position:absolute; top:10px; right:10px; width:18px; height:18px; accent-color:var(--accent); cursor:pointer; z-index:2; }
  .file-icon { font-size:2.4rem; text-align:center; margin-bottom:12px; }
  .file-name { font-weight:600; word-break:break-all; margin-bottom:8px; font-size:0.95rem; }
  .file-meta { font-size:0.75rem; color:var(--text-secondary); margin-bottom:14px; }
  .actions { display:flex; flex-wrap:wrap; gap:8px; margin-top:auto; }
  .btn-xs { padding:6px 10px; border:none; border-radius:6px; font-size:0.7rem; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:4px; min-width:32px; min-height:32px; }
  .btn-xs-play { background:var(--accent); color:#fff; }
  .btn-xs-preview { background:var(--purple); color:#fff; }
  .btn-xs-download { background:var(--success); color:#fff; }
  .btn-xs-delete { background:var(--danger); color:#fff; }
  .btn-xs-replace { background:var(--warn); color:#222; }
  /* Preview overlay */
  .preview-overlay { display:none; position:fixed; inset:0; background:var(--overlay-bg); z-index:1000; justify-content:center; align-items:center; flex-direction:column; }
  .preview-overlay.active { display:flex; }
  .preview-container { width:100%; height:100%; display:flex; align-items:center; justify-content:center; position:relative; }
  .preview-container img, .preview-container iframe, .preview-container video, .preview-container pre {
    max-width:95%; max-height:95%; object-fit:contain; border-radius:6px;
  }
  .preview-container pre { background:#1e293b; color:#cbd5e1; padding:24px; overflow:auto; white-space:pre-wrap; word-break:break-all; max-width:85%; max-height:85%; border-radius:8px; font-size:0.85rem; line-height:1.5; }
  .preview-toolbar { position:absolute; top:16px; right:16px; display:flex; gap:10px; z-index:1001; }
  .preview-toolbar button { background:rgba(255,255,255,0.12); border:none; color:#fff; padding:10px 16px; border-radius:8px; cursor:pointer; backdrop-filter:blur(8px); font-size:0.9rem; }
  .preview-toolbar button:hover { background:rgba(255,255,255,0.25); }
  /* Toast */
  .toast-container { position:fixed; bottom:20px; right:20px; z-index:9999; display:flex; flex-direction:column-reverse; gap:8px; max-width:400px; }
  .toast { padding:12px 16px; border-radius:8px; color:var(--toast-text); background:var(--toast-bg); font-size:0.85rem; font-weight:500; box-shadow:0 8px 20px rgba(0,0,0,0.2); animation:slideIn 0.3s ease; }
  .toast.error { background:var(--danger); }
  .toast.success { background:var(--success); }
  @keyframes slideIn { from { transform:translateX(100%); opacity:0; } }
  /* Bulk bar */
  .bulk-bar { display:none; align-items:center; gap:10px; padding:10px 16px; background:var(--accent); color:#fff; border-radius:8px; margin-bottom:12px; }
  .bulk-bar.active { display:flex; }
  .bulk-bar button { background:rgba(255,255,255,0.2); color:#fff; border:none; padding:6px 12px; border-radius:6px; cursor:pointer; }
  /* Admin bar / approval panel */
  .admin-bar { display:flex; gap:8px; flex-wrap:wrap; align-items:center; padding:12px; background:var(--card-bg); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:16px; }
  .admin-bar.hidden { display:none; }
  .approval-panel { background:var(--card-bg); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:16px; display:none; }
  .approval-panel.active { display:block; }
  .approval-item { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border); gap:10px; }
  .login-box { text-align:center; padding:60px 20px; }
  @media (max-width:600px) {
    body { padding:10px; }
    .dropzone { padding:30px 14px; }
    .file-grid { grid-template-columns:1fr; }
  }
</style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <div class="header">
    <h1>📁 File Vault</h1>
    <div class="header-right">
      <span class="stats" id="storageStats"></span>
      <button class="btn-icon" id="btnDarkMode" title="Toggle dark mode">🌓</button>
      <span id="adminUI"></span>
    </div>
  </div>

  <!-- Admin bar (visible only when admin session active) -->
  <div class="admin-bar hidden" id="adminBar">
    <strong>🛡️ Admin</strong>
    <button class="btn btn-outline btn-sm" id="btnSync">🔄 Sync</button>
    <button class="btn btn-outline btn-sm" id="btnApprovals">👥 Approvals <span id="pendingBadge" style="background:var(--danger);color:#fff;border-radius:10px;padding:1px 6px;font-size:0.7rem;display:none;">0</span></button>
    <button class="btn btn-outline btn-sm" id="btnUsers">👤 Manage Users</button>
    <button class="btn btn-danger btn-sm" id="btnUnauthorize">🔒 Logout</button>
  </div>

  <!-- Approval panel (pending users) -->
  <div class="approval-panel" id="approvalPanel">
    <h3 style="margin-bottom:12px;">Pending Approvals</h3>
    <div id="approvalList"><p>Loading...</p></div>
  </div>

  <!-- User management panel (approved users) -->
  <div class="approval-panel" id="usersPanel">
    <h3 style="margin-bottom:12px;">Manage Users</h3>
    <div id="usersList"><p>Loading...</p></div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <input type="text" class="search-box" id="searchInput" placeholder="🔍 Search files... (Ctrl+F)">
    <select class="sort-select" id="sortSelect">
      <option value="newest">Newest</option>
      <option value="oldest">Oldest</option>
      <option value="name-asc">Name A‑Z</option>
      <option value="name-desc">Name Z‑A</option>
      <option value="size-desc">Largest</option>
      <option value="size-asc">Smallest</option>
    </select>
  </div>

  <!-- Bulk actions -->
  <div class="bulk-bar" id="bulkBar">
    <span id="bulkCount">0 selected</span>
    <button id="btnBulkDelete">🗑 Delete</button>
    <button id="btnBulkCancel">✕</button>
  </div>

  <!-- Hint -->
  <div class="hint-text">
    <kbd>Ctrl</kbd>+<kbd>V</kbd> paste &nbsp;|&nbsp;
    <kbd>Ctrl</kbd>+<kbd>U</kbd> upload &nbsp;|&nbsp;
    <kbd>Ctrl</kbd>+<kbd>F</kbd> search &nbsp;|&nbsp;
    <kbd>Esc</kbd> close
  </div>

  <!-- Dropzone -->
  <div class="dropzone" id="dropzone">
    <p>📂 <strong>Drop files here</strong> or click to browse</p>
    <input type="file" id="fileInput" multiple>
  </div>

  <!-- Progress -->
  <div class="progress-box" id="progressBox">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text">
      <span id="percentDisplay">0%</span>
      <span id="sizeDisplay">0 / 0 B</span>
      <button class="cancel-btn" id="cancelUpload">Cancel</button>
    </div>
  </div>

  <!-- File grid -->
  <div class="file-grid" id="fileGrid"></div>
</div>

<!-- Preview overlay -->
<div class="preview-overlay" id="previewOverlay">
  <div class="preview-container" id="previewContainer"></div>
  <div class="preview-toolbar">
    <button id="btnFullscreen">⛶ Fullscreen</button>
    <button id="btnClosePreview">✕ Close</button>
  </div>
</div>
<div class="toast-container" id="toastContainer"></div>

<script>
// ==================== CONFIG ====================
const WORKER_BASE = 'https://gdrive-files-api.donthulanithish53.workers.dev';

// ==================== STATE ====================
let currentFileList = [];
let selectedFiles = new Set();
let sortOrder = 'newest';
let searchQuery = '';
let userEmail = null;
let userApproved = false;
let userRole = null;
let userToken = null;
let isAdmin = false;
let adminSessionToken = null;
let uploadAbortController = null;
let rolePollInterval, approvalPollInterval;

// ==================== HELPERS ====================
const $ = id => document.getElementById(id);
function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  $('toastContainer').appendChild(el);
  setTimeout(() => { el.style.opacity='0'; el.style.transition='opacity 0.3s'; setTimeout(() => el.remove(),300); }, 3000);
}
function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function fmtBytes(bytes) {
  if (!bytes) return '0 B';
  const u=['B','KB','MB','GB','TB']; let i=0, s=bytes;
  while (s>=1024 && i<u.length-1) { s/=1024; i++; }
  return s.toFixed(1)+' '+u[i];
}
function getIcon(mime) {
  if (!mime) return '📄';
  if (mime.startsWith('video/')) return '🎬';
  if (mime.startsWith('audio/')) return '🎵';
  if (mime.startsWith('image/')) return '🖼️';
  if (mime==='application/pdf') return '📕';
  if (mime.startsWith('text/')) return '📝';
  return '📄';
}
function previewType(mime) {
  if (!mime) return 'other';
  if (mime.startsWith('video/')) return 'video';
  if (mime.startsWith('audio/')) return 'audio';
  if (mime.startsWith('image/')) return 'image';
  if (mime==='application/pdf') return 'pdf';
  if (mime.startsWith('text/')||mime==='application/json') return 'text';
  return 'other';
}

// ==================== DARK MODE ====================
(function() {
  if (localStorage.getItem('darkMode')==='true') document.documentElement.setAttribute('data-theme','dark');
  $('btnDarkMode').addEventListener('click',() => {
    const next = document.documentElement.getAttribute('data-theme')==='dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme',next);
    localStorage.setItem('darkMode',next==='dark');
  });
})();

// ==================== INITIALIZATION ====================
async function init() {
  const params = new URLSearchParams(location.search);
  const utoken = params.get('utoken');
  const admToken = params.get('admin_token');

  if (admToken) {
    // Admin just logged in
    adminSessionToken = admToken;
    isAdmin = true;
    history.replaceState({}, '', location.pathname);
    localStorage.setItem('adminSessionToken', admToken);
    renderMainApp();
    $('adminBar').classList.remove('hidden');
    await loadPendingCount();
    await refreshFileList();
    return;
  }

  if (utoken) {
    // User just logged in
    userToken = utoken;
    history.replaceState({}, '', location.pathname);
    await checkUserInfo();
    if (userApproved) {
      renderMainApp();
      applyPermissionsUI(userRole);
      await refreshFileList();
      startRolePolling();
      return;
    } else {
      renderApprovalScreen();
      startApprovalPolling();
      return;
    }
  }

  // No fresh token – check for saved admin session
  const savedAdmin = localStorage.getItem('adminSessionToken');
  if (savedAdmin) {
    try {
      const res = await fetch(`${WORKER_BASE}/admin-session?token=${savedAdmin}`);
      if ((await res.json()).admin) {
        adminSessionToken = savedAdmin;
        isAdmin = true;
        renderMainApp();
        $('adminBar').classList.remove('hidden');
        await loadPendingCount();
        await refreshFileList();
        return;
      } else {
        localStorage.removeItem('adminSessionToken');
      }
    } catch(e) {}
  }

  // Nobody logged in
  renderLoginScreen();
}

async function checkUserInfo() {
  if (!userToken) return;
  try {
    const res = await fetch(`${WORKER_BASE}/user-info?utoken=${userToken}`);
    if (!res.ok) throw new Error('Failed to fetch');
    const info = await res.json();
    userEmail = info.email;
    userApproved = info.approved;
    userRole = info.role;
  } catch(e) {
    toast('Could not load user info','error');
  }
}

// ==================== SCREENS ====================
function renderLoginScreen() {
  $('adminBar').classList.add('hidden');
  $('adminUI').innerHTML = '';
  $('fileGrid').innerHTML = `<div class="login-box"><h2>Welcome to File Vault</h2><p style="color:var(--text-secondary);">Choose how to access:</p><div style="display:flex;gap:12px;justify-content:center;margin-top:16px;"><button class="btn btn-primary" id="adminLoginBtn">🔑 Admin Login</button><button class="btn btn-outline" id="userLoginBtn">👤 User Login</button></div></div>`;
  document.querySelector('.hint-text').style.display='none';
  $('storageStats').textContent='';
  $('adminLoginBtn').addEventListener('click', async () => {
    const res = await fetch(`${WORKER_BASE}/admin-auth-url`);
    window.location.href = (await res.json()).authUrl;
  });
  $('userLoginBtn').addEventListener('click', async () => {
    const res = await fetch(`${WORKER_BASE}/user-auth-url`);
    window.location.href = (await res.json()).authUrl;
  });
}

function renderApprovalScreen() {
  $('adminBar').classList.add('hidden');
  $('adminUI').innerHTML = '';
  $('fileGrid').innerHTML = `<div class="login-box"><h2>🔐 Waiting for Approval</h2><p>Your email: <strong>${userEmail}</strong></p><p style="color:var(--text-secondary);">Your access is pending. The admin will review your request.</p><p style="margin-top:16px;font-size:0.85rem;">You will be automatically granted permissions once approved.</p></div>`;
  document.querySelector('.hint-text').style.display='none';
  $('storageStats').textContent='';
}

function renderMainApp() {
  document.querySelector('.hint-text').style.display='block';
  if (!isAdmin) {
    $('adminBar').classList.add('hidden');
    $('adminUI').innerHTML = userEmail ? `<span style="font-size:0.85rem;color:var(--text-secondary);">👤 ${userEmail} <span class="role-badge">${userRole||''}</span></span>` : '';
  }
}

// ==================== ADMIN BAR ====================
$('btnSync').addEventListener('click', async () => {
  toast('Syncing files from cloud storage…','info');
  const res = await fetch(`${WORKER_BASE}/sync`, { method:'POST' });
  if (res.ok) { await refreshFileList(); toast('Sync complete!','success'); }
  else toast('Sync failed','error');
});

$('btnApprovals').addEventListener('click', () => {
  const panel = $('approvalPanel');
  panel.classList.toggle('active');
  if (panel.classList.contains('active')) loadPendingApprovals();
});

$('btnUsers').addEventListener('click', () => {
  const panel = $('usersPanel');
  panel.classList.toggle('active');
  if (panel.classList.contains('active')) loadUsers();
});

$('btnUnauthorize').addEventListener('click', async () => {
  if (!confirm('Logout as admin? The vault will still work for users.')) return;
  if (adminSessionToken) {
    await fetch(`${WORKER_BASE}/admin-logout`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ admin_token: adminSessionToken })
    });
  }
  localStorage.removeItem('adminSessionToken');
  isAdmin = false;
  adminSessionToken = null;
  $('adminBar').classList.add('hidden');
  $('adminUI').innerHTML = '';
  toast('Admin logged out','info');
  if (!userEmail) renderLoginScreen();
});

async function loadPendingCount() {
  if (!adminSessionToken) return;
  const res = await fetch(`${WORKER_BASE}/admin/pending`, { headers:{'X-Admin-Token':adminSessionToken} });
  const emails = await res.json();
  const badge = $('pendingBadge');
  if (emails.length) { badge.style.display='inline'; badge.textContent=emails.length; }
  else badge.style.display='none';
}

async function loadPendingApprovals() {
  const res = await fetch(`${WORKER_BASE}/admin/pending`, { headers:{'X-Admin-Token':adminSessionToken} });
  const emails = await res.json();
  const list = $('approvalList');
  if (!emails.length) { list.innerHTML='<p style="color:var(--text-secondary);">No pending users.</p>'; return; }
  list.innerHTML = emails.map(email => `
    <div class="approval-item">
      <span>${email}</span>
      <div style="display:flex;gap:6px;align-items:center;">
        <select class="role-select" style="padding:4px 8px;border-radius:4px;border:1px solid var(--border);">
          <option value="full">Full Access</option>
          <option value="delete">Can Delete</option>
          <option value="download">Download Only</option>
          <option value="read">Read Only</option>
          <option value="none">Nothing Visible</option>
        </select>
        <button class="btn btn-sm" style="background:var(--success);color:#fff;" data-approve="${email}">✅ Approve</button>
        <button class="btn btn-sm" style="background:var(--danger);color:#fff;" data-deny="${email}">❌ Deny</button>
      </div>
    </div>
  `).join('');
  list.querySelectorAll('[data-approve]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const role = btn.closest('.approval-item').querySelector('.role-select').value;
      await fetch(`${WORKER_BASE}/admin/approve`, {
        method:'POST', headers:{'Content-Type':'application/json','X-Admin-Token':adminSessionToken},
        body: JSON.stringify({ email: btn.dataset.approve, role })
      });
      toast(`${btn.dataset.approve} approved as ${role}`,'success');
      loadPendingApprovals();
      loadPendingCount();
    });
  });
  list.querySelectorAll('[data-deny]').forEach(btn => {
    btn.addEventListener('click', async () => {
      await fetch(`${WORKER_BASE}/admin/deny`, {
        method:'POST', headers:{'Content-Type':'application/json','X-Admin-Token':adminSessionToken},
        body: JSON.stringify({ email: btn.dataset.deny })
      });
      toast(`${btn.dataset.deny} denied`,'info');
      loadPendingApprovals();
      loadPendingCount();
    });
  });
}

async function loadUsers() {
  const res = await fetch(`${WORKER_BASE}/admin/users`, { headers:{'X-Admin-Token':adminSessionToken} });
  const users = await res.json();
  const list = $('usersList');
  if (!users.length) { list.innerHTML='<p style="color:var(--text-secondary);">No approved users.</p>'; return; }
  list.innerHTML = users.map(u => `
    <div class="approval-item">
      <span>${u.email} <span style="color:var(--text-secondary);">(${u.role})</span></span>
      <div style="display:flex;gap:6px;">
        <select class="role-select-${u.email}" style="padding:4px 8px;border-radius:4px;border:1px solid var(--border);">
          <option value="full" ${u.role==='full'?'selected':''}>Full</option>
          <option value="delete" ${u.role==='delete'?'selected':''}>Delete</option>
          <option value="download" ${u.role==='download'?'selected':''}>Download</option>
          <option value="read" ${u.role==='read'?'selected':''}>Read</option>
          <option value="none" ${u.role==='none'?'selected':''}>None</option>
        </select>
        <button class="btn btn-sm" style="background:var(--accent);color:#fff;" data-update="${u.email}">Update</button>
        <button class="btn btn-sm" style="background:var(--danger);color:#fff;" data-revoke="${u.email}">Revoke</button>
      </div>
    </div>
  `).join('');
  list.querySelectorAll('[data-update]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const email = btn.dataset.update;
      const select = document.querySelector(`.role-select-${email}`);
      const role = select.value;
      await fetch(`${WORKER_BASE}/admin/approve`, {
        method:'POST', headers:{'Content-Type':'application/json','X-Admin-Token':adminSessionToken},
        body: JSON.stringify({ email, role })
      });
      toast(`Role updated for ${email}`,'success');
      loadUsers();
    });
  });
  list.querySelectorAll('[data-revoke]').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!confirm(`Revoke access for ${btn.dataset.revoke}?`)) return;
      await fetch(`${WORKER_BASE}/admin/revoke`, {
        method:'POST', headers:{'Content-Type':'application/json','X-Admin-Token':adminSessionToken},
        body: JSON.stringify({ email: btn.dataset.revoke })
      });
      toast(`${btn.dataset.revoke} revoked`,'success');
      loadUsers();
    });
  });
}

// ==================== ROLE-BASED UI ====================
function applyPermissionsUI(role) {
  const dropzone = $('dropzone');
  const hint = document.querySelector('.hint-text');
  const canUpload = role === 'full' || role === 'delete' || role === 'download';
  dropzone.style.display = canUpload ? '' : 'none';
  if (hint) hint.style.display = canUpload ? '' : 'none';
  renderFileList();
}

function getAvailableActions(publicId) {
  if (isAdmin) return ['play','preview','download','delete','replace'];
  if (!userRole) return [];
  const file = currentFileList.find(f => f.publicId === publicId);
  if (!file) return [];
  const pt = previewType(file.fileType);
  const actions = [];
  if ((pt==='video'||pt==='audio') && ['full','delete','download','read'].includes(userRole)) actions.push('play');
  if (['image','pdf','text'].includes(pt) && ['full','delete','download','read'].includes(userRole)) actions.push('preview');
  if (['full','delete','download'].includes(userRole)) actions.push('download');
  if (['full','delete'].includes(userRole)) actions.push('delete');
  if (userRole==='full') actions.push('replace');
  return actions;
}

// ==================== POLLING FOR LIVE UPDATES ====================
function startRolePolling() {
  if (rolePollInterval) clearInterval(rolePollInterval);
  rolePollInterval = setInterval(async () => {
    if (!userToken || !userApproved) return;
    try {
      const res = await fetch(`${WORKER_BASE}/user-info?utoken=${userToken}`);
      const info = await res.json();
      if (info.role !== userRole) {
        userRole = info.role;
        toast(`Your permissions have been updated to: ${userRole}`, 'info');
        applyPermissionsUI(userRole);
        if (userRole === 'none') {
          $('fileGrid').innerHTML = '<p style="text-align:center;padding:2rem;">Access revoked.</p>';
          $('dropzone').style.display='none';
          document.querySelector('.hint-text').style.display='none';
          clearInterval(rolePollInterval);
        }
      }
    } catch(e) {}
  }, 5000);
}

function startApprovalPolling() {
  if (approvalPollInterval) clearInterval(approvalPollInterval);
  approvalPollInterval = setInterval(async () => {
    if (!userToken) return;
    try {
      const res = await fetch(`${WORKER_BASE}/user-info?utoken=${userToken}`);
      const info = await res.json();
      if (info.approved) {
        userApproved = true;
        userRole = info.role;
        clearInterval(approvalPollInterval);
        renderMainApp();
        applyPermissionsUI(userRole);
        await refreshFileList();
        startRolePolling();
      }
    } catch(e) {}
  }, 10000);
}
